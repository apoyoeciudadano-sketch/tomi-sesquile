<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomi - Asistente Virtual de la Alcaldía de Sesquilé</title>
<style>
  :root{
    --green:#1e5631;
    --green-dark:#123b21;
    --gold:#c9a94a;
    --bg:#f6f4ec;
    --bubble-bot:#ffffff;
    --bubble-user:#1e5631;
    --text:#26314a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:transparent;
  }
  #app{
    display:flex;flex-direction:column;
    height:100vh;max-height:100vh;
    background:var(--bg);
    overflow:hidden;
  }
  #header{
    background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);
    color:#fff;
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  #header .avatar{
    width:42px;height:42px;border-radius:50%;
    flex-shrink:0;
    overflow:hidden;
    border:2px solid var(--gold);
    background:var(--gold);
  }
  #header .avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  #header .htext{line-height:1.25;}
  #header .htitle{font-weight:700;font-size:16px;}
  #header .hsub{font-size:11.5px;opacity:.88;}

  #messages{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{max-width:88%;display:flex;flex-direction:column;gap:4px;}
  .msg.bot{align-self:flex-start;flex-direction:row;align-items:flex-end;gap:6px;}
  .msg.user{align-self:flex-end;align-items:flex-end;}
  .msg.bot .mini-avatar{
    width:22px;height:22px;border-radius:50%;overflow:hidden;flex-shrink:0;
    border:1px solid var(--gold);
  }
  .msg.bot .mini-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .msg.bot .bcol{display:flex;flex-direction:column;}
  .bubble{
    padding:10px 13px;
    border-radius:14px;
    font-size:14px;
    line-height:1.45;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.bot .bubble{
    background:var(--bubble-bot);
    color:var(--text);
    border:1px solid #e4ddc9;
    border-top-left-radius:4px;
  }
  .msg.user .bubble{
    background:var(--bubble-user);
    color:#fff;
    border-top-right-radius:4px;
  }
  .msg .meta{
    font-size:11px;
    color:#8a8672;
    margin-top:2px;
    padding:0 4px;
  }
  .suggestions{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:6px;
  }
  .suggestion-btn{
    text-align:left;
    background:#fff;
    border:1px solid var(--gold);
    color:var(--green);
    border-radius:10px;
    padding:8px 10px;
    font-size:13px;
    cursor:pointer;
    transition:background .15s;
  }
  .suggestion-btn:hover{background:#faf3e0;}

  .quickchips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:0 14px 10px 14px;
    flex-shrink:0;
  }
  .chip{
    background:#fff;
    border:1px solid #d8d2bd;
    color:var(--green);
    font-size:12px;
    padding:6px 10px;
    border-radius:16px;
    cursor:pointer;
  }
  .chip:hover{border-color:var(--gold);}

  #inputbar{
    display:flex;
    gap:8px;
    padding:10px 12px;
    border-top:1px solid #e4ddc9;
    background:#fff;
    flex-shrink:0;
  }
  #inputbar input{
    flex:1;
    border:1px solid #d8d2bd;
    border-radius:20px;
    padding:10px 14px;
    font-size:14px;
    outline:none;
  }
  #inputbar input:focus{border-color:var(--gold);}
  #sendbtn{
    background:var(--green);
    color:#fff;
    border:none;
    border-radius:50%;
    width:40px;height:40px;
    flex-shrink:0;
    cursor:pointer;
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  #sendbtn:hover{background:var(--green-dark);}

  .typing{display:flex;gap:4px;padding:4px 2px;}
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:#b7b2a0;
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

  #messages::-webkit-scrollbar{width:6px;}
  #messages::-webkit-scrollbar-thumb{background:#d8d2bd;border-radius:3px;}
</style>
</head>

const INTENTS = [{"id": "A01", "triggers": ["tramites", "servicios", "que puedo hacer aqui", "que ofrece la alcaldia", "tramites municipales", "que tramites hay", "que tramites puedo hacer"], "respuesta": "¡Claro! En la Alcaldía de Sesquilé puedes hacer varios trámites: certificaciones, paz y salvos, licencias, atención social, impuesto predial, SISBÉN y mucho más. ¿Sobre cuál te cuento en detalle?"}, {"id": "A02", "triggers": ["paz y salvo", "certificado de paz y salvo", "como saco paz y salvo", "paz y salvo municipal", "paz y salvo predial"], "respuesta": "Para tu paz y salvo del predial, tu impuesto debe estar al día. La solicitud es gratuita y la puedes hacer por correo, por el PQRSDF de la página web, o de forma presencial en la Secretaría de Hacienda, indicando el número catastral. ¿Quieres el contacto directo? 📞 3103245494 ✉️ asist.hacienda@sesquile-cundinamarca.gov.co"}, {"id": "A03", "triggers": ["predial", "impuesto predial", "como pago el predial", "pagar impuesto", "cuanto debo de predial", "pago predial"], "respuesta": "Puedes pagar tu impuesto predial así: 1) presencial en la Secretaría de Hacienda o en Bancolombia con la factura, 2) en línea por PSE en https://sesquile.universo-online.com.co/default.aspx, o 3) solicitando la factura al correo asist.hacienda@sesquile-cundinamarca.gov.co. ¿Necesitas más detalles de alguna opción?"}, {"id": "A04", "triggers": ["sisben", "como me inscribo al sisben", "ficha del sisben", "actualizar sisben", "encuesta sisben"], "respuesta": "El SISBÉN clasifica a las familias para acceder a programas sociales del Estado. Para inscribirte, actualizar tu ficha o reportar novedades, acércate a la Secretaría de Planeación (📞 3103274988). La visita y encuesta tardan hasta 15 días hábiles. ¿Necesitas algo más?"}, {"id": "A05", "triggers": ["licencia de construccion", "construccion", "permiso de obras", "licencia urbanismo", "curaduria", "licenciamiento urbanistico"], "respuesta": "Las licencias urbanísticas (construcción, subdivisión, urbanización, etc.) se tramitan en la Secretaría de Planeación (📞 3103274988). El tiempo de respuesta está unificado en 45 días hábiles. ¿Quieres que te cuente los documentos que necesitas?"}, {"id": "B01", "triggers": ["queja", "reclamo", "peticion", "pqrs", "poner una queja", "quiero reclamar", "tengo una queja"], "respuesta": "Puedes presentar tu PQRS de forma presencial en la Ventanilla Única (Carrera 6 No 5-19) o de forma virtual al correo ventanillaunica@sesquile-cundinamarca.gov.co. La Alcaldía debe responderte según los términos de ley. ¿Quieres que te explique cómo redactarla?"}, {"id": "B02", "triggers": ["derecho de peticion", "peticion formal", "solicitar informacion", "quiero pedir informacion a la alcaldia"], "respuesta": "Puedes presentar tu derecho de petición por escrito o de forma verbal. La Alcaldía tiene hasta 15 días hábiles para responderte (30 si es compleja). Puedes enviarlo a ventanillaunica@sesquile-cundinamarca.gov.co. ¿Necesitas algo más?"}, {"id": "B03", "triggers": ["mi peticion", "respondieron", "que paso con mi queja", "estado de mi pqrs", "seguimiento queja"], "respuesta": "Para hacer seguimiento a tu PQRS, comunícate al 📞 3106090754 o al correo ventanillaunica@sesquile-cundinamarca.gov.co. Ten a la mano el número de radicado de tu solicitud. ¿Necesitas algo más?"}, {"id": "C01", "triggers": ["que hacer en sesquile", "turismo sesquile", "planes", "atractivos", "visitar sesquile", "que visitar"], "respuesta": "¡Sesquilé tiene mucho para ofrecerte! Entre sus atractivos destacan el Embalse del Sisga, la iglesia colonial del pueblo, rutas de senderismo en sus montañas, y su gastronomía campesina. ¿Quieres información de alguno en especial?"}, {"id": "C02", "triggers": ["como llego", "como voy a sesquile", "transporte", "buses", "como llegar desde bogota"], "respuesta": "Sesquilé queda a unos 65 km de Bogotá. Puedes llegar en bus desde el Terminal del Norte (Bogotá) hacia Chocontá o Ubaté, pidiendo que te dejen en Sesquilé, o en carro por la vía Bogotá–Tunya (Zipaquirá o Briceño), en un recorrido de aprox. 1h 15min. ¿Necesitas más info?"}, {"id": "C03", "triggers": ["hoteles", "hospedaje", "alojamiento", "donde dormir", "fincas", "posadas"], "respuesta": "En Sesquilé y sus alrededores hay fincas agroturísticas, posadas campestres y cabañas. Para un listado actualizado te recomiendo consultar la Secretaría de Desarrollo Social (📞 3112325428) o la Oficina de Turismo, Cultura y Patrimonio (📞 3107624687). ¿Necesitas algo más?"}, {"id": "C04", "triggers": ["fiestas", "ferias", "festividades", "eventos", "celebraciones", "que fiestas hay"], "respuesta": "Por ahora no tengo cargadas las fechas exactas de las fiestas patronales y ferias del municipio. Te recomiendo consultar la página web oficial o las redes de la Alcaldía para estar al día. ¿Te ayudo con algo más?"}, {"id": "D01", "triggers": ["telefono", "numero", "como los llamo", "contacto alcaldia", "cual es el telefono"], "respuesta": "Puedes comunicarte con la Alcaldía de Sesquilé al 📞 3106090754, o al correo ✉️ ventanillaunica@sesquile-cundinamarca.gov.co. 🕐 Horario: lunes a jueves 7:30am-12:30pm y 1:30pm-5:00pm, viernes 7:30am-12:30pm y 1:30pm-4:30pm. ¿Necesitas el contacto de una dependencia específica?"}, {"id": "D02", "triggers": ["horario", "que horas atienden", "a que hora abren", "horario de atencion", "estan abiertos hoy"], "respuesta": "La Alcaldía atiende: 🕐 lunes a jueves de 7:30am a 12:30pm y de 1:30pm a 5:00pm; viernes de 7:30am a 12:30pm y de 1:30pm a 4:30pm. Sábados, domingos y festivos permanece cerrada. ¿Necesitas el horario de alguna dependencia específica?"}, {"id": "D03", "triggers": ["donde queda", "direccion", "ubicacion", "como llego a la alcaldia", "donde los encuentro"], "respuesta": "La Alcaldía Municipal de Sesquilé está ubicada en la Carrera 6 No 5-19, Sesquilé, Cundinamarca. También puedes encontrarla en Google Maps buscando \"Alcaldía de Sesquilé\". ¿Necesitas algo más?"}, {"id": "D04", "triggers": ["redes sociales", "facebook", "instagram", "twitter", "estan en redes", "pagina de facebook"], "respuesta": "Por ahora no tengo cargados los enlaces de las redes sociales oficiales. Puedes consultar la página web institucional: https://www.sesquile-cundinamarca.gov.co/Paginas/default.aspx ¿Te ayudo con algo más?"}];
const KB = [{"s": "Secretaría de Hacienda", "t": "SECRETARÍA DE HACIENDA", "x": "La Secretaría de Hacienda ofrece los siguientes servicios y trámites:\n- Impuesto Predial\n- Paz Y Salvo Del Impuesto Predial\n- Reproducción De Información Pública Solicitada Por Particulares\n- Certificaciones\n- Acuerdos De Pago\n- Inscripción De Establecimientos Comerciales\n- Pago De Impuesto Industria Y Comercio Anual\n- Reteica\n- Emisión De Facturas Para El Pago De Los Siguientes Servicios De La Alcaldía\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Desarrollo Social", "t": "SECRETARÍA DE DESARROLLO SOCIAL", "x": "La Secretaría de Desarrollo Social ofrece los siguientes servicios y trámites:\n- Bilingüismo\n- Fondo Especial Para El Fomento De La Educación Superior Foessc\n- Estrategia De Movilidad Escolar\n- Banco De Ayudas Técnicas\n- Aseguramiento\n- Servicio De Atención A La Comunidad (Sac)\n- Centro De Desarrollo Infantil\n- Ludotecas\n- Programa Para El Adulto Mayor “Flor De Primavera”\n- Centro De Vida Sensorial\n- Renta Ciudadana\n- Colombia Mayor\n- Banco De Alimentos\n- Consejo Consultivo De Mujer\n- Consejo Municipal De Juventud\n- Programas De Prevención Y Promoción De La Salud\n- Club De Tareas\n- Devolución De Iva\n- Ordenanza 037 Y 055 Subsidios Económicos A Adultos Mayores No Cubiertos Con Ningún Otro Programa Se Otorgan Subsidioseconómicos A Adultos Mayores No Cubiertos Con Ningún Otro Programa.\n- Procesos Y Empoderamiento\n- Espacios De Escucha Y Acompañamiento\n- Plataforma De Juventud\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "SECRETARÍA DE COMPETITIVIDAD, DESARROLLO ECONÓMICO Y AMBIENTAL", "x": "La Secretaría de Competitividad, Desarrollo Económico y Ambiental ofrece los siguientes servicios y trámites:\n- Acompaña os, etc.)."}, {"s": "Comisaría de Familia", "t": "COMISARÍA DE FAMILIA", "x": "La Comisaría de Familia ofrece los siguientes servicios y trámites:\n- Verificación De Derechos\n- Medidas De Protección\n- Talleres\n- Conciliación Y/O Acuerdos\n- Restablecimientos De Derechos\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Inspección de Policía", "t": "INSPECCIÓN DE POLICÍA", "x": "La Inspección de Policía ofrece los siguientes servicios y trámites:\n- Certificado De Residencia\n- Licencia De Inhumación\n- Actas De Conciliación\n- Actas De Visitas\n- Despachos Comisorios\n- Procesos Medidas Correctivas Por Comportamientos Contrarios A La Convivencia\n- Procesos Verbales Abreviados Por Comportamientos Contrarios A La Convivencia\n- Procesos Verbales Abreviados Por Perturbación A La Posesión, La Tenencia Y Las Servidumbres\n- Procesos Verbales Abreviados Por Comportamientos Que Afectan La Integridad Urbanística (Multa Especial)\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Planeación", "t": "SECRETARÍA DE PLANEACIÓN", "x": "La Secretaría de Planeación ofrece los siguientes servicios y trámites:\n- Licenciamiento Urbanístico\n- Gestión Del Sisbén\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Infraestructura", "t": "SECRETARÍA DE INFRAESTRUCTURA", "x": "La Secretaría de Infraestructura ofrece los siguientes servicios y trámites:\n- Vías\n- Permisos Intervención De Vías\n- Supervisión Obras Públicas\n- Alquiler Y Préstamos De Maquinaria Pesada\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "OFICINA DE TURISMO, CULTURA Y PATRIMONIO", "x": "La Oficina de Turismo, Cultura y Patrimonio ofrece los siguientes servicios y trámites:\n- Biblioteca Pública Municipal\n- Biblioteca Pública Municipal Leyenda Del Dorado\n- Biblioteca Rural Itinerante Vereda El Hato Programa Biblioteca Vereda Boitá\n- Clubes De Lectura\n- Portafolio Municipal De Estímulos “Tesorarte”\n- Identificación De Gestores Y Creadores Culturales.\n- Grupo De Vigías Del Patrimonio Cultural\n- Portal Interactivo Acceso A Internet\n- Escuelas De Formacion Artística Y Cultural\n- Atención Y Promoción Turística\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Oficina de Contratación", "t": "OFICINA DE CONTRATACIÓN", "x": "La Oficina de Contratación ofrece los siguientes servicios y trámites:\n- Certificaciones De Contratos\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Hacienda", "t": "IMPUESTO PREDIAL", "x": "Tributo anual de carácter real y de orden municipal que grava la propiedad o tenencia de un inmueble o mejoras realizadas en él, tanto urbano como rural.\n### Formas de pago\n1.Acercarse a la Secretaría de Hacienda a reclamar la factura de impuesto (debe presentar No. identificación del propietario y/o código catastral del predio), con ésta factura puede acercarse a cualquier oficina y/o corresponsal de Bancolombia o pago a través de DATÁFONO.\n2.Ingrese a https://sesquile.universoonline.com.co/default.aspx, revise los videos tutoriales, busque el predio, consulte y descargue la factura, y realice el pago por PSE.\n3.Envíe un correo a asist.hacienda@sesquilecundinamarca.gov.co con los datos específicos y actualizados del predio. Una vez reciba la factura, imprímala en láser y páguela en cualquier oficina o corresponsal de Bancolombia."}, {"s": "Secretaría de Hacienda", "t": "PAZ Y SALVO DEL IMPUESTO PREDIAL", "x": "Documento que certifica que todas las obligaciones están totalmente pagadas (saldo en cero)."}, {"s": "Secretaría de Hacienda", "t": "REPRODUCCIÓN DE INFORMACIÓN PÚBLICA SOLICITADA POR PARTICULARES", "x": "Una copia es la reproducción fiel, total o parcial de un texto, imagen o documento que reposa en los archivos y registros públicos\nRequisitos:\n- Solicitar la reproducción de la información pública aclarando el medio por el cual desea que sea reproducido (físico, discos compactos, USB o correo electrónico)\n- Oficio expedido por la dependencia en la que se indique a la Secretaría de Hacienda la cantidad de copias autorizadas a cobrar, quién a su vez generará el respectivo recibo.\n- Después de realizar el pago, el solicitante debe presentar elcomprobante en la dependencia correspondiente para programar la entrega de la información, la cual no debe exceder los 10 días hábiles."}, {"s": "Secretaría de Hacienda", "t": "CERTIFICACIONES", "x": "Son trámites de diferentes dependencias que requieren el pago para la expedición de las mismas:\n- Certificado de Estratificación Demarcaciones y uso de suelo (Concepto completo)\n- Certificado de uso de suelos (Específico para establecimiento comercial) Certificado PBOT\n- Licencias (subdivisión, refacciones, construcción, demolición)\n- Inscripción de profesionales\n- Nomenclatura (1*1000 sobre el valor del avalúo).\nRequisitos:\nRealizar el pago mediante consignación o transferencia a la cuenta de ahorros Nº. 33608300100 a nombre del Municipio de Sesquilé. NIT 899999415-2\n- Enviar el soporte de pago a la dependencia correspondiente, indicando el concepto que está pagando.\n- Indicar datos del solicitante, como nombre completo, número de identificación, teléfono, dirección y correo electrónico)"}, {"s": "Secretaría de Hacienda", "t": "ACUERDOS DE PAGO", "x": "Un acuerdo de pago o convenio de pago es un documento mediante el cual el deudor y el municipio llegan a un acuerdo para saldar una deuda.\nRequisitos:\n- Diligenciar el formato de acuerdo de pago.\n- Presentar en físico o enviar vía correo electrónico para verificación y aprobación de la Secretaría de Hacienda quien expedirá el acto administrativo correspondiente.\n- Para suscribir el acuerdo de pago, el deudor deberá realizar el pago correspondiente al 30% del valor adeudado con intereses como cuota inicial.\n- Si el acuerdo de pago es mayor a 12 meses se debe presentar garantía que respalde la deuda (deudor solidario, bien inmueble, etc.) la cual debe ser aprobada."}, {"s": "Secretaría de Desarrollo Social", "t": "BILINGÜISMO", "x": "El municipio de Sesquilé ofrece un programa de formación en inglés de alta calidad, dirigido a toda la comunidad y orientado a fortalecer el desarrollo personal y académico de estudiantes de instituciones públicas y privadas, así como de jóvenes y adultos del municipio. El programa se desarrolla mediante estrategias pedagógicas y está organizado en cinco categorías, todas con niveles de iniciación, intermedio y avanzado.\nLa Categoría de Apoyo al ICFES/Saber 11° fortalece las competencias en inglés para las Pruebas Saber de los grados 5° y 11°, con 2 horas semanales. La Categoría Adultos Casco Urbano está orientada a mayores de 16 años, con 3 horas semanales por grupo.\nLa Categoría Descentralizada (Adultos y Comunitaria) amplía la cobertura en distintos sectores del municipio, con 4 horas semanales por grupo y próximas sedes en Nescuatá–Boitivá–La Villa–Espigas, El Hato–Uval–Granadillo–Ranchería y Boitá, cuyos horarios se concertarán con los participantes. Finalmente, la Categoría Emprendimiento, enfocada en el sector hotelero y gastronómico, ofrece 1 hora semanal por grupo.\nRequisitos de Inscripción: Edad correspondiente a la categoría elegida.\nPertenecer al Sisbén del municipio de Sesquilé. Fotocopia del documento de identidad.\nPara la Categoría ICFES: Presentar carné de estudios de cualquier colegio (público o privado) del municipio.\nPara menores de edad: Consentimiento informado firmado por el acudiente.\nPara todos: Presentar una prueba de diagnóstico para asignar el nivel de proficiencia adecuado (iniciación, intermedio o avanzado)."}, {"s": "Secretaría de Desarrollo Social", "t": "FONDO ESPECIAL PARA EL FOMENTO DE LA EDUCACIÓN SUPERIOR FOESSC", "x": "El Programa de Fomento a la Educación Superior otorga subsidios e incentivos para promover el acceso y la permanencia en programas técnicos, tecnológicos y profesionales. Contempla dos modalidades: un Incentivo de Sostenimiento para el mejor puntaje Saber 11 de cada institución educativa del municipio y un Incentivo de Fomento Educativo, con dos convocatorias semestrales dirigidas a estudiantes residentes en el municipio que cumplan los requisitos establecidos.\nRequisitos:\nSer de nacionalidad colombiana y residir en el Municipio de Sesquilé por un periodo superior a tres (3) años, acreditado mediante certificado con vigencia no mayor a treinta (30) días, expedido por la Inspección Municipal de Policía (sector urbano) o por la Junta de Acción Comunal correspondiente (sector rural). Acreditar inscripción actualizada y activa en el SISBÉN del municipio de Sesquilé con mínimo tres (3) años de antigüedad o, en caso de ser población víctima del conflicto armado, aportar RUV vigente. En caso de pertenecer a comunidad indígena, presentar certificación expedida por la Secretaría de Desarrollo Social. Presentar fotocopia del documento de identidad. Aportar documento que acredite matrícula en una institución de educación técnica, tecnológica o profesional oficialmente reconocida por el Ministerio de Educación Nacional o la Secretaría de Educación. Presentar certificación de cuenta bancaria a nombre del postulado. Acreditar, mediante documento expedido por la institución educativa, promedio académico mínimo de 3.8 o su equivalente en otra escala, así como el horario de clases correspondiente al último semestre cursado."}, {"s": "Secretaría de Desarrollo Social", "t": "ESTRATEGIA DE MOVILIDAD ESCOLAR", "x": "La Estrategia de Movilidad Escolar garantiza el acceso y la permanencia de los estudiantes matriculados en las Instituciones Educativas Departamentales de Sesquilé, mediante la cobertura de los costos de desplazamiento de los estudiantes focalizados, en condiciones de seguridad y calidad.\nLas rutas se establecen al inicio de cada calendario escolar, conforme a los requisitos definidos por la Secretaría de Educación – Dirección de Cobertura y su Manual Operativo. Los rectores identifican a los estudiantes que cumplen las condiciones y remiten la información a la Administración Municipal, que adopta el plan de acción anual y fija, mediante acto administrativo, el valor de las rutas con base en el Comité de Permanencia Escolar Municipal\nRequisitos y condiciones: Permanencia Escolar Municipal 1. Distancia: La vivienda debeestar ubicadaatres (3) kilómetros o más de la institución educativa. No aplica si el estudiante tiene cupo cercano a su residencia y solicita traslado, excepto en casos de discapacidad. 2. Matrícula: Contar con cupo en una Institución Educativa Departamental y estar debidamente registrado en el SIMAT. 3. Grado: Ser estudiante de básica secundaria o media, siempre que en el lugar de residencia no exista establecimiento educativo que garantice su derecho a la educación. Excepcionalmente, podrán beneficiarse estudiantes de preescolar o básica primaria que, por baja cobertura u otras circunstancias, deban ser trasladados, previa aprobación de la Dirección de Cobertura.\nLa vivienda debeestar ubicadaatres (3) kilómetros o más de la institución educativa. No aplica si el estudiante tiene cupo cercano a su residencia y solicita traslado, excepto"}, {"s": "Secretaría de Desarrollo Social", "t": "BANCO DE AYUDAS TÉCNICAS", "x": "Espacio físico dotado con diferentes ayudas técnicas (silla de ruedas, muletas, caminadores) que se encuentran a disposición de la comunidad Sesquileña que así lo requieran bajo préstamo por comodato, valoración por el profesional y seguimiento.\nRequisitos: Sisbén del municipio de Sesquilé. Carta de solicitud dirigida a la secretaría de desarrollo social Fotocopia de la historia clínica. Fotocopia del documento de identidad de quien usará la ayuda técnica. Fotocopia de documento de identidad del cuidador y/o responsable. Firma del comodato y aceptar términos y condiciones."}, {"s": "Secretaría de Desarrollo Social", "t": "ASEGURAMIENTO", "x": "El aseguramiento en salud es una estrategia de política pública diseñada para lograr el acceso oportuno, efectivo y equitativo de la población a los servicios de salud para la promoción, prevención, tratamiento y rehabilitación.\nRequisitos: Fotocopia del documento de identidad. Fotocopia del Sisbén (Sesquilé). Ser residente en el municipio de Sesquilé. Datos de contacto."}, {"s": "Secretaría de Desarrollo Social", "t": "SERVICIO DE ATENCIÓN A LA COMUNIDAD (SAC)", "x": "Se apoya en gestiones administrativas en salud a la comunidad como asignación de citas, autorizaciones, trámites de PQRS, aseguramiento, entre otros. Formación en derechos y deberes de los usuarios en lo concerniente a salud. Trámites y gestión de medicamentos, entre otros relacionados.\nRequisitos: Ser residente en el municipio Copia de los documentos del proceso de salud (Órdenes médicas y/o autorizaciones)."}, {"s": "Secretaría de Desarrollo Social", "t": "CENTRO DE DESARROLLO INFANTIL", "x": "Servicio que garantiza educación inicial, cuidado y nutrición a niños menores de 5 años. Se implementan acciones pedagógicas y de cuidado, promoviendo derechos a la salud, protección y participación para favorecer su desarrollo integral. La atención se brinda durante ocho horas diarias, cinco días a la semana, y es un servicio gratuito.\nREQUISITOS: Consultar la disponibilidad de cupos presentar una solicitud de inscripción Fotocopia del registro civil de nacimiento. Fotocopia de puntaje SISBÉN o carta de declaración ante el Ministerio Público (Personería), de su condición de víctima, cuando aplique. Fotocopia de certificado de afiliación a salud vigente. Fotocopia del carné de salud infantil (puede ser fotocopia de la curva de crecimiento y desarrollo). El diagnóstico médico en caso de niños con discapacidad, el cual no es requisito para el ingreso. Fotocopia del carné de vacunación al día según edad (puede ser carné de salud infantil). Para identificar lugar de residencia, fotocopia de un recibo público cuando sea necesario. Fotocopia de documento de identidad del padre, madre y/o cuidador responsable. Certificado de pertenencia a comunidad indígena, afrodescendientes, raizales y palenqueros, y Rom o que se haya auto referido como tal."}, {"s": "Secretaría de Desarrollo Social", "t": "LUDOTECAS", "x": "El programa de Ludotecas del municipio promueve el desarrollo integral de niñas, niños, adolescentes y sus familias mediante el juego, experiencias lúdicas y actividades educativas. A través de estos espacios se fomenta el aprendizaje, la creatividad, la inclusión social, la convivencia pacífica y el fortalecimiento de habilidades cognitivas, socioemocionales y culturales, en entornos seguros y accesibles para la comunidad. El servicio se presta en cuatro sedes: Ludoteca Centro, Ludoteca Boitá, Ludoteca La Villa y Ludoteca El Uval. Todas atienden al público de lunes a viernes en horario de 2:00 p.m. a 5:00 p.m. Adicionalmente, la Ludoteca Boitá ofrece atención un sábado cada quince días, de 9:00 a.m. a 1:00 p.m.\nRequisitos: No requiere documentos para acceder al programa. Solo registrarse en la planilla de registro diario.\neesaui. Vora 2 —_"}, {"s": "Secretaría de Desarrollo Social", "t": "PROGRAMA PARA EL ADULTO MAYOR “FLOR DE PRIMAVERA”", "x": "Estrategia social del municipio de Sesquilé orientada a reconocer, cuidar y valorar a las personas mayores, brindándoles espacios de bienestar, acompañamiento y participación activa que promueven un envejecimiento saludable y una mejor calidad de vida. A través de una atención integral que incluye terapia física y psicológica, control de enfermería, actividades físicas, manualidades, alfabetización, clases de sistemas, encuentros intergeneracionales y salidas lúdicas, además de transporte y apoyo en alimentación, el programa fortalece la salud física, emocional y social de cada participante.\nSus actividades se desarrollan en la vereda El Uval, beneficiando a personas mayores de Ranchería, Granadillo, El Hato y El Uval; en la vereda Boitivá, salón comunal, para adultos mayores de sus sectores; en Nescuatá sector La Villa, atendiendo a Espigas, Nescuatá sector La Escuela y sector Providencia; y en el casco urbano, dirigido a residentes de la vereda Boitá, sector La Esperanza, veredas San José, Tierra Negra y Gobernador, así como barrios y sectores aledaños.\n### REQUISITOS:\nTener capacidad para realizar sus actividades básicas cotidianas de manera autónoma y contar con la actitud y voluntad de participar.\n- Diligenciar el Formato de Ingreso establecido.\n- Diligenciar el Consentimiento Informado. Copia del documento de identidad del beneficiario. Fotocopia de afiliación al Sistema General de Seguridad Social en Salud (Fosyga o certificado de afiliación vigente). Residir en el Municipio de Sesquilé.\n- Disposición para cumplir con los horarios, normas y lineamientos del programa. Contar con SISBÉN del Municipio de Sesquilé con encuesta actualizada."}, {"s": "Secretaría de Desarrollo Social", "t": "CENTRO DE VIDA SENSORIAL", "x": "Es un espacio físico equipado con recursos terapéuticos destinado a la rehabilitación y atención integral de personas con discapacidad, que ofrece apoyos como terapia ocupacional, psicología y fonoaudiología, así como actividades deportivas, culturales, manuales y lúdicorecreativas, promoviendo su inclusión social, educativa y laboral de acuerdo con el ciclo de vida.\nRequisitos:\nDiligenciar y firmar el formato de inscripción. Firma del consentimiento informado. Fotocopia del documento de identidad del beneficiario y de los padres de familia y/o cuidadores. Fotocopia de afiliación al sistema general de seguridad social en salud. Contar con el Sisbén del Municipio de Sesquilé en la encuesta actualizada. Certificado de Discapacidad y/o Historia clínica con diagnóstico. Remisión por parte de la institución Educativa del municipio."}, {"s": "Secretaría de Desarrollo Social", "t": "RENTA CIUDADANA", "x": "La Renta Ciudadana proporciona un ingreso digno a las familias, complementado por otros programas estatales para combatir la pobreza. Los beneficiarios, principalmente padres o madres con hijos menores de 6 años, deben cumplir con compromisos en salud y educación. Se espera un alto nivel de responsabilidad para alcanzar los objetivos del programa.\nRequisitos:\nTener puntaje del Sisbén categoría A y haber sido focalizado por el DPS. Fotocopia de registro civil para menores de 6 años y/o tarjeta de identidad de mayores de 6 años y registro civil para acreditar parentesco. Original y fotocopia del documento de identidad para cada niño o niña menor de 18 años, (registro civil con NUIP actualizado a menores de 6 años y tarjeta de identidad a NNA de 7 a 17 años). En todo caso, cuando se requiera establecer parentesco con el titular, se exige el registro civil de nacimiento. Fotocopia y documento de identidad original del acudiente. Realizar el trámite directamente por el acudiente."}, {"s": "Secretaría de Desarrollo Social", "t": "COLOMBIA MAYOR", "x": "El Programa de Protección Social al Adulto Mayor – “Colombia Mayor” busca aumentar la protección a los adultos mayores por medio de la entrega de un subsidio económico para aquellos que se encuentran desamparados, que no cuentan con una pensión, o viven en la extrema pobreza.\nEl Departamento para la Prosperidad Social - DPS hace proceso de selección, este no depende del municipio.\nRequisitos: Sisbén máximo en categoría C1. Estar en el régimen subsidiado independiente de la EPS. Copia de la cédula ampliada a 150%, activo. No percibir ningún tipo de pensión o renta. No tener más de un predio a su nombre. Carecer de rentas o ingresos suficientes para subsistir. No tener antecedentes judiciales. Hacer trámite de postulación personalmente en la Alcaldía Municipal. Ser residentes del municipio de Sesquilé. Estar en extrema vulnerabilidad. Ser aprobado por el comité de adulto mayor.\nS SES"}, {"s": "Secretaría de Desarrollo Social", "t": "BANCO DE ALIMENTOS", "x": "Es una estrategia municipal de seguridad alimentaria y nutricional que brinda asistencia técnica y permite la identificación de necesidades, adquisición y entrega de alimentos y bienes a la población más vulnerable, con el fin de reducir la pobreza y mejorar el bienestar de las familias. La ayuda, otorgada por el municipio, la Gobernación y otras entidades, se entrega principalmente mediante kits alimentarios.\nRequisitos: Ser focalizado por el municipio, cumpliendo criterios de priorización. Tener Sisbén del municipio. Copia de la cédula y datos de contacto. Acceder y acompañar la visita domiciliaria."}, {"s": "Secretaría de Desarrollo Social", "t": "CONSEJO CONSULTIVO DE MUJER", "x": "Es un espacio de participación donde las mujeres de los diferentes sectores del municipio tienen voz y voto en las diferentes decisiones que se tomen a nivel municipal.\nRequisitos: La residencia fija en el municipio de por lo menos un año. Para las comunidades indígenas debe presentar certificado de pertenencia a la comunidad."}, {"s": "Secretaría de Desarrollo Social", "t": "CONSEJO MUNICIPAL DE JUVENTUD", "x": "Es un mecanismo formal de participación democrática creado en el marco de la Ley Estatutaria 1622 de 2013 y modificado por la Ley 1885 de 2018, que garantiza la representación de las personas jóvenes entre los 14 y 28 años ante las instancias de gobierno municipal y local. Tiene como funciones principales incidir en la formulación, ejecución y evaluación de decisiones públicas, presentar iniciativas y ejercer veeduría ciudadana sobre políticas públicas, planes, programas y proyectos que impactan directa o indirectamente a la población joven; además,\ncontribuye al fortalecimiento del liderazgo juvenil, la promoción de la organización social y comunitaria y la consolidación de mecanismos que aseguren la participación efectiva de la juventud en los procesos de planeación y desarrollo territorial. En este sentido, se constituye como una instancia consultiva y de participación que articula a la juventud con la administración municipal, garantizando la inclusión de sus intereses en la gestión pública.\n—\nCST SY lp 4 ~, — - , r] é\nS y Se"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ACOMPAÑAMIENTO Y FORTALECIMIENTO A IDEAS DE NEGOCIO O EMPRENDIMIENTOS", "x": "Se brinda acompañamiento y fortalecimiento a ideas de negocio y emprendimientos, ofreciendo asistencia técnica en componentes como el financiero, metodológico, planeación estratégica y procesos de formalización, entre otros.\nRequisitos: Ser mayor de edad (menor de edad a partir de los 15 años, pueden tramitar permiso de trabajo especial). Ser residente del municipio de Sesquilé (como mínimo 3 años en el municipio). -Tener una idea de negocio o un emprendimiento. -Inscribirse en la Secretaría de Competitividad, Desarrollo económico y Ambiental. (2do. Piso Casa de la Cultura) Mayor Información: Correo: emprendimiento@sesquilecundinamarca.gov.co Teléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "CENTRO PARA EL EMPRENDEDOR SESQUILEÑO FONDO DE CAPITAL SEMILLA", "x": "Se realizan convocatorias de estímulos de capital semilla para apoyar la creación y fortalecimiento de microempresas, mediante asesoría, asignación de recursos y seguimiento. Cada participante podrá postular un único proyecto en una sola línea de acción, y las agremiaciones sin ánimo de lucro deberán estar legalmente constituidas.\nRequisitos: Personas Naturales Ser ciudadano colombiano. Sermayor deedad Ser residente del municipio de Sesquilé por un mínimo de 3 años (Presentar constancia expedida por la Junta de Acción Comunal del sector o por la Inspección de Policía Municipal). Presentar documento de consulta del Sisbén, que confirme que se encuentra sisbenizado en el municipio de Sesquilé. Poblaciones especiales Víctimas del conflicto armado: Presentar certificado expedido por la Secretaría de Gobierno, no mayor a 30 días, que acredite su condición No requiere Sisbén Población indígena: Presentar certificación del Ministerio del Interior o de su representante legal y/o Gobernador(a) de la comunidad reconocida en el municipio No tener antecedentes judiciales Diligenciar el formato único de inscripción para persona natural, con el resumen de la iniciativa productiva. Este formato será entregado por la entidad y estará disponible en el enlace de inscripción.\n### Requisitos :\nPersona jurídica, así como asociaciones domiciliadas en el municipio de Sesquilé, que cuenten con un certificado de Cámara de Comercio con una antigüedad no mayor a 30 días. Permanencia\ndemostrable de como mínimo 3 años en el municipio, contado a partir de la fecha de presentación del proyecto.\nCopia documento de cédula ciudadanía del representante legal.\n- Certificación de registro de organizaciones formalmente constituidas – RUT\n- Formato único de registro de inscripción del interesado, asociación y/o empresa con el resumen de la iniciativa productiva (será otorgado por la entidad y disponible en el link de inscripción).\n### ¿Quiénes no pueden ser beneficiarios?\n- Los empleados públicos y trabajadores oficiales que laboren en la Alcaldía de Sesquilé, así como en sus entes descentralizados y/o en otras entidades públicas a nivel departamental.\nLas personas naturales que tengan vínculos de parentesco hasta el segundo grado de consanguinidad o afinidad con los funcionarios públicos de nivel directivo de la Alcaldía de Sesquilé y sus entes descentralizados.\nLas personas naturales y/o jurídicas cuyo representante legal tenga vínculos de parentesco hasta el segundo grado de consanguinidad o afinidad con los funcionarios públicos de nivel directivo de la Alcaldía de Sesquilé y sus entes descentralizados.\nLos beneficiarios del presupuesto participativo en otras líneas de inversión. Las personas naturales y/o jurídicas que no presenten la documentación requerida y/o que no realicen la inscripción en las fechas determinadas en la convocatoria.\nLas personas naturales y/o jurídicas que hayan sido beneficiadas con capital semilla en la versión Sesquilé te Echa la Mano para Emprender del año 2023 y del Centro para el Emprendedor Sesquileño en la versión 2024. Las personas naturales y/o jurídicas que no cumplan con las actividades definidas en la metodología, o que deleguen su representación sin una causa justificada, deberán anexar una carta en la que se expongan los motivos de fuerza mayor por los cuales no puede asistir de manera personal. Mayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co Teléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PLANEACIÓN DE OFERTA INSTITUCIONAL SENA", "x": "La Administración Municipal, en convenio con el SENA, ofrece programas de formación gratuita para jóvenes y adultos, según la Ley 749 de 2002, que organiza el servicio público de educación superior en modalidades técnica profesional y tecnológica.\nRequisitos: Residir en el municipio de Sesquilé o municipios aledaños. Inscribirse en el proceso de formación en el cual se encuentra interesado en la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Fotocopia del documento de identidad, número de WhatsApp y correo electrónico. Ser mayor de 15 años. Estar inscrito en la plataforma del Sena Sofia Plus.\nMayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co Teléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "VIVERO FORESTAL OFERTA INSTITUCIONAL", "x": "La Administración Municipal ofrece el servicio de Vivero Forestal para la producción, conservación, venta y entrega de material vegetal (especies forestales y ornamentales), destinado a la reforestación, recuperación ambiental, embellecimiento de espacios y fortalecimiento de iniciativas comunitarias y productivas del municipio.\nRequisitos:\nResidir en el municipio de Sesquilé. Realizar el pago del material vegetal a adquirir. Hacer solicitud en la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Indicar la finalidad del material vegetal solicitado (reforestación, ornato, conservación, entre otros). Realizar la solicitud del material vegetal o del acompañamiento técnico en la Secretaría de Competitividad, Desarrollo Económico y Ambiental donde se evalúa la disponibilidad y se define la entrega o el acompañamiento requerido. Costo: De acuerdo a los valores estipulados según el tamaño del material vegetal, los cuales se encuentran en el estatuto tributario municipal."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASISTENCIA TÉCNICA AMBIENTAL", "x": "Orientar y guiar a cada una de las personas que estén interesadas en aumentar la cobertura forestal dentro de sus predios con especies nativas de bosque andino y alto andino o restaurar zonas afectadas por la ampliación de la frontera agrícola.\nRequisitos: Acercarse o comunicarse con la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Realizar la solicitud del acompañamiento técnico ambiental en la Secretaría de Competitividad, Desarrollo Económico y Ambiental, donde se evalúa la solicitud y se programa la visita técnica o la asesoría correspondiente."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASESORÍA TÉCNICA EN ESPECIES MENORES Y MAYORES", "x": "Se brinda asistencia técnica en el área pecuaria mediante profesionales y técnicos especializados, atendiendo solicitudes relacionadas con el manejo productivo de las especies, sanidad preventiva y curativa, mejoramiento de parámetros zootécnicos e implementación de procesos y tecnologías de acuerdo con los requerimientos de cada especie.\nRequisitos: Ser propietario de especies menores y mayores en la jurisdicción del municipio de Sesquilé. Inscripción solicitud de servicio en planilla de la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Acercarse, escribir o llamar a la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "JORNADAS DE ESTERILIZACIÓN DE MASCOTAS", "x": "Se realiza intervención quirúrgica (ovariohisterectomía) en hembras y (castración) en machos esto con el objetivo de controlar la población canina y felina en el municipio\nRequisitos: Inscripción solicitud de servicio en planilla de la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Únicamente para especies caninas y felinas de la población del Municipio de Sesquilé de nivel de Sisbén A, B y C.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co\nOEE\nao uk"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PROGRAMA DE MEJORAMIENTO GENÉTICO", "x": "Se presta el servicio de inseminación artificial con celo detectado o mediante protocolos, incluyendo inseminación artificial a término fijo (IATF), dirigido a hembras bovinas de pequeños y medianos productores del municipio de Sesquilé, brindando orientación técnica para mejorar los parámetros productivos, de acuerdo con la disponibilidad del material genético y del profesional pecuario.\nRequisitos: Ser pequeño o mediano productor, propietario de hembras bovinas en óptimas condiciones para la inseminación, en la jurisdicción del municipio de Sesquilé. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "SOSTENIMIENTO DE HUERTAS CASERAS", "x": "Se implementan huertas caseras y escolares mediante capacitaciones y entrega de insumos como semillas y hortalizas, con el propósito de fortalecer la seguridad alimentaria del municipio de Sesquilé, dirigidas a la población en general y a instituciones educativas, bajo modalidad de convocatoria o según disponibilidad del servicio.\nRequisitos: Residir en el municipio de Sesquilé. Tener o implementar la huerta y seguir las recomendaciones técnicas. Tener voluntad e interés. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASISTENCIA TÉCNICA AGRÍCOLA", "x": "Se brinda acompañamiento técnico permanente al sector agrícola del municipio de Sesquilé, dirigido a pequeños y medianos productores, enfocado en la implementación de prácticas de agricultura limpia y sostenible, el fortalecimiento de los procesos productivos agrícolas y el uso de abonos y fertilizantes orgánicos.\nRequisitos: Ser pequeño o mediano productor agrícola del municipio de Sesquilé. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "EXPEDICIÓN DE GUÍA SANITARIA DE MOVILIZACIÓN INTERNA (GSMI)", "x": "Se realiza el trámite de la guía de movilización animal ante el ICA para el traslado de ganado caprino, ovino, porcino, bovino, equino, asnal y bufalino, dirigido a la población del municipio de Sesquilé, bajo modalidad de atención permanente.\nRequisitos:\nRealizar el pago de la generación de guía de movilización en la Secretaría de Hacienda del valor correspondiente.\nEl predio deberá estar registrado previamente ante el ICA con la forma 3-101.\nTener el certificado del último ciclo de vacunación vigente.\nCédula de ciudadanía original de la persona que solicita la Guía de Movilización Interna. En caso de no estar presente el propietario del predio, la persona que solicita la GSMI deberá llevar autorización firmada, con huella y fotocopia de la cédula del propietario del predio. Exámenes de laboratorio de los animales si la movilización lo exige (concentraciones ganaderas)\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ALQUILER DE MAQUINARIA AGRÍCOLA", "x": "Se presta de manera permanente el servicio de maquinaria agrícola con tractor y disponibilidad de implementos como arado rastrillo y retobo, dirigido a pequeños y medianos productores del municipio de Sesquilé.\nRequisitos: Ser pequeño o mediano productor agrícola del municipio de Sesquilé. Establecer el tipo de implemento que requiere. Cancelar el valor establecido en el Estatuto Tributario Municipal vigente en la Secretaría de Hacienda. Con el recibo de pago programar el servicio con la Secretaría de Competitividad, Desarrollo Económico y Ambiental\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co\nUSS"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "VENTANILLA ÚNICA DE RADICACIÓN", "x": "La ventanilla única de radicación es el servicio institucional de la Alcaldía para recibir y registrar de forma centralizada y estandarizada todas las PQRSDF (peticiones, quejas, reclamos, solicitudes, denuncias, y felicitaciones) sobre trámites y comunicaciones dirigidas a sus dependencias.\nCada requerimiento se radica con número único, fecha y hora, lo que permite trazabilidad, seguimiento y control durante todo el ciclo de atención, según tiempos y procedimientos establecidos.\nSe presta por canales presenciales, virtuales o mixtos, articulado con sistemas de atención al ciudadano, gestión documental, caracterización de usuarios y tableros institucionales para monitoreo permanente del desempeño del portafolio.\n### Correo electrónico:\nventanillaunica@sesquile-cundinamarca.gov.co página web institucional - módulo de peticiones, quejas y reclamos.\nO"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "SOLICITUD DE TARIFA DIFERENCIAL DEL PEAJE EL ROBLE", "x": "Asesoría y recepción de documentos para adquirir beneficio del peaje tanto para solicitudes nuevas o solicitudes de cambio.\n### Requisitos\n### SOLICITUD NUEVA\n- Copia de Cédula de Ciudadanía del propietario del vehículo. Copia de la Tarjeta de Propiedad del Vehículo (debe coincidir con la cédula). Certificado de Residencia expedido por la Inspección de Policía.\nSOLICITUD DE CAMBIO Copia de la tarjeta de propiedad del nuevo vehículo Tiempo de respuesta: “Depende de la revisión por parte de la ANI”"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "CONVENIO UNIVERSIDAD DE LA SABANA", "x": "Programa de apoyo educativo que otorga descuentos en matrícula para residentes del municipio que deseen cursar estudios de pregrado y posgrado, con el fin de facilitar el acceso y la permanencia en educación superior de calidad; el beneficio contempla 25% de descuento en pregrado, 25% en especializaciones y maestrías, y 20% en doctorado.\nREQUISITOS: Ser residente de Sesquilé.\n- Pertenecer a estratos 1, 2 o 3.\n- Ingresar desde primer semestre.\n• Ser bachiller del año inmediatamente anterior.\n• Cumplir promedio mínimo de 3,8 (pregrado) o 4,2 (posgrado). Tendrán prelación los egresados de colegios públicos del municipio y estudiantes de colegios privados con menor pensión."}, {"s": "Secretaría de Gobierno", "t": "NUEVA GENERACIÓN COMUNAL", "x": "El programa busca formar una nueva generación de líderes comunitarios desde edades tempranas, fortaleciendo valores ciudadanos, identidad local, participación social y habilidades para la vida, contribuyendo a la prevención de violencia, deserción escolar y desinterés cívico.\nRequisitos: Grupo indeterminado de niños, niñas y/o adolescentesque voluntariamente por barrio o vereda quieran conformar la nueva generación Comunal. Residir en el barrio, sector y/o vereda respectiva. tener entre 7 y 17 años. Inscribirse con el presidente de cada Junta de Acción Comunal\nLa administración sólo recibe el consolidado de la información y apoya en cuanto a la capacitación de los participantes."}, {"s": "Secretaría de Gobierno", "t": "ATENCIÓN HUMANITARIA POR INMEDIATEZ", "x": "Se brinda ayuda humanitaria a las víctimas del desplazamiento forzado y de otros hechos victimizantes, tales como: amenaza, atentado o acto terrorista, desaparición forzada, tortura, delitos contra la libertad e integridad sexual, homicidio, accidentes por minas antipersonal o municiones sin explotar (MUSE), secuestro, vinculación de niños, niñas y adolescentes (NNA) a grupos armados, lesiones personales y situaciones de confinamiento.\nRequisitos:\nHacer la declaración dentro de los tres (3) meses siguientes a la fecha de ocurrencia del desplazamiento forzado o del hecho victimizante. Estar en el censo (masivos) o declaración individual ante el Ministerio Público. No estar valorado en el RUV por ese hecho. Estar en situación de vulnerabilidad acentuada como consecuencia del desplazamiento forzado. No haber recibido previamente Atención Humanitaria Inmediata por el mismo hecho, bien sea por la entidad territorial o por otra entidad del SNARIV"}, {"s": "Secretaría de Gobierno", "t": "MECANISMO DE ENTREGA DE AYUDA HUMANITARIA INMEDIATA", "x": "### En especies:\nSe refiere a la entrega de loscomponentes que le corresponden de acuerdo con sus necesidades.\n### En dinero:\nSe refiere a la entrega del valor equivalente a los componentes que le corresponden de acuerdo con sus necesidades representado en montos de dinero.\nNormativa: Plan de contingencia, ley 1448 de 2011 modificada por la 2421 de 2025."}, {"s": "Secretaría de Gobierno", "t": "CARACTERIZACIÓN DE VÍCTIMAS DEL CONFLICTO ARMADO", "x": "Mecanismo que permite producir y consolidar información sobre la situación de las víctimas del conflicto armado, mediante la articulación entre la Unidad, los registros de la Red Nacional de Información y los demás actores del SNARIV, en especial las Entidades Territoriales. Este mecanismo tiene como propósito realizar procesos de focalización, entendidos como la orientación de las acciones a desarrollar hacia grupos poblacionales específicos, de acuerdo con sus características particulares, así como definir procesos de priorización, que consisten en establecer un orden de atención a los hogares o individuos según su nivel de vulnerabilidad.\nRequisitos para la caracterización:\nResidir en el municipio y comprobarlo con un certificado de residencia. Fotocopia del documento de identidad. Registro civil o tarjeta de identidad para los menores. Estar inscrito en el Registro Único de Víctimas Realizar la encuesta de caracterización ante la Secretaría de Gobierno."}, {"s": "Secretaría de Gobierno", "t": "SERVICIO DE PERIFONEO", "x": "Consiste en la emisión de mensajes o avisos de cualquier tipo a través de parlantes o altavoces en la vía pública, con el fin de anunciar actividades industriales, comerciales o de servicios, así como debates o acontecimientos de cualquier naturaleza; para el uso de parlantes, altavoces o sistemas de perifoneo se requiere permiso previo de la Alcaldía, el cual se otorgará por lapsos diarios de hasta tres (3) horas y por períodos que no excedan de cinco (5) días continuos.\nRequisitos: Radicar solicitud \"dirigida a la Secretaría de Gobierno \"de manera física en la ventanilla única de radicación o por correo electrónico ventanillaunica@sesquile-cundinamarca.gov.co\nPagar el valor correspondiente al perifoneo por hora (en la Secretaría de Hacienda) ."}, {"s": "Secretaría de Gobierno", "t": "AUTORIZACIÓN PARA LA REALIZACIÓN DE EVENTOS Y/O ESPECTÁCULOS EN EL MUNICIPIO", "x": "Expedir la autorización para la realización de eventos y/o espectáculos públicos que se pretendan realizar en el municipio de Sesquilé conforme a la normatividad vigente.\n### Requisitos:\nDe conformidad con lo establecido en la Ley 1523 de 2012, el Decreto 2157 de 2017 y la Circular 009 de 2021 de la Gobernación de Cundinamarca, el ciudadano deberá anexar la documentación correspondiente, según aplique, de acuerdo con la complejidad del evento:\nOficio de Solicitud de autorización del evento. Plan de Contingencia firmado por el representante legal. Certificado de existencia y representación legal. Autorización o contrato con el lugar donde se realizará el evento (solo si aplica). Autorización de titulares y derechos de autor (solo si aplica). Concepto de manejo ambiental ( solo si aplica). Control de aforo (obligatorio) y relación de boletería (solo si aplica). Póliza de responsabilidad civil extracontractual para el evento Concepto técnico sanitario ( solo si aplica). Plan de manejo de tránsito. Copia de radicado y viabilidad del PMT ante POB-BTS, Secretaría departamental (ANI si aplica). Requisitos Ley 678 de 2001 Artículo 5° Uso de pólvora, artículos pirotécnicos o fuegos artificiales (solo si aplica). Uso de suelo.\nEVENTOS Y/O ESPECTÁCULOS DE LAS ARTES ESCÉNICAS\nEvaluación y autorización municipal para la realización de eventos y/o espectáculos de las artes escénicas, mediante la verificación de los requisitos legales, técnicos y de gestión del riesgo, con el fin de garantizar la seguridad de los asistentes y el cumplimiento de la normatividad vigente.\nDocumentos requeridos (cuando aplique):\nPara espectáculos públicos de las artes escénicas, el organizador deberá presentar la resolución como productor PULEP, el código del evento PULEP y el certificado de pago de la contribución parafiscal cultural.\nPasos del trámite: Radicar la solicitud ante la Alcaldía Municipal (Ventanilla Única o correo electrónico), con la documentación completa y mínimo quince (15) días hábiles antes del evento. La Secretaría de Gobierno revisa los documentos y define la complejidad del evento: si es no complejo, emite concepto favorable o notifica ajustes; si es complejo, el organizador presenta el plan ante el CMGRD, que emite concepto técnico. El día del evento, el Cuerpo Oficial de Bomberos de Sesquilé realiza inspección previa; si se subsanan las observaciones, la Secretaría de Gobierno emite la autorización definitiva.\nREVISIÓN Y APROBACIÓN PLANES DE GESTIÓN DEL RIESGO DE EMERGENCIAS Y DE DESASTRES\nServicio orientado a la revisión y aprobación de los PGRDEPP como instrumento de planeación para la gestión del riesgo de desastres, dirigido a representantes de edificaciones públicas y privadas, establecimientos comerciales e industriales, instituciones educativas y demás personas o entidades que lo requieran en el municipio.\nRequisitos: Solicitud interpuesta por el ciudadano o la organización con la información completa que incluya nombre, teléfono de contacto, correo, dirección.\nDocumento del Plan de Gestión de Riesgos de Emergencias y Desastres Radicar en la Alcaldía Municipal - Sede Central - Ventanilla Única – o mediante correo electrónico los documentos relacionados en los requisitos.\nProcedimiento:\nLa Ventanilla de Atención al Usuario asigna el radicado y traslada la solicitud a la Coordinación del CMGRD. La Coordinación del CMGRD informa al peticionario la fecha de presentación del plan ante sus integrantes y, en caso de observaciones, estas se comunican durante la sesión o para que sean subsanadas o corregidas. Una vez recibidas las correcciones, se emite el Concepto Técnico Documental del Plan de Gestión del Riesgo de Desastres.\n-«\nQ"}, {"s": "Comisaría de Familia", "t": "VERIFICACIÓN DE DERECHOS", "x": "Al tener conocimiento de la presunta vulneración de derechos de un niño, niña, adolescente, persona con discapacidad o adulto mayor, la Comisaría de Familia debe activar de inmediato los actos urgentes según la ruta establecida. Esto incluye la verificación de derechos, visitas sociales, entrevistas, búsqueda de redes familiares o institucionales, y la presentación de denuncias si corresponde, con el objetivo de restablecer los derechos vulnerados.\nRequisitos: Diligenciar la solicitud mediante formato existente en la comisaría. Presentar copia del documento de identidad si es necesario."}, {"s": "Comisaría de Familia", "t": "MEDIDAS DE PROTECCIÓN", "x": "En atención a lo consagrado en la normatividad vigente, todas las personas del grupo familiar, los adultos mayores y personas con discapacidad son amparados mediante medida preventiva de protección cuyo trámite se podrá adelantar ante la Comisaría de Familia, siempre y cuando hubiesen sido agredidos o violentados por su propia familia y/o dentro de una misma unidad residencial. Se hará acompañamiento psicosocial por parte de la Comisaría de Familia.\nRequisitos: Presentar copia del documento de identidad Solicitud formal mediante formato existente en la comisaría de familia."}, {"s": "Comisaría de Familia", "t": "TALLERES", "x": "Procesos de socialización y capacitación en temas como: Pautas de Crianza, Prevención de Violencia Intrafamiliar, Prevención de Abuso Sexual Infantil, Rutas de Atención, acompañamiento a Líderes Estudiantiles en temas propios de sus cargos.\nRequisitos: Realizar la solicitud por escrito en la Comisaría de Familia."}, {"s": "Comisaría de Familia", "t": "CONCILIACIÓN Y/O ACUERDOS", "x": "La Comisaría de Familia como autoridad administrativa puede adelantar de oficio y/o a petición de parte diligencias de Conciliación frente a obligaciones alimentarias, vestuario, salud, educación, recreación, visitas entre otros a favor de niños, niñas, adolescentes, adultos mayores y/o personas en condición de discapacidad.\nEN CASO DE NNA (niña, niño, ó adolescente:\n- Copia del documento de identidad o Registro Civil, carnet de vacunación, crecimiento y desarrollo, certificado educación Petición efectuada mediante formato de atención o de manera formal mediante solicitud motivada. Pagar según el destino.\nRequisitos: Copia del documento de identidad del o los solicitantes"}, {"s": "Comisaría de Familia", "t": "RESTABLECIMIENTOS DE DERECHOS", "x": "En caso de encontrarse un presunto derecho en riesgo, amenaza o inobservancia se deberá adelantar inmediatamente el proceso administrativo de restablecimiento de derechos, involucrando como directos responsables a los familiares y/o cuidadores, así como a las instituciones responsables de su protección. Además de observar las presuntas situaciones por negligencia, maltrato y/o abandono colocando en conocimiento a las autoridades judiciales competentes.\nRequisitos: -Copia del documento de identidad. -Diligenciar formulario de atención.\na©\nO"}, {"s": "Inspección de Policía", "t": "CERTIFICADO DE RESIDENCIA", "x": "Documento emitido a personas físicas cuando una entidad, empresa o institución lo solicita para certificar su residencia o domicilio en una localidad específica.\nRequisitos: Copia de cédula de ciudadanía. Si es menor de edad -Copia de la tarjeta de identidad. Copia de servicio público Recibo pago del certificado (emitido por la Secretaría de Hacienda)."}, {"s": "Inspección de Policía", "t": "LICENCIA DE INHUMACIÓN", "x": "Este documento oficial autoriza la sepultura de una persona en el cementerio local o en el lugar de inhumación designado. Es necesario para proceder con el acto de inhumación, de acuerdo con las normativas vigentes, incluyendo la Ley de Cementerios, el Reglamento de Salud Pública y el Código Civil, así como las regulaciones específicas de la municipalidad correspondiente.\nRequisitos: -Certificado de defunción. -Copia de la cédula del fallecido. -En caso de ser muerte por hechos violentos (Autorización de la Fiscalía) - La solicitud la genera directamente la funeraria."}, {"s": "Inspección de Policía", "t": "ACTAS DE CONCILIACIÓN", "x": "Es un documento formal que registra un acuerdo alcanzado entre dos o más partes para resolver un conflicto fuera de un juicio, formalizando su voluntad de manera clara, Este mecanismo alternativo busca una solución rápida y pacífica en comportamientos contrarios a la convivencia.\nRequisitos: -Queja escrita o verbal -Citación -Acuerdo o no Acuerdo"}, {"s": "Inspección de Policía", "t": "ACTAS DE VISITAS", "x": "El acta de visita de Inspección de Policía es un instrumento técnico, formal y probatorio, esencial para documentar actuaciones de control y sustentar decisiones administrativas o procesos policiales posteriores.\nRequisito: -Queja escrita o verbal -Informe"}, {"s": "Inspección de Policía", "t": "DESPACHOS COMISORIOS", "x": "Los despachos comisorios son órdenes judiciales formales mediante las cuales un juez comisiona a otra autoridad para que practique diligencias procesales, cuando no puede realizarlas directamente.\nRequisitos: Auto de comisión Citaciones Diligencias\nTiempo de respuesta: Dentro de un plazo razonable, sujeto a agendamiento. Trámite realizado en la Secretaría de Gobierno “Inspección de Policía”"}, {"s": "Inspección de Policía", "t": "PROCESOS MEDIDAS CORRECTIVAS POR COMPORTAMIENTOS CONTRARIOS A LA CONVIVENCIA", "x": "El proceso verbal abreviado por medidas correctivas es el mecanismo rápido que permite impugnar sanciones de policía ante un Inspector o corregidor de convivencia y Paz urbano en municipios y distritos de 3 a 6 Categoría rural.\nRequisitos: -Comparendo -Recurso de apelación -Pago\nTiempo de respuesta: Tres días para presentar recurso de apelación y cinco días para cancelar con el 50% de descuento"}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR COMPORTAMIENTOS CONTRARIOS A LA CONVIVENCIA", "x": "El proceso verbal abreviado por comportamientos contrarios a la convivencia es el procedimiento policivo ágil mediante el cual se controvierten las conductas que afectan la convivencia ciudadana, garantizando el debido proceso.\nRequisitos: -Queja -Citación -Decisión -Recursos\nPROCESOS VERBALES ABREVIADOS POR PERTURBACIÓN A LA POSESIÓN, LA TENENCIA Y LAS SERVIDUMBRES\nEs una solicitud formal ante la inspección de Policía en caso de perturbación a la posesión, a la mera tenencia y al derecho de servidumbre, de conformidad al artículo 79 de la ley 1801 de 2016.\nRequisitos: -Solicitud de querella policiva de manera formal en la ventanilla única para lo cual puede usar los canales disponibles -Citación -Decisión -Recursos\nPROCESOS VERBALES ABREVIADOS POR COMPORTAMIENTOS QUE AFECTAN LA INTEGRIDAD URBANÍSTICA (MULTA ESPECIAL) Es una solicitud formal presentada ante la Inspección de Policía para que se verifique y controle una presunta construcción ilegal, de conformidad con el artículo 135 del Código Nacional de Seguridad y Convivencia Ciudadana.\nRequisitos: -Queja u oficio -Citación -Decisión -Recursos"}, {"s": "Secretaría de Planeación", "t": "LICENCIAMIENTO URBANÍSTICO", "x": "Esta dependencia tiene a su cargo la gestión y expedición de las licencias y autorizaciones requeridas para el desarrollo urbanístico y el uso de los predios.\n- Tipos de Licencias: Incluye Urbanización, Parcelación, Subdivisión, Construcción e Intervención del Espacio Público.\n- Modalidades: Cubre desde obra nueva, ampliaciones y demoliciones, hasta cerramientos y saneamientos.\n- Tiempo de Respuesta: Unificado en 45 días hábiles para todas las modalidades. Prórrogas y Revalidaciones: Segestionan prórrogas (dentro de la vigencia) y revalidaciones (30 días para resolver).\nDocumentación requerida para todas las solicitudes: Basado en la Resolución 1026 de 2021 (que modifica la Resolución 463 de 2017) y el Formulario Único Nacional, los documentos que son obligatorios para toda solicitud de licencia urbanística, independientemente de la modalidad son los siguientes:\n### DOCUMENTOS COMUNES A TODA SOLICITUD\n1. Certificado de Libertad y Tradición: Copia reciente, expedida con una anterioridad no mayor a un (1) mes antes de la fecha de la solicitud. Cuando el predio no se haya desenglobado se podrá aportar el certificado del predio de mayor extensión.\n2. Formulario Único Nacional - FUN: Debe estar debidamente diligenciado y firmado por el solicitante (propietario) y los profesionales responsables.\n3. Documento de Identidad del Solicitante:\n- Si es persona natural: Copia de la cédula de ciudadanía o extranjería.\nSi es persona jurídica: Certificado de existencia y representación legal (vigencia no mayor a un mes).\n4. Poder o Autorización (si aplica): Si el trámite no lo hace el propietario directamente, se requiere un poder especial debidamente otorgado ante notaría o juez.\n5. Copia del Impuesto Predial: Copia del documento de pago del último año gravable del predio objeto de la solicitud (donde fi g ure la dirección alfanumérica o nomenclatura).\n6. Relación de Vecinos Colindantes: Un listado con las direcciones de los predios colindantes al proyecto para efectos de la citación y comunicación a terceros interesados.\n7. Copia de las Tarjetas Profesionales: De todos los profesionales que intervienen en el trámite (arquitectos, ingenieros, etc.), junto con certificaciones de vigencia expedidas por los consejos profesionales respectivos.\nAdicional a los requisitos generales, cada tipo de licencia exige documentación técnica especializada según la naturaleza de la intervención.\nPara las licencias de Urbanización y Parcelación, es fundamental anexar el plano topográfico y el proyecto urbanístico detallado (o de parcelación) junto con la certificación de disponibilidad de servicios públicos; en el caso de la Subdivisión, el requisito central es el plano del levantamiento topográfico que señale claramente los linderos y áreas de los predios resultantes. Por su parte, la licencia de Construcción demanda una carga técnica mayor que incluye la memoria de cálculos y diseños estructurales, el estudio de suelos y los planos arquitectónicos completos, mientras que, para la Intervención y Ocupación del Espacio Público, se deben presentar los planos de diseño específicos del espacio o equipamiento a intervenir acompañados de la descripción del proyecto.\n### Otras Actuaciones Urbanísticas\nTrámites administrativos y técnicos que no constituyen una licencia de construcción.\nServicios Clave:\nConceptos de norma y uso del suelo. Copias certificadas de planos y ajustes de cotas. Aprobación de Planos de Propiedad Horizontal y piscinas. Autorización de movimiento de tierras.\nTiempos de Respuesta: Generalmente 15 días hábiles, excepto para modificaciones de planos urbanísticos y revisiones estructurales independientes que toman 30 días hábiles.\nPara las Otras Actuaciones Urbanísticas, la documentación técnica varía considerablemente según el trámite específico. En el caso de la Aprobación de los Planos de Propiedad Horizontal, es indispensable anexar los planos de alinderamiento (cuadros de áreas y mojones) junto con la minuta del reglamento de propiedad horizontal. Para la Autorización de Movimiento de Tierras, se requiere aportar el plano topográfico y los estudios geotécnicos que garanticen la estabilidad del terreno.\nSi la solicitud es para la Aprobación de Piscinas, se deben presentar los planos arquitectónicos y de detalles que incluyan el cumplimiento de las normas de seguridad; mientras que para la Validación de Planos o conceptos técnicos, el énfasis recae en la presentación de la copia de los planos originales o la planimetría que se pretende corregir o legalizar.\nre\n©"}, {"s": "Secretaría de Infraestructura", "t": "VÍAS", "x": "Se realiza mantenimiento, mejoramiento y/o rehabilitación vial, urbana y rural de 240 km, involucrando en algunos sectores a las comunidades y dando cumplimiento al decreto 056 de 2005, para dichas actividades la secretaría de infraestructura contrata el suministro y transporte de recebo y según el cronograma de trabajo propuesto por el secretario de despacho, se intervendrán los tramos viales. El concesionario POB se encarga del mantenimiento de la vía primaria\nRequisitos: Solicitud del servicio a través de un oficio que debe radicarse en la ventanilla única."}, {"s": "Secretaría de Infraestructura", "t": "PERMISOS INTERVENCIÓN DE VÍAS", "x": "Autorizaciones que se otorgan a personas naturales o jurídicas para realizar trabajos en una vía pública, como excavaciones, reparaciones, instalaciones o cualquier otra actividad que afecte el normal funcionamiento de la misma.\nEn caso de que el ciudadano requiera y/o solicite hacer conexión al servicio de alcantarillado, agua o gas debe hacer una solicitud a la empresa prestadora del servicio para solicitar la intervención en la vía publica.\nRequisitos: Presentar la intención con la empresa operadora del servicio y posteriormente dirigir un oficio a la Secretaría de Infraestructura solicitando el permiso para la intervención de la vía pública."}, {"s": "Secretaría de Infraestructura", "t": "SUPERVISIÓN OBRAS PÚBLICAS", "x": "La supervisión de obras públicas es un proceso fundamental para garantizar que los proyectos se ejecuten de acuerdo con lo planificado, cumpliendo con los requisitos técnicos, legales y ambientales, y dentro del presupuesto y plazo establecidos.\nRequisitos: Solicitud del servicio a través de un oficio dirigido a la Secretaría de Infraestructura ,radicado en la ventanilla única de servicios."}, {"s": "Secretaría de Infraestructura", "t": "ALQUILER Y PRÉSTAMOS DE MAQUINARIA PESADA", "x": "El municipio cuenta con maquinaria amarilla disponible para la prestación de servicios a la ciudadanía. Para acceder a este servicio, el interesado debe tener en cuenta la tarifa establecida por hora de alquiler y diligenciar el formato de solicitud correspondiente.\nRequisitos: Diligenciar formato de solicitud de alquiler de maquinaria. Una vez aprobado el alquiler dirigirse a la Secretaria de Hacienda para solicitar el recibo de pago y cancelarlo en la entidad bancaria o medio que corresponda. Entregar copia del soporte de pago en la Secretaria de Infraestructura.\n.\n‘\neeseuic S&S Re Sar ad"}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "BIBLIOTECA PÚBLICA MUNICIPAL", "x": "### CONSULTA EN SALA\n- Serealiza préstamo de material de literatura que puede ser usado y consultado libremente por los visitantes en la sala de lectura.\n### REFERENCIA\n- Orientación y apoyo a los usuarios en sus necesidades de información.\n### PRÉSTAMO EXTERNO DEL MATERIAL DE LITERATURA.\n- El préstamo externo posibilita que los materiales de la biblioteca Pública Municipal de Sesquilé se utilicen y consulten por fuera de ésta\nRequisitos: Estar inscrito en la biblioteca pública municipal base de datos SIABUC y plataforma llave del saber, se debe diligenciar el formulario y anexar la autorización de los padres si el usuario es menor de edad.\net"}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "BIBLIOTECA PÚBLICA MUNICIPAL LEYENDA DEL DORADO", "x": "- Club de lectura Sala infantil Préstamo de libros Talleres\n- Encuentros\n- Bibliovacaciones Concursos literarios Zona digital"}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "BIBLIOTECA RURAL ITINERANTE VEREDA EL HATO PROGRAMA BIBLIOTECA VEREDA BOITÁ", "x": "Préstamo de libros\nTalleres\nRequisitos: Fotocopia del documento. Formato de permiso uso de imagen. Certificado afiliación a salud, no mayor a 30 días."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "CLUBES DE LECTURA", "x": "Encuentro una vez por semana donde se realiza promoción y animación a la lectura y escritura, brindando diferentes actividades como lo son manualidades, reconocimiento del territorio, campañas de cultura ambiental, juegos, rondas, entre otros.\nRequisitos: Estar inscrito en la biblioteca pública municipal base de datos SIABUC y plataforma llave del saber, se debe diligenciar el formulario y anexar la autorización de los padres si el usuario es menor de edad."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "PORTAFOLIO MUNICIPAL DE ESTÍMULOS “TESORARTE”", "x": "Tiene como objetivo reconocer las expresiones artísticas independientes de la comunidad a través de la creación, circulación e investigación. Es un espacio para la postulación y desarrollo de proyectos entorno al arte, la cultura y el patrimonio.\nRequisitos: Presentarse a la convocatoria de acuerdo a las bases de participación que se publiquen en los canales oficiales de la administración municipal. Certificado de residencia. Documentación requerida de acuerdo a la convocatoria."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "IDENTIFICACIÓN DE GESTORES Y CREADORES CULTURALES.", "x": "Se busca identificar a creadores y gestores culturales con trayectoria para participar en la convocatoria de una anualidad vitalicia del Programa de Beneficios Económicos Periódicos BEPS, conforme al decreto 2012 de 2017 y la resolución 2260 de 2018.\n### Requisitos de acuerdo al Decreto:\nSer colombiano. Tener mínimo 62 años de edad si es hombre y 57 años de edad si es mujer. Residir durante los últimos diez (10) años en el territorio nacional. Percibir ingresos inferiores a un (1) Salario Mínimo Mensual Legal Vigente. Que se acredite, a través del Ministerio de Cultura, la condición de gestor o creador cultural, de acuerdo con los requisitos que esa cartera ministerial determine para tal fin."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "GRUPO DE VIGÍAS DEL PATRIMONIO CULTURAL", "x": "El grupo de vigías del patrimonio cultural en Sesquilé cumple diversas funciones importantes para la conservación y promoción del patrimonio local. Algunas de estas funciones incluyen:\n- Monitoreo y Vigilancia Educación y Sensibilización Colaboración con Autoridades Promoción del Turismo Cultural\n- Fomento de la Identidad Local\nRequisitos: Convocatoria (Cuando esté activa) Activación de grupo de vigías Formulario de inscripción"}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "PORTAL INTERACTIVO ACCESO A INTERNET", "x": "Préstamo de equipos de cómputo y acceso gratuito a internet, permitiendo que los usuarios investiguen, accedan a bases de datos, interactúen y realicen consultas.\nRequisitos Diligenciar el formulario. (redactar este como un requisito principal).\nAnexar la autorización de los padres si el usuario es menor de edad.\nALQUILER O PRÉSTAMO, DE ESPACIOS CULTURALES Alquiler o préstamo del Salón cultural\nRequisitos: Carta de solicitud la cual debe ser radicada con 15 días de anticipación al siguiente correo: - asist.cultura@sesquile cundinamarca.gov.co\nTT”\n———————— ~ pea ;\nOQ\nees aUee Cornea\n| oePo | | ———"}, {"s": "Secretaría de Hacienda", "t": "INSCRIPCIÓN DE ESTABLECIMIENTOS COMERCIALES", "x": "Toda persona, empresa o sociedad que comience actividades gravadas con el impuesto de Industria y Comercio en Sesquilé, incluso las exentas, debe registrarse ante la Secretaría de Hacienda dentro de los 30 días siguientes al inicio de actividades. El impuesto se aplicará desde la fecha en que comiencen dichas actividades.\nRequisitos:\nPuede registrarte en la Secretaría de Hacienda o a través del siguiente enlace: https://sesquile.universo- online.com.co/Default.aspx\n-Uso del suelo actualizado (Exclusivo para quienes ejercen la actividaden establecimiento comercial)\nEste documento debe contener el concepto VIABLE para la actividad que se va a desarrollar, la cual debe coincidir con los\ndemás documentos aportados. -Registro Único Tributario -RUT -Cámara de comercio actualizada -Copia de cédula del representante legal"}, {"s": "Secretaría de Hacienda", "t": "PAGO DE IMPUESTO INDUSTRIA Y COMERCIO ANUAL", "x": "El Impuesto de Industria y Comercio en Sesquilé se aplica a todas las actividades industriales, comerciales o de servicios realizadas en el municipio, ya sea de forma permanente u ocasional, con o sin establecimiento comercial. Este impuesto se genera desde el inicio de dichas actividades.\nRequisitos:\nPara realizar el pago, acceda a la plataforma online,
