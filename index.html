regístrese, complete y firme el formulario, y pague mediante el botón de PSE (sin necesidad de enviar soportes\na laSecretaría de Hacienda).\nTambién puede acercarse a la Secretaría de Hacienda con los datos requeridos y se le orientará para realizar la declaración,\npara que pueda ser cancelada en entidad Bancaria\nBancolombia\nEl pago posterior a la última fecha establecida dará lugar a intereses y sanción por\nextemporaneidad. El contribuyente debe enviar el soporte de pago junto con la declaración a los correos\nasist.hacienda@sesquile-cundinamarca.gov.co o profesional.hacienda@sesquile-cundinamarca.gov.co."}, {"s": "Secretaría de Hacienda", "t": "RETEICA", "x": "Es un mecanismo que facilita, asegura y acelera el recaudo del impuesto de Industria y Comercio de manera gradual para personas naturales, jurídicas y sociedades de hecho, ya sea que tengan establecimiento en Sesquilé o realicen actividades temporales en el municipio.\nRequisitos:\nDiligencia el formulario en la página web y paga por PSE, o envía el formato de declaración al municipio por correo electrónico, adjuntando el detalle y el soporte de pago.\nDebe ingresar al link https://sesquile.universo-online.com.co/default.aspx - consultar los videos tutoriales - registrarse e ingresar y\nrealizar la declaración y pago por PSE"}, {"s": "Secretaría de Hacienda", "t": "EMISIÓN DE FACTURAS PARA EL PAGO DE LOS SIGUIENTES SERVICIOS DE LA ALCALDÍA", "x": "Guía de movilización ICA. Alquiler de maquinaria. Alquiler de Bus, Busetón o ruta de la salud. Alquiler de espacios en la plaza multiservicios y centro de despacho.\nRequisitos: Para solicitar el servicio, acérquese a la\nSecretaría correspondiente y gestione\nel recibo de pago en la Secretaría de\nHacienda."}, {"s": "Secretaría de Desarrollo Social", "t": "PROGRAMAS DE PREVENCIÓN Y PROMOCIÓN DE LA SALUD", "x": "La promoción de la salud y la prevención de la enfermedad son todas aquellas acciones, procedimientos e intervenciones integrales, orientadas a que la población, mejore sus condiciones para vivir y disfrutar de una vida saludable y para mantenerse sanos.\nRequisitos: Ser residente del municipio Algunos programas se adelantan mediante visitas domiciliarias de\nlos profesionales en salud de la Secretaría de Desarrollo Social. Asistir y participar en convocatorias del Hospital y la Secretaría de\nDesarrollo Social."}, {"s": "Secretaría de Desarrollo Social", "t": "CLUB DE TAREAS", "x": "Es una estrategia de acompañamiento escolar que brinda asesorías en matemáticas, biología, química y física, fortaleciendo los procesos de aprendizaje, los hábitos de estudio y el desempeño académico de niñas, niños y adolescentes. Cuenta con atención presencial en Boitá, Boitivá, Nescuatá, El Hato y en el centro urbano, además de asesorías virtuales. Adicionalmente, desarrolla la estrategia Prepara tu ICFES para estudiantes de 10° y 11°, orientada al refuerzo de estas áreas para la presentación de las pruebas de Estado y el acceso a la educación superior\nRequisitos: Formulario de inscripción virtual Copia del documento de identidad Consentimiento informado firmado por padres o adulto\nresponsable.\nEmail: clubdetareassesquile@gmail.com\nTeléfono: 3125505966 y 3223225326"}, {"s": "Secretaría de Desarrollo Social", "t": "DEVOLUCIÓN DE IVA", "x": "Como medida de apoyo económico para los hogares más pobres, el Gobierno Nacional adelantó el esquema de la devolución del IVA. Consiste en que las familias de menores ingresos reciban recursos que aliviarán el impacto del impuesto que grava el consumo de productos y servicios de las personas más vulnerables.\nRequisitos: La focalización es realizada por el Departamento para la Prosperidad\nSocial mediante un sistema de información automatizado. El registro del SISBÉN es un requisito para identificar los más vulnerables, pero no otorga el beneficio de la devolución. Recuerde\nrealizar su actualización en el SISBÉN IV de manera oportuna."}, {"s": "Secretaría de Desarrollo Social", "t": "ORDENANZA 037 Y 055 SUBSIDIOS ECONÓMICOS A ADULTOS MAYORES NO CUBIERTOS CON NINGÚN OTRO PROGRAMA Se otorgan subsidioseconómicos a adultos mayores no cubiertos con ningún otro programa.", "x": "Requisitos: No ser beneficiario de otros programas sociales.\nNo tener propiedades a su nombre. Tener régimen subsidiado en salud. Antigüedad mínima de 5 años en el municipio, ininterrumpido. Ser colombiano y residir en el territorio nacional hace más de 10 años.\nCopia de la cédula. Diligenciamiento de documentos en la oficina de la Secretaría de\nDesarrollo Social. Firmar formato de declaración juramentada que no se recibe ingreso ni\npensión. Si se reside en área rural aplica para subsidio de transporte"}, {"s": "Secretaría de Desarrollo Social", "t": "PROCESOS Y EMPODERAMIENTO", "x": "Desarrollar procesos de formación y empoderamiento para mujeres y población diversa del municipio, mediante cursos certificados por el SENA orientados al fortalecimiento de competencias laborales, productivas y personales. Estas capacitaciones, en áreas como cocina, manualidades y confección, brindan herramientas prácticas para el emprendimiento, el autoempleo y la generación de ingresos, promoviendo la autonomía económica y el mejoramiento de la calidad de vida.\nRequisitos: Ser mayor de 14 años. Residir en el municipio de Sesquilé. Contar con documento de identidad.\nEstar inscrita en Sofía Plus. Disponibilidad para asistir a las clases."}, {"s": "Secretaría de Desarrollo Social", "t": "ESPACIOS DE ESCUCHA Y ACOMPAÑAMIENTO", "x": "Es una estrategia de acompañamiento psicológico gratuito, seguro y confidencial dirigida a mujeres y población diversa de Sesquilé, que brinda un espacio de escucha, apoyo y orientación. A través de la atención profesional, se promueve el bienestar emocional, el reconocimiento de las propias emociones y el fortalecimiento de herramientas para afrontar las situaciones cotidianas, fomentando el autocuidado y la autonomía en cada proceso personal.\nRequisitos: Ser residente del municipio de Sesquilé. Contar con disponibilidad para las atenciones presenciales o virtuales."}, {"s": "Secretaría de Desarrollo Social", "t": "PLATAFORMA DE JUVENTUD", "x": "Es un espacio de convergencia que reúne organizaciones juveniles para facilitar la participación activa de los jóvenes en ámbitos sociales, políticos, culturales y ambientales, promoviendo el intercambio de experiencias y el fortalecimiento de capacidades organizativas y de liderazgo. De acuerdo con el artículo 15 de la Ley 1885 de 2018, constituye además un mecanismo formal de participación que garantiza la incidencia de la juventud en políticas públicas y proyectos comunitarios, funcionando como puente entre los jóvenes y las instituciones, y promoviendo inclusión, corresponsabilidad y desarrollo integral."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PUBLICACIÓN DE OFERTAS DE EMPLEO", "x": "Establecer estrategias de colaboración con empresas locales para promover ofertas laborales, facilitando la vinculación de la población y mejorando su calidad de vida, gestionando las solicitudes de empresas que requieren personal através del correo del área de emprendimiento.\nRequisitos: COMUNIDAD CESANTE Ser residente del municipio de Sesquilé\nSer mayor de edad Los menores desde los 15 años pueden postularse con permiso especial de trabajo\nEnviar y mantener actualizada la hoja de vida al correo\nsesquile.emprendimiento@gmail.com Participar activamente en los procesos de selección\nNota: La base de datos se actualiza anualmente.\nSECTOR EMPRESARIAL Envíe un correo electrónico a emprendimiento@sesquile-cundinamarca.gov.co que incluya:\nPresentación breve de la empresa Nombre de la persona encargada del trámite cargo\nCorreo electrónico Teléfono de contacto Adjuntar el Registro Único Tributario (RUT) actualizado de la empresa Nota: Solo se publican ofertas laborales de empresas legalmente constituidas."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "GESTIÓN DE HOJA DE VIDA", "x": "Guiar y asesorar a quienes buscan empleo, proponiendo nuevas alternativas y mejorando las existentes.\nRequisitos: Ser mayor de edad (menor de edad a partir de los 15 años,\npueden tramitar permiso de trabajo especial)\nRadicar hoja de vida en el correo electrónico\nsesquile.emprendimiento@gmail.com (Mantener su hoja de vida actualizada) Participar activamente en los procesos de selección. Cumplir con los compromisos adquiridos con las empresas.\nNota: todos los años se realiza actualización de la base de\ndatos."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "TENENCIA RESPONSABLE DE ANIMALES DE COMPAÑÍA", "x": "Se realizan y coordinan acciones de capacitación, adopción de mascotas, acompañamiento y seguimiento, promoviendo el cuidado responsable y el bienestar de los animales de compañía.\nRequisitos: Inscripción solicitud de servicio en planilla de la Secretaría de\nCompetitividad, Desarrollo Económico y Ambiental.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "EMERGENCIAS EN ANIMALES DE COMPAÑÍA Y PRODUCCIÓN", "x": "Asistencia que se da cuando se encuentra un animal en una situación que requiera de asistencia técnica en emergencias acompañado con Bomberos o Policía Nacional.\nRequisitos: Inscripción solicitud de servicio en la Secretaría de Competitividad, Desarrollo Económico y Ambiental.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PROTECCIÓN DE FAUNA SILVESTRE", "x": "Atención de emergencias, incautación en compañía de autoridades y reubicación de las especies de fauna silvestre.\nRequisitos: Acercarse, escribir o llamar a la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co\nTeléfono: 3112341796"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "VENTANILLA ÚNICA DE RADICACIÓN", "x": "La ventanilla única de radicación es el servicio institucional de la Alcaldía para recibir y registrar de forma centralizada y estandarizada todas las PQRSDF (peticiones, quejas, reclamos, solicitudes, denuncias,\ny felicitaciones) sobre trámites y comunicaciones dirigidas a sus dependencias. Cada requerimiento se radica con número único, fecha y hora, lo que permite trazabilidad, seguimiento y control durante todo el ciclo de atención, según tiempos y procedimientos establecidos.\nSe presta por canales presenciales, virtuales o mixtos, articulado con sistemas de atención al ciudadano, gestión\ndocumental, caracterización de usuarios y tableros\ninstitucionales para monitoreo permanente del\ndesempeño del portafolio.\nCorreo electrónico: ventanillaunica@sesquile-cundinamarca.gov.co página web\ninstitucional - módulo de peticiones, quejas y reclamos."}, {"s": "Secretaría de Gobierno", "t": "RED DE APOYO, ZONAS SEGURAS", "x": "Articular esfuerzos con la Policía Nacional mediante el establecimiento de canales de comunicación permanentes, tales como radioteléfonos, teléfonos celulares y otros medios disponibles, que permitan mantener una comunicación directa, con el fin de prevenir la comisión de delitos, fortalecer la convivencia ciudadana y brindar apoyo oportuno a la comunidad del sector.\nRequisitos: Vinculación gratuita y voluntaria\nCarta de solicitud Residir en el municipio y comprobarlo con un certificado de\nresidencia."}, {"s": "Secretaría de Gobierno", "t": "EVENTOS Y/O ESPECTÁCULOS DE LAS ARTES ESCÉNICAS", "x": "Evaluación y autorización municipal para la realización de eventos y/o espectáculos de las artes escénicas, mediante la verificación de los requisitos legales, técnicos y de gestión del riesgo, con el fin de garantizar la seguridad de los asistentes y el cumplimiento de la normatividad vigente.\nDocumentos requeridos (cuando aplique): Para espectáculos públicos de las artes escénicas, el organizador deberá presentar la resolución como productor PULEP, el código del evento PULEP y el certificado de pago de la contribución parafiscal cultural.\nPasos del trámite: Radicar la solicitud ante la Alcaldía Municipal (Ventanilla Única o correo electrónico), con la documentación completa y mínimo\nquince (15) días hábiles antes del evento. La Secretaría de Gobierno revisa los documentos y define la\ncomplejidad del evento: si es no complejo, emite concepto\nfavorable o notifica ajustes; si es complejo, el organizador presenta el plan ante el CMGRD, que emite concepto técnico.\nEl día del evento, el Cuerpo Oficial de Bomberos de Sesquilé realiza inspección previa; si se subsanan las observaciones, la\nSecretaría de Gobierno emite la autorización definitiva."}, {"s": "Secretaría de Gobierno", "t": "REVISIÓN Y APROBACIÓN PLANES DE GESTIÓN DEL RIESGO DE EMERGENCIAS Y DE DESASTRES", "x": "Servicio orientado a la revisión y aprobación de los PGRDEPP como instrumento de planeación para la gestión del riesgo de desastres, dirigido a representantes de edificaciones públicas y privadas, establecimientos comerciales e industriales, instituciones educativas y demás personas o entidades que lo requieran en el municipio.\nRequisitos: Solicitud interpuesta por el ciudadano o la organización con la información completa que incluya nombre, teléfono de contacto, correo, dirección. Documento del Plan de Gestión de Riesgos de Emergencias y Desastres Radicar en la Alcaldía Municipal - Sede Central - Ventanilla Única – o mediante correo electrónico los documentos relacionados en los requisitos.\nProcedimiento:\nLa Ventanilla de Atención al Usuario asigna el radicado y traslada la solicitud\na la Coordinación del CMGRD. La Coordinación del CMGRD informa al peticionario la fecha de presentación del\nplan ante sus integrantes y, en caso de\nobservaciones, estas se comunican\ndurante la sesión o para que sean\nsubsanadas o corregidas. Una vez recibidas las correcciones, se emite el Concepto Técnico Documental\ndel Plan de Gestión del Riesgo de\nDesastres."}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR PERTURBACIÓN A LA POSESIÓN, LA TENENCIA Y LAS SERVIDUMBRES", "x": "Es una solicitud formal ante la inspección de Policía en caso de perturbación a la posesión, a la mera tenencia y al derecho de servidumbre, de conformidad al artículo 79 de la ley 1801 de 2016.\nRequisitos: -Solicitud de querella policiva de manera formal en la ventanilla\núnica para lo cual puede usar los canales disponibles\n-Citación -Decisión -Recursos"}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR COMPORTAMIENTOS QUE AFECTAN LA INTEGRIDAD URBANÍSTICA (MULTA ESPECIAL)", "x": "Es una solicitud formal presentada ante la Inspección de Policía para que se verifique y controle una presunta construcción ilegal, de conformidad con el artículo 135 del Código Nacional de Seguridad y Convivencia Ciudadana.\nRequisitos: -Queja u oficio\n-Citación -Decisión -Recursos"}, {"s": "Secretaría de Planeación", "t": "GESTIÓN DEL SISBÉN", "x": "La Secretaría opera la oficina local para la focalización de servicios sociales.\nTrámites:\nSolicitud de encuesta nueva (por cambio de domicilio o inconformidad). Actualización de datos y rectificaciones. Inclusión de personas (novedades) o retiros del hogar. Tiempos de Respuesta:\nVisita y encuesta local: Hasta 15 días hábiles. Publicación en base nacional (DNP): Aprox. 6 días hábiles tras validación.\nLEGALIZACIÓN Y TITULACIÓN DE PREDIOS\nProcesosenfocados enla formalización de la propiedad.\nAlcance: Cesión gratuita o enajenación de bienes fiscales y saneamiento de titulación de predios privados (falsa tradición). Beneficiarios: Hogares ocupantes (cesionarios) que requieren titularidad legal.\nOTROS TRÁMITES:\nCertificado de Nomenclatura Certificado de Estratificación Certificado de No Riesgo Para la solicitud de cualquiera de los documentos mencionados, el interesado deberá acercarse a la Secretaría de Planeación, presentando el recibo de pago correspondiente al certificado requerido, junto con una copia del recibo de pago del impuesto predial."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "ESCUELAS DE FORMACION ARTÍSTICA Y CULTURAL", "x": "Andina Latinoamericana, Música campesina,\nMúsica: Iniciación Musical (6-10 años), Escuela de cuerdas frotadas, Escuela de cuerdas pulsadas, Música Piano, Técnica Vocal, Ensamble Banda percusión, Banda Sinfónica, Marcial. (8 años en adelante).\nArtes Escénicas (5 años en adelante): Danza folclórica,\ncontemporánea, Ballet, urbana. Teatro Sala, Calle o Circo. (10 años en adelante)\nArtes plásticas: Grabado y Pintura, Muralismo, Escultura, Cerámica, Manualidades en tela y artes y oficios. (5 años en adelante) Artes visuales: Fotografía,Podcast, Edición de videos, Radio, ilustración digital. (12 años en adelante). Artes y Oficios: Manualidades. 12 años en adelante\nLiteratura: Exploradores de la palabra (hasta los 5 años); Exploradores de la palabra II (6-12 años); Club de lectura (Adultos); Circulo de la palabra (Mujeres).\nRequisitos: Realizar inscripción mediante formulario digital Cada profesor de las escuelas hará recepción de la\nsiguiente documentación:\nFotocopia del documento. Formato de permiso uso de imagen. Certificado afiliación a salud, no mayor a 30 días."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "ATENCIÓN Y PROMOCIÓN TURÍSTICA", "x": "Promoción y difusión de los comerciantes empresarios y operadores turísticos.\nFORMACIÓN Y CAPACITACIÓN A REPRESENTANTES DEL SECTOR TURISMO\nGestión y realización de talleres, foros, seminarios, conversatorios, encuentros para el sector turístico."}, {"s": "Oficina de Contratación", "t": "CERTIFICACIONES DE CONTRATOS", "x": "Expedición de certificados que acreditan la existencia, vigencia y condiciones de contratos para externos y contratistas.\nRequisitos: Realizar la solicitud vía correo electrónico o en la ventanilla\núnica de correspondencia de la alcaldía municipal.\nIndicar el número de contrato y año.\nofi.contratacion@sesquile-cundinamarca.gov.co tec.contratacion@sesquile-cundinamarca.gov.co"}, {"s": "Información general", "t": "HORARIOS DE ATENCIÓN E INSTALACIONES", "x": "Instalaciones de la Alcaldía Municipal: Palacio Municipal Sede Central, Edificio General Santander, Casa de la Cultura, Humilladero \"UMATA\".\nHorario de Atención al público: lunes a jueves: 7:30 a.m. - 12:30 p.m. y de 1:30 p.m. - 5:00 p.m. Viernes: 07:30 a.m. - 12:30 p.m. y de 1:30 p.m. - 4:30 p.m.\nHorario radicación en Ventanilla Única: lunes a jueves: 7:30 a.m. - 12:30 p.m. y de 1:30 p.m. - 4:00 p.m. Viernes: 07:30 a.m. - 12:30 p.m. y de 1:30 p.m. - 3:30 p.m.\nDirección: Carrera 6 No 5 – 19. Teléfono: +(57) 3106090754. Correo: ventanillaunica@sesquile-cundinamarca.gov.co. Página web: https://www.sesquile-cundinamarca.gov.co/Paginas/default.aspx. NIT: 899999415-2"}, {"s": "Información general", "t": "DIRECTORIO DE CONTACTOS Y DIRECCIONES DE LAS DEPENDENCIAS", "x": "Despacho del Alcalde: Carrera 6 # 5 - 19, tel. 3106098145\nSecretaría de Planeación: Carrera 6 # 5 - 19, tel. 3103274988\nSISBÉN: Carrera 6 # 5 - 19, tel. 3108102867\nSecretaría de Gobierno: Calle 5 # 4-54, tel. 3112323527\nEnlace Víctimas: Calle 5 # 4-54, tel. 3112359254\nComisaría de Familia: Calle 5 # 4-54, tel. 3112341829\nInspección de Policía: Calle 5 # 4-54, tel. 3143170665\nSecretaría de Hacienda: Carrera 6 # 5 - 19, tel. 3103245494\nSecretaría de Competitividad, Desarrollo Económico y Ambiental: Calle 6 # 6 –138, tel. 3112341796\nUnidad Municipal de Asistencia Técnica Agropecuaria-UMATA: Calle 6 # 6 –31, tel. 3112341796\nSecretaría de Infraestructura: Carrera 6 # 5 - 19, tel. 3112359248\nSecretaría de Desarrollo Social: Carrera 6 # 5-19, tel. 3112325428\nOficina de Turismo, Cultura y Patrimonio: Calle 5 # 7 - 15, tel. 3107624687\nOficina de Control Interno: Carrera 6 # 5 - 19, tel. 3112334706\nOficina de Contratación: Carrera 6 # 5 - 19, tel. 3106094942\nSecretaría General: Carrera 6 # 5 - 19, tel. 3104869969\nOficina Asesora Jurídica: Carrera 6 # 5 - 19, tel. 3106091739\nOficina de Relación Estado Ciudadano: Carrera 6 # 5 - 19, tel. 3106090754"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Qué documentos deben presentarse para adelantar el proceso de titulación en Boitá?", "x": "Para adelantar su trámite de titulación de mejora en el casco urbano periférico Siatoya, Boitá debe anexar: Carta de intención (aportada por la Oficina de Relación Estado Ciudadano) Fotocopia de la promesa de compraventa. Documentos de identificación del núcleo familiar. Facturas de servicios públicos (antigua y reciente) Facturas de impuesto predial (antiguo y reciente) Paz y salvo de impuesto predial Declaración Extraproceso (documento expedido en Notaria, para ello debe acercarse con dos testigos) Registro fotográfico de la mejora (casa). Nota: Todos los documentos deben presentarse en carpeta de cartón tamaño oficio con gancho legajador plástico."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cómo puedo solicitar el punto de agua para mi casa en Boitá?", "x": "La viabilización del punto de agua depende del estudio técnico y jurídico de los documentos presentados para la titulación, el cual es realizado por la Secretaría de Planeación. Posteriormente, dicha Secretaría envía un informe a la Oficina de Acuases, que se encarga de adelantar con cada usuario aprobado la instalación del punto de agua."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cómo puedo acceder al beneficio del peaje el Roble?", "x": "Para acceder al beneficio de la tarifa diferencial del peaje el roble debe aportar a la Oficina de Relación Estado Ciudadano los siguientes documentos: Fotocopia de cédula de ciudadanía Fotocopia de la tarjeta de propiedad del vehículo Certificado de residencia emitido por la Inspección de Policía Nota: Todos los documentos deben estar a nombre de la misma persona."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Puede una persona distinta al propietario del vehículo realizar la solicitud de beneficio en el descuento del peaje el roble?", "x": "Si, siempre y cuando toda la información plasmada en los soportes entregados corresponda al titular del vehículo."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Qué porcentaje de descuento aplica con el beneficio del peaje?", "x": "El descuento del peaje corresponde al 50% de la tarifa en un solo sentido “Bogotá- Tunja”"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cuánto tiempo tarda el proceso de revisión de documentos para el descuento del peaje?", "x": "El tiempo de revisión se encuentra sujeto a revisión y aprobación por parte de la ANI entidad encargada de validar cada solicitud."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "Sali beneficiado con el descuento del peaje. ¿Qué debo de hacer?", "x": "Instrucciones para la instalación del chip (TIE): El ciudadano debe dirigirse al segundo parqueadero del peaje en uno de los días habilitados: martes, miércoles o sábados, en el horario de 9:00 a.m. a 4:00 p.m. Allí deberá solicitar la instalación del chip TIE y cancelar el valorcorrespondiente de $19.000 pesos.Importante: Una vez instalada la tarjeta, la tarifa especial comenzaráa aplicar ocho (8) días después de la instalación. Nota: Por solicitud de la BTS, es obligatorio hacer uso del debido retorno, lo que implica que el ciudadano debe asumir el pago del peaje en ambos sentidos. Por esta razón, la Oficina de Relación Estado-Ciudadano recomienda programar la instalación del chip junto con otra diligencia personal fuera de Sesquilé. De este modo, el ciudadano contará con una razón adicional para utilizar el peaje, optimizando así su desplazamiento."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cómo puedo enterarme de los servicios que la Alcaldía ofrece?", "x": "Para dar a conocer la oferta y/o servicios institucionales, la Administración Municipal ha dispuesto los siguientes canales de difusión de información: Página web Alcaldía de Sesquilé: https://www.sesquilecundinamarca.gov.co/Paginas/Inicio.aspxAlcaldía Sesquilé@alcaldiasesquile3471@Alcaldía Sesquilé"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Por qué medios puedo radicar una PQRSDF?", "x": "Puede realizar su PQRSDF a través de los siguientes medios dispuestos por la Administración Municipal para tal fin: Correo electrónico ventanillaunica@sesquile-cundinamarca.gov.coTeléfono celular y WhatsApp: 3106090754Página web Portal de PQRSDF: https://sesquile.orfeoexpress.com/ng_backend/frontend/web/site/signup"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cómo puedo hacer seguimiento al estado de una PQRSDF?", "x": "Para hacer seguimiento a su PQRSDF, puede utilizar cualquiera de los canales dispuestos para la atención al ciudadano: Vía telefónica 3106090754.A través WhatsApp: https://wa.me/qr/5YLHKALLBO3QI1Por correo electrónico: ventanillaunica@sesquilecundinamarca.gov.coO en la Ventanilla Única de radicación.: Carrera 6 No. 5-19 “PRIMER PISO” Nota: Si entre los siguientes 15 días hábiles, no ha recibido respuesta, podrá consultar el estado de su solicitud utilizando el número de radicado que le fue entregado en la etiqueta de recibido."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Qué tipo de solicitudes puedo hacer en la ventanilla única de radicación?", "x": "En la Ventanilla Única se radican todo tipo de correspondencia que sea competencia de la administración municipal, en dado caso de corresponder a otra entidad se brinda la información correspondiente para que el usuario pueda realizar su solicitud o trámite ante la misma."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Qué tipo de información puedo consultar a través de la página web de la Alcaldía de Sesquilé?", "x": "En la página web de la Alcaldía de Sesquilé, puede acceder a información institucional, normativa, planes de desarrollo, presupuestos, convocatorias, noticias de interés, agenda de eventos, servicios al ciudadano, trámites en línea, así como canales de atención y participación ciudadana. También podrá consultar publicaciones oficiales y acceder a plataformas de transparencia y rendición de cuentas."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cómo puedo solicitar que una información o aviso sea publicado en página Web?", "x": "La información puede ser enviada al correo de estadociudadano@sesquile-cundinamarca.gov.co dicha información debe pasar por revisión y aprobación para publicación."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "¿Cuáles son los horarios de atención que maneja la Alcaldía de Sesquilé?", "x": "El horario de Radicación y Atención en la Administración Municipal es: Horario de Radicación: Lunes a jueves de 7:30am a 4:00pm y los viernes de 7:30am a 3:30pm. Horario de atención: Lunes a jueves de 7:30am a 5:00pm y los viernes de 7:30am a 4:30pm."}, {"s": "Secretaría de Hacienda", "t": "¿Cómo consulto y pago mi factura del impuesto predial?", "x": "A través del siguiente enlace podrá consultar, descargar y pagar mediante PSE la factura del impuesto predial: 👉https://sesquile.universo-online.com.co/default.aspx Allí encontrará un video tutorial que lo guiará en el proceso."}, {"s": "Secretaría de Hacienda", "t": "¿Puedo descargar el paz y salvo del impuesto predial mediante la página web?", "x": "No. Únicamente se solicita de manera presencial en la Secretaría de Hacienda, ubicada en la Cra. 6 No. 5-19, primer piso, en el horario de atención: Lunes a jueves de 7:30 a. m. a 12:30 p. m. y de 1:30 p. m. a 5:00 p. m.; Viernes de 7:30 a. m. a 12:30 p. m. y de 1:30 p. m. a 4:30 p. m. También puede solicitarlo a través del correo electrónico asist.hacienda@sesquile-cundinamarca.gov.co."}, {"s": "Secretaría de Hacienda", "t": "¿A través de qué medio puedo solicitar el histórico de pagos del impuesto predial?", "x": "Puede solicitarlo mediante correo electrónico a asist.hacienda@sesquile-cundinamarca.gov.co, indicando los datos específicos del predio (código catastral, número de documento y nombre completo del propietario)."}, {"s": "Secretaría de Hacienda", "t": "¿Cómo se registra una empresa o persona para pagar el Impuesto de Industria y Comercio y su complementario de Avisos y Tableros?", "x": "Debe inscribirse ingresando al siguiente enlace: 👉https://sesquile.universo-online.com.co/default.aspx O acercarse a la Secretaría de Hacienda (Cra. 6 No. 5-19, primer piso) en el horario de atención indicado anteriormente, para adelantar el trámite de Registro de Industria y Comercio. Debe presentar:RUT actualizado.Cámara de Comercio actualizada.Cédula del propietario.Certificado de uso del suelo (que contenga los datos de la actividad económica a realizar)."}, {"s": "Secretaría de Hacienda", "t": "¿Quiénes deben declarar y pagar el Impuesto de Industria y Comercio y su complementario de Avisos y Tableros?", "x": "Todas las personas naturales o jurídicas que desarrollen un negocio o actividad económica en el municipio de Sesquilé."}, {"s": "Secretaría de Hacienda", "t": "¿Cada cuánto se paga el Impuesto de Industria y Comercio y su complementario de Avisos y Tableros?", "x": "De acuerdo con la normatividad, este impuesto se paga anualmente, realizando la presentación y el pago mediante PSE a través del siguiente enlace: 👉https://sesquile.universo-online.com.co/default.aspx"}, {"s": "Secretaría de Hacienda", "t": "¿Qué normatividad se encuentra vigente en materia tributaria en el municipio?", "x": "Puede consultar el Acuerdo Municipal No. 025 de 2019, donde se estableció el Estatuto Tributario Municipal, en el siguiente enlace: 👉 https://www.sesquile-cundinamarca.gov.co/Transparencia/Paginas/Estatuto-Tributario-Sesquil%C3%A9.aspx"}, {"s": "Secretaría de Hacienda", "t": "¿Qué pasa si no pago a tiempo el Impuesto de Industria y Comercio y su complementario de Avisos y Tableros?", "x": "Se deberá pagar una sanción por extemporaneidad e intereses de mora generados."}, {"s": "Secretaría de Hacienda", "t": "¿Qué se debe reportar en la declaración del Impuesto de Industria y Comercio y su complementario de Avisos y Tableros?", "x": "Se deben reportar los ingresos brutos, exenciones, deducciones y la tarifa aplicada, de acuerdo con la actividad económica."}, {"s": "Secretaría de Hacienda", "t": "¿Se debe declarar si no hubo ingresos durante el periodo?", "x": "Sí. Se debe presentar la declaración en cero, aunque no se hayan generado ingresos durante el periodo."}, {"s": "Secretaría de Hacienda", "t": "¿Dónde se declara y paga la retención de ICA?", "x": "A través del siguiente enlace podrá registrarse, presentar y pagar la retención del Impuesto de Industria y Comercio: 👉https://sesquile.universo-online.com.co/default.aspx"}, {"s": "Secretaría de Hacienda", "t": "¿Cada cuánto se paga la retención de Industria y Comercio?", "x": "La declaración y el pago se realizan bimestralmente, de acuerdo con el calendario tributario establecido para cada vigencia."}, {"s": "Secretaría de Hacienda", "t": "Al consultar el Registro de Medidas Correctivas me aparece una multa en mi contra.", "x": "En este caso, le fue impuesta una orden de comparendo por una infracción al Código Nacional de Seguridad y Convivencia Ciudadana (Ley 1801 de 2016). Al no haberse efectuado el pago dentro del término establecido, fue reportada en el Registro Nacional de Medidas Correctivas."}, {"s": "Secretaría de Hacienda", "t": "¿Dónde puedo consultar el valor a pagar por las multas?", "x": "Acérquese a la Secretaría de Hacienda con su número de cédula. Allí le indicarán el valor a pagar, incluyendo los intereses moratorios diarios."}, {"s": "Secretaría de Hacienda", "t": "¿Cómo se puede realizar el pago de las multas?", "x": "Puede acercarse a la Secretaría de Hacienda, donde le informarán el valor total adeudado y le entregarán la factura para pago en corresponsales Bancolombia. También puede solicitar la liquidación y la factura de pago a través del correo electrónico coactivo.hacienda@sesquile-cundinamarca.gov.co."}, {"s": "Secretaría de Hacienda", "t": "¿Qué sucede si no pago la multa impuesta por infracción al Código de Seguridad y Convivencia Ciudadana?", "x": "Dentro del primer mes: cobro de interés moratorio diario.Reporte al Registro Nacional de Medidas Correctivas.Después de 90 días: inicio de cobro coactivo con intereses moratorios diarios.Después de 6 meses, no podrá:Obtener o renovar permiso de tenencia o porte de armas.Ser nombrado o ascendido en un cargo público.Ingresar a escuelas de formación de la Fuerza Pública.Contratar o renovar contratos con cualquier entidad del Estado.Obtener o renovar el registro mercantil en las cámaras de comercio."}, {"s": "Secretaría de Hacienda", "t": "¿Qué opciones tengo para el pago?", "x": "Pago de contado.Acuerdo de pago en cuotas."}, {"s": "Secretaría de Hacienda", "t": "¿Cómo puedo acogerme al acuerdo de pago?", "x": "Debe diligenciar el formato establecido por la Secretaría de Hacienda y realizar el pago del 30 % del valor total liquidado como requisito inicial para suscribir el acuerdo."}, {"s": "Secretaría de Hacienda", "t": "¿Si me acojo al acuerdo de pago, los intereses siguen generándose a diario?", "x": "No. Al suscribir el acuerdo de pago, los intereses se congelan y el valor de las cuotas se mantiene fijo según lo pactado en el acto administrativo otorgado."}, {"s": "Secretaría de Hacienda", "t": "¿Qué sucede si incumplo el acuerdo de pago?", "x": "El acto administrativo que otorgó el acuerdo perderá vigencia y la deuda será reliquidada con intereses actualizados a la fecha"}, {"s": "Secretaría de Hacienda", "t": "¿En qué momento se cierra el proceso de cobro coactivo?", "x": "El proceso se cierra y archiva cuando el infractor:Realiza el pago total de la multa,Finaliza el pago de todas las cuotas establecidas en el acuerdo de pago, Por solicitud expresa del Inspector de Policía. La Secretaría de Hacienda expedirá el acto administrativo correspondiente y lo remitirá a la Inspección de Policía para su conocimiento y fines pertinentes."}, {"s": "Secretaría de Planeación", "t": "¿Qué es la Licencia de Construcción en términos generales?", "x": "Es la autorización previa necesaria para desarrollar edificaciones, áreas de circulación y zonas comunales en uno o varios predios. Esta licencia debe estar conforme con lo dispuesto en el Plan de Ordenamiento Territorial (POT) y demás normatividad aplicable. Define de manera específica los usos, la edificabilidad, la volumetría, la accesibilidad y otros aspectos técnicos aprobados para la edificación."}, {"s": "Secretaría de Planeación", "t": "¿Qué modalidad de licencia se requiere para construir en un predio que nunca ha tenido una edificación o cuya área fue demolida completamente?", "x": "Se requiere la modalidad de Obra Nueva, que autoriza el desarrollo de obras de edificación en predios no construidos o libres por autorización de demolición total."}, {"s": "Secretaría de Planeación", "t": "¿Qué modalidad de licencia se debe solicitar si se desea incrementar el área construida de una edificación ya existente?", "x": "Debe solicitarse la modalidad de Ampliación, que autoriza el incremento del área construida de una edificación existente."}, {"s": "Secretaría de Planeación", "t": "¿Qué modalidad se utiliza si se busca cambiar la destinación de un inmueble (por ejemplo, de vivienda a oficina), manteniendo la estructura existente?", "x": "Se debe solicitar la modalidad de Adecuación, que autoriza el cambio de uso de una edificación o parte de ella, garantizando la permanencia total o parcial del inmueble original."}, {"s": "Secretaría de Planeación", "t": "¿Cuál es la diferencia entre la modalidad de Modificación y la de Ampliación?", "x": "La Modificación autoriza variar el diseño arquitectónico o estructural de una edificación existente sin aumentar su área construida. La Ampliación, en cambio, permite incrementar el área construida"}, {"s": "Secretaría de Planeación", "t": "¿Qué modalidad se requiere si la edificación necesita ser acondicionada a las normas de seguridad sismorresistente vigentes?", "x": "Se requiere la modalidad de Reforzamiento Estructural, que autoriza la intervención o refuerzo de la estructura de uno o varios inmuebles con el fin de adecuarlos a los niveles de seguridad sismorresistente establecidos en la Ley 400 de 1997 y sus reglamentos."}, {"s": "Secretaría de Planeación", "t": "¿Cuándo se requiere una Licencia de Demolición?", "x": "La Demolición es la autorización para derribar total o parcialmente una o varias edificaciones existentes. Debe concederse de manera simultánea con otra modalidad de licencia de construcción. No se requiere esta modalidad cuando se trate de programas o proyectos de renovación urbana, cumplimiento de orden judicial o administrativa, o ejecución de obras de infraestructura vial o de servicios públicos."}, {"s": "Secretaría de Planeación", "t": "Si una edificación fue afectada por un siniestro y contaba con licencia original, ¿qué modalidad se otorga para volver a construir?", "x": "Se otorga la modalidad de Reconstrucción, que permite volver a construir la edificación en las mismas condiciones aprobadas por la licencia original o acto de reconocimiento, cumpliendo las normas actuales de sismo resistencia y accesibilidad."}, {"s": "Secretaría de Planeación", "t": "¿Qué es el Reconocimiento de la Existencia de Edificaciones?", "x": "Es la actuación mediante la cual la autoridad competente (curador urbano o autoridad municipal/distrital) declara la existencia de edificaciones que fueron construidas sin contar con la respectiva licencia."}, {"s": "Secretaría de Planeación", "t": "¿Qué requisitos mínimos de antigüedad deben cumplir las edificaciones para solicitar su reconocimiento?", "x": "La edificación debe haberse concluido como mínimo cinco (5) años antes de la fecha de la solicitud. Este término no aplica cuando el reconocimiento se tramite por orden judicial o administrativa."}, {"s": "Secretaría de Planeación", "t": "Además de la antigüedad, ¿qué otra condición fundamental debe cumplir la edificación para que proceda su reconocimiento?", "x": "La edificación debe cumplir con el uso permitido por las normas urbanísticas vigentes."}, {"s": "Secretaría de Planeación", "t": "Si se desea ampliar una construcción ejecutada sin licencia, ¿es obligatorio tramitar el Reconocimiento antes de la Ampliación?", "x": "Sí. Cuando la solicitud de licencia se presenta sin contar con la licencia original o sus planos, se debe tramitar previamente el Reconocimiento de la Existencia de Edificaciones, conforme a lo establecido en el Decreto 1077 de 2015"}, {"s": "Secretaría de Planeación", "t": "¿Quién es la autoridad competente para ejercer el control y vigilancia del cumplimiento de la licencia después de su expedición?", "x": "La competencia para el control urbano posterior (vigilancia del cumplimiento de la licencia) recae en las inspecciones de policía."}, {"s": "Secretaría de Planeación", "t": "¿Qué autoridades son responsables de sancionar a quienes construyen sin contar con la respectiva licencia urbanística?", "x": "La competencia sancionatoria por construcción sin licencia recae en las inspecciones de policía"}, {"s": "Secretaría de Planeación", "t": "¿Puede el curador urbano o la secretaría de planeación que expidió una licencia ejercer acciones de control o imponer sanciones por infracciones urbanísticas posteriores?", "x": "No. De acuerdo con el Decreto Nacional 1077 de 2015, el control urbano y la imposición de sanciones por infracciones recaen en las inspecciones de policía y alcaldías locales, no en el curador urbano ni en la dependencia municipal encargada del licenciamiento."}, {"s": "Secretaría de Planeación", "t": "¿Cuál es la documentación general y adicional requerida para solicitar una Licencia Urbanística, conforme al Decreto 1077 de 2015?", "x": "I. Documentación de Carácter General (obligatoria para toda solicitud)Certificado de Libertad y Tradición: Copia del certificado del inmueble, con fecha de expedición no superior a un (1) mes.Formulario Único Nacional: Diligenciado completamente por el solicitante.Identificación del Solicitante:Copia del documento de identidad (personas naturales).Certificado de existencia y representación legal (personas jurídicas).Poder Especial: En caso de actuar mediante apoderado, debe estar debidamente otorgado y autenticado.Impuesto Predial: Copia del documento o declaración del último año.Relación de Colindantes: Dirección de los predios colindantes al proyecto.Profesionales Intervinientes: Copia de las matrículas profesionales y certificaciones requeridas. II. Documentación Adicional según la Modalidad de Licencia A. Obra Nueva:Cálculos y diseños estructurales.Memorias de elementos no estructurales.Estudio de suelos y geotécnico.Planos estructurales y arquitectónicos.Revisión estructural independiente (cuando aplique).Anteproyecto aprobado (si interviene Bien de Interés Cultural - BIC).Anexo de construcción sostenible.Certificación de disponibilidad inmediata de servicios públicos. B. Ampliación, Modificación, Adecuación, Reforzamiento o Reconstrucción:Licencias anteriores o acto de reconocimiento.Autorización de la Propiedad Horizontal (si aplica).Anteproyecto aprobado (si interviene BIC).Documentos técnicos correspondientes según el tipo de intervención. C. Demolición:Documentación requerida por la modalidad de construcción solicitada simultáneamente.No se requiere cuando se trate de renovación urbana, orden judicial/administrativa o infraestructura vial o de servicios públicos. D. Cerramiento:Planos estructurales y arquitectónicos detallados.Anteproyecto aprobado (si interviene BIC).Si se tramita junto a otra licencia, se sumarán los metros lineales del cerramiento al área total. E. Acto de Reconocimiento:Peritaje técnico y diseño de reforzamiento estructural.Levantamiento arquitectónico firmado por arquitecto.Declaración de antigüedad (mínimo 5 años).Planos de modificación (si se requieren).Supervisión técnica independiente (si supera los 2.000 m² de área construida)."}, {"s": "Secretaría de Planeación", "t": "¿Qué es el SISBÉN?", "x": "El SISBÉN (Sistema de Identificación de Potenciales Beneficiarios de Programas Sociales) permite clasificar a la población de acuerdo con sus condiciones de vida e ingresos."}, {"s": "Secretaría de Planeación", "t": "¿Para qué se usa el SISBÉN?", "x": "Se utiliza para focalizar la inversión social y garantizar que los programas y beneficios lleguen a quienes más los necesitan."}, {"s": "Secretaría de Planeación", "t": "¿Cómo se clasifica la población en el SISBÉN?", "x": "La clasificación se obtiene a partir de la información recolectada en la ficha de caracterización socioeconómica, la cual puede actualizarse mediante registros administrativos del Registro Social de Hogares"}, {"s": "Secretaría de Planeación", "t": "¿Cuántos grupos hay en el SISBÉN IV?", "x": "Existen cuatro grupos: A, B, C y D, cada uno con sus respectivos subgrupos, según el nivel de vulnerabilidad o capacidad económica del hogar."}, {"s": "Secretaría de Planeación", "t": "¿Cómo puedo consultar mi clasificación en el SISBÉN?", "x": "Puedes consultar tu clasificación ingresando a la página web oficial del SISBÉN, utilizando tu tipo y número de documento de identidad."}, {"s": "Secretaría de Planeación", "t": "¿Qué debo hacer si no estoy de acuerdo con mi clasificación?", "x": "Debes acercarte a la Oficina del SISBÉN del municipio y solicitar la revisión de tu caso."}, {"s": "Secretaría de Planeación", "t": "¿La encuesta del SISBÉN tiene algún costo?", "x": "No. La encuesta del SISBÉN es totalmente gratuita."}, {"s": "Secretaría de Planeación", "t": "¿El SISBÉN es un seguro?", "x": "No. El SISBÉN no es un seguro; es una base de datos que permite acceder a programas sociales según la clasificación del hogar."}, {"s": "Comisaría de Familia", "t": "¿Qué procesos adelanta la Comisaría de Familia?", "x": "Conciliaciones de alimentos y otras disposiciones en favor de niñas, niños, adolescentes (NNA) y adultos mayores. Verificación de derechos de NNA. Procesos de Restablecimiento de Derechos de NNA. Implementación de medidas de protección en casos de violencia en el contexto familiar."}, {"s": "Comisaría de Familia", "t": "¿Cuáles son los requisitos para presentar una solicitud de conciliación de alimentos en favor de un NNA o adulto mayor?", "x": "Formato de Atención al Usuario (Comisaría de Familia). Copia de la Tarjeta de Identidad o Registro Civil de Nacimiento del NNA. Copia del Certificado Estudiantil o copia del último boletín estudiantil (si aplica). Copia del carnet de vacunas del NNA. Copia de diagnósticos de salud (si existen). Copias de las cédulas de ciudadanía de los progenitores."}, {"s": "Comisaría de Familia", "t": "¿Cuáles son los requisitos para presentar una denuncia por violencia intrafamiliar?", "x": "Documento de identidad de la persona denunciante (si aplica). Relato claro de los hechos (lugar, fecha, personas involucradas). Pruebas, si las hay: fotografías, mensajes, certificados médicos, testigos, entre otros. En algunos casos, se puede denunciar de forma anónima o sin pruebas directas; el comisario puede ordenar las verificaciones correspondientes."}, {"s": "Comisaría de Familia", "t": "¿Cuál es la ruta de atención cuando se reporta un caso de violencia intrafamiliar en la Comisaría de Familia?", "x": "Recepción de la solicitud mediante el formato correspondiente. Dirección al equipo interdisciplinario para la valoración inicial. En casos de violencia física, remisión inmediata para atención médica. Adopción de medidas de protección provisional. Notificación a las partes involucradas: presunto agresor, comando de Policía, ente judicial de turno, sector salud y otras entidades de apoyo (como Línea Amiga de la Mujer)."}, {"s": "Comisaría de Familia", "t": "¿Cuál es la ruta a seguir cuando se solicita una verificación de derechos y/o un proceso de Restablecimiento de Derechos en la Comisaría de Familia?", "x": "Recepción del reporte. Notificación al equipo interdisciplinario, el cual realiza la valoración psicológica, la verificación de derechos y sugiere las medidas necesarias, así como la apertura del proceso de Restablecimiento de Derechos, si corresponde. Apertura de la medida de protección o del Proceso de Restablecimiento de Derechos. Notificación a las partes involucradas. En caso de que se requiera el retiro del NNA a un hogar de paso, hogar sustituto o institución, se adelantan todas las diligencias necesarias: notificaciones, solicitud de cupos y coordinación del traslado."}, {"s": "Secretaría de Gobierno", "t": "¿Qué implica estar caracterizado dentro del municipio como víctima del conflicto armado?", "x": "Estar caracterizado como víctima del conflicto armado implica que el municipio le reconoce como parte de su población víctima y le incluye en sus bases de datos oficiales. Esto permite: Priorizar su atención dentro de la oferta institucional. Garantizar la asignación de recursos dirigidos a la población caracterizada. Acceder a programas, ayudas y acompañamiento institucional. Ser priorizado en la planeación local. Facilitar el acceso a la oferta social del municipio."}, {"s": "Secretaría de Gobierno", "t": "¿Qué es el Plan de Contingencia y dónde debe radicarse para la autorización de eventos?", "x": "El Plan de Contingencia es un documento obligatorio que establece las acciones de prevención, control y atención de emergencias durante la realización de un evento o espectáculo público en el municipio de Sesquilé. Debe estar firmado por el representante legal del evento y cumplir con la normatividad vigente, especialmente la Ley 1523 de 2012 y demás normas concordantes. Este documento debe radicarse en la Alcaldía Municipal de Sesquilé, a través de la Ventanilla Única o mediante correo electrónico, junto con los demás requisitos del trámite, con mínimo quince (15) días hábiles de anticipación a la fecha del evento."}, {"s": "Secretaría de Gobierno", "t": "¿Cuáles son los requisitos para realizar perifoneo o utilizar altavoces, megáfonos o similares en el municipio?", "x": "Para realizar perifoneo o utilizar altavoces, megáfonos o similares, se debe: Presentar solicitud dirigida a la Secretaría de Gobierno, indicando la actividad industrial, comercial o de servicios, debate o acontecimiento a anunciar, especificando los días y horarios en que se realizará. Una vez obtenido el aval de la Secretaría de Gobierno, cancelar en la Secretaría de Hacienda los derechos correspondientes, equivalentes a 0,5 UVT por cada hora o fracción. La Secretaría de Gobierno expedirá la autorización, teniendo en cuenta que el permiso se otorgará por lapsos diarios de hasta tres (3) horas y por periodos que no excedan cinco (5) días continuos."}, {"s": "Secretaría de Gobierno", "t": "¿Cuál es la ruta de atención para las víctimas de desplazamiento forzado?", "x": "La ruta de atención es la siguiente: 1. Declaración del hecho victimizante La persona desplazada debe rendir declaración ante: Personería Municipal Defensoría del Pueblo Procuraduría La declaración puede realizarse en el municipio donde la persona se encuentre, no necesariamente donde ocurrió el desplazamiento. 2. Inscripción en el Registro Único de Víctimas (RUV) La declaración es remitida a la Unidad para las Víctimas, entidad que evalúa el caso y decide sobre la inclusión en el Registro Único de Víctimas (RUV). El municipio realiza seguimiento al proceso. El trámite puede tardar hasta sesenta (60) días hábiles. 3. Atención humanitaria inmediata (a cargo del municipio) Mientras se define la inclusión en el RUV, el municipio debe garantizar: Alojamiento temporal (si es necesario). Alimentación. Atención básica en salud. Orientación y acompañamiento psicosocial. Esta atención es obligatoria e inmediata, incluso antes de la inclusión en el RUV. 4. Atención humanitaria de emergencia y transición Una vez incluida la persona en el RUV: Puede acceder a ayudas humanitarias (económicas o en especie). El municipio apoya la gestión y caracterización del hogar. Se identifican necesidades en salud, educación, vivienda y generación de ingresos. 5. Acceso a la oferta institucional municipal El municipio debe priorizar a la víctima en programas como: Afiliación al sistema de salud. Asignación de cupos escolares y apoyos educativos. Programas sociales (Sisbén, adulto mayor, infancia, entre otros). Capacitación laboral o emprendimiento. Subsidios o proyectos de vivienda, según disponibilidad."}, {"s": "Secretaría de Gobierno", "t": "¿Quién otorga la autorización para la tala de árboles o aprovechamiento forestal y dónde se radica la solicitud?", "x": "La autorización para la tala de árboles o el aprovechamiento forestal es otorgada por la Corporación Autónoma Regional de Cundinamarca (CAR). El titular del predio debe radicar la solicitud de aprovechamiento forestal a través del canal virtual al correosau@car.gov.co o de manera presencial en la sede ubicada en la carrera 5 No. 5-73, Edificio Molino del Parque, municipio de Chocontá. La solicitud debe presentarse mediante el Formato Único Nacional de Aprovechamiento Forestal y anexar los documentos que acrediten la propiedad o tenencia del predio, según corresponda."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Qué es la Secretaría de Desarrollo Social?", "x": "Es la dependencia de la Alcaldía Municipal encargada de formular, coordinar y ejecutar programas sociales orientados a mejorar la calidad de vida de la población, con enfoque en grupos vulnerables y de especial protección."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Qué programas sociales atiende la Secretaría de Desarrollo Social?", "x": "La Secretaría atiende programas dirigidos a: Adulto mayor Salud y bienestar social Educación Discapacidad Juventud Mujer y enfoque de género Comunidad indígena Ludoteca y primera infancia Programas de transferencias monetarias"}, {"s": "Secretaría de Desarrollo Social", "t": "¿Quiénes pueden acceder a los programas sociales?", "x": "Pueden acceder los habitantes del municipio de Sesquilé que cumplan con los criterios establecidos para cada programa, priorizando a la población en condición de vulnerabilidad, pobreza, discapacidad o riesgo social."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Cómo puedo inscribirme en un programa social?", "x": "Algunos programas no cuentan con proceso de inscripción municipal, ya que la focalización se realiza directamente por el Gobierno Nacional a través de bases de datos oficiales como el Sisbén IV. No obstante, puede acercarse de manera presencial a la Secretaría de Desarrollo Social o comunicarse a las líneas 311 232 5428 y 313 677 2871 para recibir orientación."}, {"s": "Secretaría de Desarrollo Social", "t": "¿La inscripción garantiza el acceso al programa?", "x": "No. La inscripción permite el registro y evaluación del caso; sin embargo, el acceso depende del cumplimiento de requisitos, disponibilidad de cupos y lineamientos establecidos por el Gobierno Nacional o Departamental."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Qué son los programas de transferencias monetarias?", "x": "Son apoyos económicos otorgados por el Gobierno Nacional a hogares priorizados, con el objetivo de contribuir a la superación de la pobreza y mejorar sus condiciones de vida. El municipio de Sesquilé cuenta con los siguientes programas: Renta Ciudadana Colombia Mayor Renta Joven Devolución del IVA"}, {"s": "Secretaría de Desarrollo Social", "t": "¿Cómo puedo ser beneficiario de Renta Ciudadana?", "x": "El programa Renta Ciudadana no tiene proceso de inscripción directa. El Prosperidad Social adelanta la identificación, selección y vinculación de los hogares potenciales beneficiarios a través de registros administrativos y fuentes oficiales definidas por la entidad. Se recomienda: Mantener actualizada la información en el Sisbén IV. Estar atento(a) a los canales informativos oficiales, a la oficina regional y a la información suministrada por la Alcaldía Municipal y los medios de comunicación. El programa está dirigido principalmente a hogares en condición de pobreza extrema, especialmente aquellos monoparentales con hijos menores de seis (6) años."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Cómo puedo ser beneficiario de Colombia Mayor?", "x": "El programa Colombia Mayor establece los siguientes requisitos: Ser colombiano. Haber residido durante los últimos diez (10) años en el territorio nacional. Tener mínimo tres (3) años menos de la edad requerida para pensionarse por vejez (actualmente 54 años para mujeres y 59 para hombres). Carecer de rentas o ingresos suficientes para subsistir. De acuerdo con el Sisbén IV, se consideran los grupos A, B y hasta el subgrupo C1. Si cumple con los requisitos, debe acercarse a la Secretaría de Desarrollo Social con fotocopia de la cédula ampliada al 150% para realizar el trámite de inscripción."}, {"s": "Secretaría de Desarrollo Social", "t": "¿La Secretaría entrega directamente el dinero de las transferencias?", "x": "No. La Secretaría brinda orientación, acompañamiento y apoyo en el proceso; sin embargo, los pagos son realizados por las entidades nacionales a través de los operadores autorizados."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Qué debo hacer si tengo inconvenientes con un programa de transferencias?", "x": "Debe acercarse a la Secretaría de Desarrollo Social para recibir orientación, actualizar información o canalizar el caso ante la entidad correspondiente. También puede comunicarse a las líneas 311 232 5428 y 313 677 2871."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Qué servicios se brindan a las personas adultas mayores?", "x": "Se desarrollan acciones de acompañamiento, promoción del envejecimiento activo, apoyo institucional, articulación con programas de bienestar, seguimiento a casos de especial protección y atención en el Centro de Protección del Adulto Mayor."}, {"s": "Secretaría de Desarrollo Social", "t": "¿La Secretaría atiende personas con discapacidad?", "x": "Sí. Se brinda orientación, caracterización, acompañamiento y articulación con programas y entidades que promueven la inclusión social y el acceso efectivo a derechos."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Puedo recibir orientación sin estar inscrito en un programa?", "x": "Sí. La ciudadanía puede recibir orientación social, información y asesoría, aun cuando no esté inscrita en un programa específico."}, {"s": "Secretaría de Desarrollo Social", "t": "¿Dónde puedo presentar solicitudes, quejas o sugerencias?", "x": "Las solicitudes, quejas o sugerencias pueden presentarse de manera presencial en la Secretaría de Desarrollo Social o a través de los canales oficiales de la Alcaldía Municipal de Sesquilé."}, {"s": "Secretaría de Infraestructura", "t": "¿Qué actividades realiza la Secretaría de Infraestructura en materia de vías?", "x": "La Secretaría realiza mantenimiento, mejoramiento y/o rehabilitación vial urbana y rural (aproximadamente 240 km), involucrando en algunos sectores a la comunidad y dando cumplimiento al Decreto 056 de 2005. Para estas actividades se contrata el suministro y transporte de recebo, y las intervenciones se ejecutan según el cronograma de trabajo establecido por el Secretario de Despacho. El concesionario POB se encarga del mantenimiento de la vía primaria. Para solicitar el servicio, se debe radicar un oficio en la ventanilla única."}, {"s": "Secretaría de Infraestructura", "t": "¿Cómo se solicita un permiso para intervenir una vía pública?", "x": "El permiso de intervención de vías es una autorización que se otorga a personas naturales o jurídicas para realizar trabajos en una vía pública, como excavaciones, reparaciones, instalaciones u otras actividades que afecten su normal funcionamiento. Si se requiere realizar conexión a los servicios de alcantarillado, agua o gas, primero se debe presentar la solicitud ante la empresa prestadora del servicio correspondiente. Posteriormente, se debe dirigir un oficio a la Secretaría de Infraestructura solicitando el permiso para la intervención de la vía pública."}, {"s": "Secretaría de Infraestructura", "t": "¿En qué consiste la supervisión de obras públicas?", "x": "La supervisión de obras públicas es un proceso que garantiza que los proyectos se ejecuten conforme a lo planificado, cumpliendo con los requisitos técnicos, legales y ambientales, y dentro del presupuesto y plazo establecidos. Para solicitar este servicio, se debe radicar un oficio dirigido a la Secretaría de Infraestructura en la ventanilla única de servicios."}, {"s": "Secretaría de Infraestructura", "t": "¿El municipio presta o alquila maquinaria pesada?", "x": "Sí. El municipio cuenta con maquinaria amarilla disponible para la prestación de servicios a la ciudadanía. Para acceder al servicio, el interesado debe diligenciar el formato de solicitud correspondiente. Una vez aprobado el alquiler, deberá dirigirse a la Secretaría de Hacienda para solicitar el recibo de pago y cancelarlo en la entidad bancaria o medio autorizado. Finalmente, deberá entregar copia del soporte de pago en la Secretaría de Infraestructura."}, {"s": "Secretaría de Infraestructura", "t": "¿Qué es el licenciamiento urbanístico?", "x": "El licenciamiento urbanístico es el trámite mediante el cual la Secretaría de Infraestructura gestiona y expide las licencias y autorizaciones requeridas para el desarrollo urbanístico y el uso de los predios. Incluye licencias de urbanización, parcelación, subdivisión, construcción e intervención del espacio público. Las modalidades contemplan obra nueva, ampliaciones, demoliciones, cerramientos y saneamientos. El tiempo de respuesta es de 45 días hábiles para todas las modalidades. También se gestionan prórrogas dentro de la vigencia y revalidaciones, con un plazo de 30 días para resolver."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "Si usted es propietario de especies menores o mayores en el municipio de Sesquilé y desea recibir asesoría técnica agropecuaria, ¿qué debe tener en cuenta?", "x": "La Secretaría de Competitividad, Desarrollo Económico y Ambiental del municipio de Sesquilé presta servicios de asistencia técnica agropecuaria, tales como: Manejo técnico de especies menores y mayores. Sanidad preventiva y curativa. Mejoramiento de parámetros zootécnicos. Implementación de procesos o tecnologías según los requerimientos de cada especie. Requisitos: Ser propietario de especies menores o mayores dentro de la jurisdicción del municipio de Sesquilé. Realizar la inscripción y solicitud del servicio en la planilla de la Secretaría."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿La Secretaría realiza esterilización felina y canina? ¿Cuáles son los requisitos?", "x": "Sí. La Secretaría realiza jornadas de esterilización durante el año en diferentes veredas del municipio. Este procedimiento consiste en una intervención quirúrgica: Ovariohisterectomía en hembras. Castración en machos. El objetivo es controlar la población canina y felina en el municipio. Para la inscripción, debe acercarse a la oficina de la UMATA. Requisitos: Ayuno de 12 horas. No se aceptan hembras en celo ni gestantes. Solo se esterilizan animales criollos. Los caninos y felinos deben estar en buen estado de salud e higiene. No se reciben gatos sin guacal. Llevar una cobija para la mascota. No se reciben animales mayores de 12 años."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿Qué acciones realiza la Secretaría para promover la tenencia responsable de mascotas?", "x": "La Secretaría desarrolla las siguientes acciones: Capacitaciones para prevenir el abandono y el maltrato animal. Entrega de desparasitantes y jornadas de vitaminización para perros y gatos. Jornadas de esterilización canina y felina."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿Qué servicios ofrece para el mejoramiento genético?", "x": "La Secretaría ofrece: Servicio de inseminación artificial con celo detectado o mediante protocolo. Inseminación Artificial a Término Fijo (IATF). Orientación técnica a productores con el fin de mejorar los parámetros productivos y reproductivos del hato."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿Qué programas maneja la Secretaría para fortalecer la seguridad alimentaria en el municipio?", "x": "La Secretaría ha implementado el programa “Huertas Caseras”, con el propósito de: Fortalecer la seguridad alimentaria y nutricional. Garantizar el abastecimiento de alimentos sanos, frescos y de alto valor nutricional, especialmente hortalizas. Promover la autosuficiencia alimentaria en las familias sesquileñas participantes. Requisitos para participar: Residir en el municipio de Sesquilé. Implementar la huerta y seguir las recomendaciones técnicas brindadas. Tener voluntad e interés en el proceso."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿La Secretaría expide Guías Sanitarias de Movilización Interna (GSMI)?", "x": "Sí. La Secretaría orienta y apoya la expedición de Guías Sanitarias de Movilización Interna (GSMI) para ganado caprino, ovino, porcino, bovino, equino, asnal y bufalino dentro de la jurisdicción municipal. La guía debe tramitarse ante el ICA o la entidad competente, y el pago correspondiente debe realizarse en la Secretaría de Hacienda. Documentos requeridos: Registro previo del predio ante el ICA (formato 3-101). Certificado vigente del último ciclo de vacunación. Cédula de ciudadanía original del solicitante. En caso de no estar presente el propietario, la persona autorizada debe estar previamente registrada ante el ICA. Exámenes de laboratorio, cuando la movilización lo exija (por ejemplo, en concentraciones ganaderas o equinos)."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿La Secretaría presta el servicio de maquinaria agrícola?", "x": "Sí. La Secretaría presta el servicio de maquinaria agrícola (tractor) y cuenta con implementos como: Arado Rastrillo Renovador de praderas Desbrozadora Arado de cincel, entre otros Requisitos: Ser pequeño o mediano productor agropecuario dentro de la jurisdicción del municipio. Definir el tipo de implemento requerido. Cancelar el valor establecido en el Estatuto Tributario Municipal vigente. Con el recibo de pago, programar el servicio con la Secretaría."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "Si encuentro un animal silvestre, ¿qué hace la Secretaría en estos casos?", "x": "La Secretaría realiza: Atención inicial de emergencia. Incautación en compañía de las autoridades competentes. Reubicación del espécimen, garantizando su adecuado estado de salud."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿A qué número debo llamar si encuentro un animal silvestre o a dónde debo dirigirme?", "x": "Puede comunicarse al número 311 234 1797 o dirigirse a la oficina de la UMATA."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿Dónde puedo radicar mi hoja de vida?", "x": "Si cumple con los requisitos de las ofertas laborales publicadas en las redes sociales oficiales de la Alcaldía Municipal de Sesquilé, puede: Dirigirse al segundo piso de la Casa de la Cultura (Oficina de Emprendimiento). Comunicarse al número 320 668 8935."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "¿En qué fechas se recogen los envases de agroquímicos?", "x": "La Secretaría realiza la recolección de envases de agroquímicos el segundo jueves de los meses de marzo, junio, septiembre y diciembre."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Qué es el servicio de Atención y Promoción Turística?", "x": "Es un servicio orientado a fortalecer el desarrollo turístico del municipio mediante la promoción de sus atractivos y la prestación de información clara y oportuna a visitantes, prestadores de servicios turísticos y comunidad en general."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Cuál es el objetivo del servicio de Atención y Promoción Turística?", "x": "Fortalecer el desarrollo turístico del municipio a través de la promoción de los atractivos locales y la atención a visitantes y actores del sector turístico."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Qué incluye el servicio de Atención y Promoción Turística?", "x": "Incluye: Orientación e información turística. Promoción de los atractivos del municipio. Atención a visitantes. Apoyo al sector turístico local."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Quién puede acceder al servicio de Atención y Promoción Turística?", "x": "El servicio está dirigido a: Visitantes. Prestadores de servicios turísticos. Comunidad en general."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Qué medios se utilizan para la promoción turística?", "x": "Se utilizan: Redes sociales. Página web institucional. Material publicitario. Eventos turísticos."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Cómo puedo solicitar información turística en Sesquilé?", "x": "Para solicitar información turística se debe: Acercarse a la Oficina de Turismo. Solicitar la información requerida. Recibir orientación sobre los atractivos y servicios turísticos disponibles."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Dónde está ubicada la Oficina de Turismo?", "x": "La Oficina de Turismo funciona en el Palacio Municipal de Sesquilé, en la siguiente dirección: Carrera 6 No. 8-07."}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿Cuál es el número de contacto de la Oficina de Turismo?", "x": "El número de contacto es: 3107624687"}, {"s": "Oficina de Turismo, Cultura y Patrimonio", "t": "¿El servicio de información tur /* ============ Mensajes del sistema (Tomi - Sección 3 de la ficha) ============ */
const MSG_SALUDO = "¡Hola! Soy Tomi, el asistente virtual de la Alcaldía de Sesquilé. Estoy aquí para ayudarte con trámites, servicios municipales, PQRS, turismo y todo lo que necesites saber del municipio. ¿En qué te puedo ayudar hoy?";
const MSG_NO_SABE = "Hmm, esa pregunta me tiene pensando 🤔 Todavía estoy aprendiendo y no tengo eso en mi maletín de información. Puedes comunicarte directamente con la Alcaldía: 📞 3106090754 ✉️ ventanillaunica@sesquile-cundinamarca.gov.co 🕐 Horario: lunes a jueves 7:30am-12:30pm y 1:30pm-5:00pm, viernes 7:30am-12:30pm y 1:30pm-4:30pm. ¿Hay algo más en lo que te pueda ayudar?";
const MSG_DESPEDIDA = "¡Fue un gusto ayudarte! 🐦 Recuerda que puedes volver cuando quieras. La Alcaldía de Sesquilé está siempre para servirte. ¡Hasta pronto!";
const MSG_CONFUSO = "No te entendí muy bien, ¿me puedes contar un poco más qué necesitas? Así te ayudo mejor 😊";
const MSG_SOLO_SALUDO = "¡Hola! 👋 ¿Cómo estás? Cuéntame, ¿en qué te puedo ayudar hoy?";

const FAREWELL_WORDS = ["adios","chao","chau","hasta luego","nos vemos","bye","muchas gracias hasta luego","gracias adios"];
const GREETING_ONLY_WORDS = ["hola","buenas","buenos dias","buenas tardes","buenas noches","holaa","hey","ola"];

/* ============ Utilidades de texto ============ */
const STOPWORDS = new Set(["de","la","el","en","y","a","que","los","las","un","una","para","por","con","del","al","es","se","su","sus","como","o","u","no","si","le","lo","mi","me","tu","este","esta","estos","estas","cual","cuales","donde","dónde","cuando","cuándo","hay","puedo","puede","debo","debe","quiero","necesito","favor","gracias","alcaldia","alcaldía","sesquile","sesquilé","municipio","informacion","información","sobre","secretaria","secretaría","oficina","comisaria","comisaría","inspeccion","inspección","despacho","dependencia","municipal"]);
const CONTACT_INTENT = new Set(["telefono","contacto","contactos","direccion","ubicacion","queda","celular","llamar","numero","correo","email"]);

function normalize(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9ñ\s]/g,' ').replace(/\s+/g,' ').trim();
}
function tokenize(str){
  return normalize(str).split(' ').filter(t=>t.length>2 && !STOPWORDS.has(t));
}
function rawTokenize(str){
  return normalize(str).split(' ').filter(t=>t.length>0);
}

const INTENT_TOKENS = INTENTS.map(it=>({
  triggerTokens: it.triggers.map(t=>new Set(tokenize(t)))
}));
const KB_TOKENS = KB.map(e=>({
  titleTokens: tokenize(e.t),
  bodyTokens: tokenize(e.x),
  depTokens: tokenize(e.s)
}));

/* ============ Detección de saludo / despedida / confuso ============ */
function isGreetingOnly(norm, tokens){
  if(tokens.length===0) return false;
  return GREETING_ONLY_WORDS.some(g => norm === g || norm.startsWith(g+' ') || norm===normalize(g));
}
function isFarewell(norm){
  return FAREWELL_WORDS.some(f => norm.includes(normalize(f)));
}

/* ============ Scoring intenciones (banco de Tomi) ============ */
function scoreIntent(queryTokens, idx){
  const {triggerTokens} = INTENT_TOKENS[idx];
  let best = 0;
  for(const trigSet of triggerTokens){
    let exact = 0, partial = 0;
    for(const qt of queryTokens){
      if(trigSet.has(qt)) exact += 1;
      else{
        for(const tt of trigSet){
          if(tt!==qt && (tt.includes(qt)||qt.includes(tt)) && Math.min(tt.length,qt.length)>=4){ partial += 1; break; }
        }
      }
    }
    const size = trigSet.size;
    const needed = size<=1 ? 1 : Math.max(2, Math.ceil(size*0.6));
    if(exact >= needed){
      const score = exact + partial*0.5;
      if(score > best) best = score;
    }
  }
  return best;
}
function matchIntent(query){
  const qTokens = tokenize(query);
  if(qTokens.length===0) return null;
  let bestIdx=-1, bestScore=0;
  INTENTS.forEach((it,idx)=>{
    const s = scoreIntent(qTokens, idx);
    if(s>bestScore){ bestScore=s; bestIdx=idx; }
  });
  if(bestIdx>=0 && bestScore>=1) return {entry: INTENTS[bestIdx], score: bestScore};
  return null;
}

/* ============ Scoring KB (portafolio de servicios + FAQ reales) ============ */
function scoreEntry(queryTokens, idx, isContactEntry){
  const {titleTokens, bodyTokens, depTokens} = KB_TOKENS[idx];
  let score = 0, contactHits = 0;
  const titleSet = new Set(titleTokens), bodySet = new Set(bodyTokens), depSet = new Set(depTokens);
  for(const qt of queryTokens){
    if(titleSet.has(qt)) score += 5;
    if(depSet.has(qt)) score += 2;
    if(bodySet.has(qt)) score += 1;
    if(CONTACT_INTENT.has(qt)) contactHits++;
    for(const tt of titleTokens){
      if(tt!==qt && (tt.includes(qt) || qt.includes(tt)) && Math.min(tt.length,qt.length)>=4){
        score += 2; break;
      }
    }
  }
  if(isContactEntry && contactHits>0) score += contactHits*6;
  return score;
}
function searchKB(query){
  const qTokens = tokenize(query);
  if(qTokens.length===0) return [];
  const scored = KB.map((e,idx)=>({
    e, score: scoreEntry(qTokens, idx, e.t==='DIRECTORIO DE CONTACTOS Y DIRECCIONES DE LAS DEPENDENCIAS')
  }));
  scored.sort((a,b)=>b.score-a.score);
  return scored.filter(s=>s.score>0).slice(0,5);
}
function formatAnswer(entry){
  let txt = entry.x;
  if(txt.length > 900) txt = txt.slice(0,880).trim() + '…';
  return txt;
}

/* ============ UI ============ */
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendbtn');
const chipsEl = document.getElementById('quickchips');

function addUserMessage(text){
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addBotMessage(text, opts){
  opts = opts || {};
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';

  const mini = document.createElement('div');
  mini.className = 'mini-avatar';
  mini.innerHTML = '<img src="'+AVATAR_SRC+'" alt="Tomi">';
  wrap.appendChild(mini);

  const bcol = document.createElement('div');
  bcol.className = 'bcol';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  bcol.appendChild(bubble);

  if(opts.meta){
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = opts.meta;
    bcol.appendChild(meta);
  }

  if(opts.alternates && opts.alternates.length){
    const sugg = document.createElement('div');
    sugg.className = 'suggestions';
    const label = document.createElement('div');
    label.className = 'meta';
    label.textContent = '¿Buscabas alguno de estos?';
    sugg.appendChild(label);
    opts.alternates.forEach(alt=>{
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = alt.e.t;
      btn.onclick = ()=>{
        addUserMessage(alt.e.t);
        showTyping(()=> addBotMessage(formatAnswer(alt.e), {meta: alt.e.s + ' · ' + alt.e.t}));
      };
      sugg.appendChild(btn);
    });
    bcol.appendChild(sugg);
  }

  wrap.appendChild(bcol);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(cb){
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = '<div class="mini-avatar"><img src="'+AVATAR_SRC+'" alt="Tomi"></div><div class="bcol"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  setTimeout(()=>{
    wrap.remove();
    cb();
  }, 400 + Math.random()*300);
}

/* ============ Lógica principal ============ */
function handleQuery(rawQuery){
  const norm = normalize(rawQuery);
  const tokens = rawTokenize(rawQuery);

  if(norm.length <= 2){
    addBotMessage(MSG_CONFUSO);
    return;
  }
  if(isFarewell(norm)){
    addBotMessage(MSG_DESPEDIDA);
    return;
  }
  if(isGreetingOnly(norm, tokens)){
    addBotMessage(MSG_SOLO_SALUDO);
    return;
  }
  const intentMatch = matchIntent(rawQuery);
  const results = searchKB(rawQuery);
  const kbTop = results[0];

  // Si la intención es un match debil (una sola palabra generica, score 1)
  // y hay una ficha del portafolio/FAQ mucho mas especifica, preferimos esa.
  const intentIsWeak = intentMatch && intentMatch.score < 2;
  const kbIsStrongEnough = kbTop && kbTop.score >= 8;

  if(intentMatch && !(intentIsWeak && kbIsStrongEnough)){
    addBotMessage(intentMatch.entry.respuesta);
    return;
  }
  if(results.length===0){
    addBotMessage(MSG_NO_SABE);
    return;
  }
  const top = results[0];
  const alternates = results.slice(1,4).filter(r=>r.score >= top.score*0.4);
  addBotMessage(formatAnswer(top.e), {meta: top.e.s + ' · ' + top.e.t, alternates});
}

sendBtn.addEventListener('click', submitQuery);
inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitQuery(); });

function submitQuery(){
  const val = inputEl.value.trim();
  if(!val) return;
  addUserMessage(val);
  inputEl.value = '';
  showTyping(()=> handleQuery(val));
}

const QUICK_CHIPS = [
  "¿Cómo pago el predial?",
  "Horario de atención",
  "¿Cómo pongo una PQRS?",
  "¿Qué hacer en Sesquilé?",
  "SISBÉN"
];
function renderChips(){
  QUICK_CHIPS.forEach(c=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = ()=>{ inputEl.value = c; submitQuery(); };
    chipsEl.appendChild(chip);
  });
}

(function init(){
  renderChips();
  addBotMessage(MSG_SALUDO);
})();
</script>
