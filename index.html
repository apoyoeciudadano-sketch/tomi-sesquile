ca Y Cultural\n- Biblioteca Pública Municipal\n- Biblioteca Pública Municipal Leyenda Del Dorado\n- Clubes De Lectura\n- Portafolio Municipal De Estímulos “Tesorarte”\n- Identificación De Gestores Y Creadores Culturales.\n- Grupo De Vigías Del Patrimonio Cultural\n- Portal Interactivo Acceso A Internet\n- Atención Y Promoción Turística\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Oficina de Contratación", "t": "OFICINA DE CONTRATACIÓN", "x": "La Oficina de Contratación ofrece los siguientes servicios y trámites:\n- Certificaciones De Contratos\n\nPregúntame por el nombre de alguno de estos trámites para darte el detalle completo (requisitos, tiempos, etc.)."}, {"s": "Secretaría de Hacienda", "t": "IMPUESTO PREDIAL", "x": "Tributo anual de carácter real y de orden municipal que grava la propiedad o tenencia de un inmueble o mejoras realizadas en él, tanto urbano como rural.\nFormas de pago\n1.Acercarse a la Secretaría de Hacienda a reclamar la factura de impuesto (debe presentar No. identificación del propietario y/o código catastral del predio), con ésta\nfactura puede acercarse a cualquier oficina y/o corresponsal de Bancolombia o pago a través de DATÁFONO.\n2.Ingrese a https://sesquile.universo- online.com.co/default.aspx, revise los videos tutoriales, busque el predio, consulte y descargue la factura, y realice el pago por PSE.\n3.Envíe un correo a asist.hacienda@sesquile- cundinamarca.gov.co con los datos específicos y actualizados del predio. Una vez reciba la factura, imprímala en láser y páguela en cualquier oficina o corresponsal de Bancolombia.\nPAZ Y SALVO DEL IMPUESTO PREDIAL Documento que certifica que todas las obligaciones están totalmente pagadas (saldo en cero).\nRequisitos: El impuesto debe estar al día. La solicitud es gratuita y puede realizarse por correo electrónico, a través del PQRSDF de la página web o de manera presencial en la oficina, indicando el número catastral."}, {"s": "Secretaría de Hacienda", "t": "INSCRIPCIÓN DE ESTABLECIMIENTOS COMERCIALES", "x": "Toda persona, empresa o sociedad que comience actividades gravadas con el impuesto de Industria y Comercio en Sesquilé, incluso las exentas, debe registrarse ante la Secretaría de Hacienda dentro de los 30 días siguientes al inicio de actividades. El impuesto se aplicará desde la fecha en que comiencen dichas actividades.\nRequisitos:\nPuede registrarte en la Secretaría de Hacienda o a través del siguiente enlace: https://sesquile.universo- online.com.co/Default.aspx\n-Uso del suelo actualizado (Exclusivo para quienes ejercen la actividaden establecimiento comercial)\nEste documento debe contener el concepto VIABLE para la actividad que se va a desarrollar, la cual debe coincidir con los\ndemás documentos aportados. -Registro Único Tributario -RUT -Cámara de comercio actualizada -Copia de cédula del representante legal"}, {"s": "Secretaría de Hacienda", "t": "PAGO DE IMPUESTO INDUSTRIA Y COMERCIO ANUAL", "x": "El Impuesto de Industria y Comercio en Sesquilé se aplica a todas las actividades industriales, comerciales o de servicios realizadas en el municipio, ya sea de forma permanente u ocasional, con o sin establecimiento comercial. Este impuesto se genera desde el inicio de dichas actividades.\nRequisitos:\nPara realizar el pago, acceda a la plataforma online, regístrese, complete y firme el formulario, y pague mediante el botón de PSE (sin necesidad de enviar soportes\na laSecretaría de Hacienda).\nTambién puede acercarse a la Secretaría de Hacienda con los datos requeridos y se le orientará para realizar la declaración,\npara que pueda ser cancelada en entidad Bancaria\nBancolombia\nEl pago posterior a la última fecha establecida dará lugar a intereses y sanción por\nextemporaneidad. El contribuyente debe enviar el soporte de pago junto con la declaración a los correos\nasist.hacienda@sesquile-cundinamarca.gov.co o profesional.hacienda@sesquile-cundinamarca.gov.co."}, {"s": "Secretaría de Hacienda", "t": "RETEICA", "x": "Es un mecanismo que facilita, asegura y acelera el recaudo del impuesto de Industria y Comercio de manera gradual para personas naturales, jurídicas y sociedades de hecho, ya sea que tengan establecimiento en Sesquilé o realicen actividades temporales en el municipio.\nRequisitos:\nDiligencia el formulario en la página web y paga por PSE, o envía el formato de declaración al municipio por correo electrónico, adjuntando el detalle y el soporte de pago.\nDebe ingresar al link https://sesquile.universo-online.com.co/default.aspx - consultar los videos tutoriales - registrarse e ingresar y\nrealizar la declaración y pago por PSE"}, {"s": "Secretaría de Hacienda", "t": "REPRODUCCIÓN DE INFORMACIÓN PÚBLICA SOLICITADA POR PARTICULARES", "x": "Una copia es la reproducción fiel, total o parcial de un texto, imagen o documento que reposa en los archivos y registros públicos\nRequisitos:\nSolicitar la reproducción de la información pública aclarando el medio por el cual desea que sea reproducido (físico, discos compactos, USB o correo electrónico)\nOficio expedido por la dependencia en la que se indique a la Secretaría de Hacienda la cantidad de copias autorizadas a cobrar, quién a su vez generará el respectivo recibo. Después de realizar el pago, el solicitante debe presentar elcomprobante en la dependencia correspondiente para programar la entrega de la información, la cual no debe exceder los 10 días hábiles."}, {"s": "Secretaría de Hacienda", "t": "CERTIFICACIONES", "x": "Son trámites de diferentes dependencias que requieren el pago para la expedición de las mismas:\nCertificado de Estratificación\nDemarcaciones y uso de suelo (Concepto completo)\nCertificado de uso de suelos (Específico para establecimiento comercial)\nCertificado PBOT Licencias (subdivisión, refacciones, construcción, demolición)\nInscripción de profesionales\nNomenclatura (1*1000 sobre el valor del avalúo).\nRequisitos:\nRealizar el pago mediante consignación o transferencia a la cuenta de ahorros Nº. 33608300100 a nombre del Municipio de Sesquilé. NIT 899999415-2 Enviar el soporte de pago a la dependencia correspondiente, indicando el concepto que está pagando. Indicar datos del solicitante, como nombre completo, número de identificación, teléfono, dirección y correo electrónico)"}, {"s": "Secretaría de Hacienda", "t": "EMISIÓN DE FACTURAS PARA EL PAGO DE LOS SIGUIENTES SERVICIOS DE LA ALCALDÍA", "x": "Guía de movilización ICA. Alquiler de maquinaria. Alquiler de Bus, Busetón o ruta de la salud. Alquiler de espacios en la plaza multiservicios y centro de despacho.\nRequisitos: Para solicitar el servicio, acérquese a la\nSecretaría correspondiente y gestione\nel recibo de pago en la Secretaría de\nHacienda."}, {"s": "Secretaría de Hacienda", "t": "ACUERDOS DE PAGO", "x": "Un acuerdo de pago o convenio de pago es un documento mediante el cual el deudor y el municipio llegan a un acuerdo para saldar una deuda.\nRequisitos:\nDiligenciar el formato de acuerdo de pago.\nPresentar en físico o enviar vía correo electrónico para verificación y aprobación de la Secretaría de Hacienda quien expedirá el acto administrativo correspondiente. Para suscribir el acuerdo de pago, el deudor deberá realizar el pago correspondiente al 30% del valor adeudado con intereses como cuota inicial.\nSi el acuerdo de pago es mayor a 12 meses se debe presentar garantía que respalde la deuda (deudor solidario, bien inmueble, etc.) la cual debe ser aprobada."}, {"s": "Secretaría de Desarrollo Social", "t": "BILINGÜISMO", "x": "El municipio de Sesquilé ofrece un programa de formación en inglés de alta calidad, dirigido a toda la comunidad y orientado a fortalecer el desarrollo personal y académico de estudiantes de instituciones públicas y privadas, así como de jóvenes y adultos del municipio. El programa se desarrolla mediante estrategias pedagógicas y está organizado en cinco categorías, todas con niveles de iniciación, intermedio y avanzado.\nLa Categoría de Apoyo al ICFES/Saber 11° fortalece las competencias en inglés para las Pruebas Saber de los grados 5° y 11°, con 2 horas semanales. La Categoría Adultos Casco Urbano está orientada a mayores de 16 años, con 3 horas semanales por grupo.\nLa Categoría Descentralizada (Adultos y Comunitaria) amplía la cobertura en distintos sectores del municipio, con 4 horas semanales por grupo y próximas sedes en Nescuatá–Boitivá–La Villa–Espigas, El Hato–Uval–Granadillo–Ranchería y Boitá, cuyos horarios se concertarán con los participantes. Finalmente, la Categoría Emprendimiento, enfocada en el sector hotelero y gastronómico, ofrece 1 hora semanal por grupo.\nRequisitos de Inscripción: Edad correspondiente a la categoría elegida. Pertenecer al Sisbén del municipio de Sesquilé. Fotocopia identidad. Para la Categoría ICFES: Presentar carné de estudios de cualquier colegio (público o privado) del municipio.\ndel documento de\nPara Consentimiento\nmenores de edad: informado firmado por el acudiente. Para todos: Presentar una prueba de diagnóstico para asignar el nivel (iniciación, avanzado).\nde proficiencia adecuado\no intermedio"}, {"s": "Secretaría de Desarrollo Social", "t": "FONDO ESPECIAL PARA EL FOMENTO DE LA EDUCACIÓN SUPERIOR FOESSC", "x": "El Programa de Fomento a la Educación Superior otorga subsidios e incentivos para promover el acceso y la permanencia en programas técnicos, tecnológicos y profesionales. Contempla dos modalidades: un Incentivo de Sostenimiento para el mejor puntaje Saber 11 de cada institución educativa del municipio y un Incentivo de Fomento Educativo, con dos convocatorias semestrales dirigidas a estudiantes residentes en el municipio que cumplan los requisitos establecidos.\nRequisitos: Ser de nacionalidad colombiana y residir en el Municipio de Sesquilé por un periodo superior a tres (3) años, acreditado mediante certificado con vigencia no mayor a treinta (30) días, expedido por la Inspección Municipal de Policía (sector urbano) o por la Junta de\nAcción Comunal correspondiente (sector rural). Acreditar inscripción actualizada y activa en el SISBÉN del municipio de Sesquilé con\nmínimo tres (3) años de antigüedad o, en caso de ser población víctima del conflicto\narmado, aportar RUV vigente. En caso de pertenecer a comunidad indígena, presentar certificación expedida por la\nSecretaría de Desarrollo Social. Presentar fotocopia del documento de identidad. Aportar documento que acredite matrícula en una institución de educación técnica, tecnológica o profesional oficialmente reconocida por el Ministerio de Educación Nacional\no la Secretaría de Educación. Presentar certificación de cuenta bancaria a nombre del postulado. Acreditar, mediante documento expedido por la institución educativa, promedio académico mínimo de 3.8 o su equivalente en otra escala, así como el horario de clases\ncorrespondiente al último semestre cursado."}, {"s": "Secretaría de Desarrollo Social", "t": "ESTRATEGIA DE MOVILIDAD ESCOLAR", "x": "La Estrategia de Movilidad Escolar garantiza el acceso y la permanencia de los estudiantes matriculados en las Instituciones Educativas Departamentales de Sesquilé, mediante la cobertura de los costos de desplazamiento de los estudiantes focalizados, en condiciones de seguridad y calidad.\nLas rutas se establecen al inicio de cada calendario escolar, conforme a los requisitos definidos por la Secretaría de Educación – Dirección de Cobertura y su Manual Operativo. Los rectores identifican a los estudiantes que cumplen las condiciones y remiten la información a la Administración Municipal, que adopta el plan de acción anual y fija, mediante acto administrativo, el valor de las rutas con base en el Comité de Permanencia Escolar Municipal\nRequisitos y condiciones:\n1. Distancia: La vivienda debeestar ubicadaatres (3) kilómetros o más de la institución educativa. No aplica si el estudiante tiene cupo cercano a su residencia y solicita traslado, excepto\nen casos de discapacidad.\n2. Matrícula: Contar con cupo en una Institución Educativa Departamental y estar debidamente\nregistrado en el SIMAT.\n3. Grado: Ser estudiante de básica secundaria o media, siempre que en el lugar de residencia no\nexista establecimiento educativo que garantice su derecho a la educación. Excepcionalmente, podrán beneficiarse estudiantes de preescolar o básica primaria que,\npor baja cobertura u otras circunstancias, deban ser trasladados, previa aprobación de\nla Dirección de Cobertura."}, {"s": "Secretaría de Desarrollo Social", "t": "BANCO DE AYUDAS TÉCNICAS", "x": "Espacio físico dotado con diferentes ayudas técnicas (silla de ruedas, muletas, caminadores) que se encuentran a disposición de la comunidad Sesquileña que así lo requieran bajo préstamo por comodato, valoración por el profesional y seguimiento.\nRequisitos: Sisbén del municipio de Sesquilé. Carta de solicitud dirigida a la secretaría de desarrollo social\nFotocopia de la historia clínica. Fotocopia del documento de identidad de quien usará la ayuda\ntécnica. Fotocopia de documento de identidad del cuidador y/o responsable.\nFirma del comodato y aceptar términos y condiciones."}, {"s": "Secretaría de Desarrollo Social", "t": "ASEGURAMIENTO", "x": "El aseguramiento en salud es una estrategia de política pública diseñada para lograr el acceso oportuno, efectivo y equitativo de la población a los servicios de salud para la promoción, prevención, tratamiento y rehabilitación.\nRequisitos: Fotocopia del documento de identidad.\nFotocopia del Sisbén (Sesquilé). Ser residente en el municipio de Sesquilé.\nDatos de contacto."}, {"s": "Secretaría de Desarrollo Social", "t": "PROGRAMAS DE PREVENCIÓN Y PROMOCIÓN DE LA SALUD", "x": "La promoción de la salud y la prevención de la enfermedad son todas aquellas acciones, procedimientos e intervenciones integrales, orientadas a que la población, mejore sus condiciones para vivir y disfrutar de una vida saludable y para mantenerse sanos.\nRequisitos: Ser residente del municipio Algunos programas se adelantan mediante visitas domiciliarias de\nlos profesionales en salud de la Secretaría de Desarrollo Social. Asistir y participar en convocatorias del Hospital y la Secretaría de\nDesarrollo Social."}, {"s": "Secretaría de Desarrollo Social", "t": "SERVICIO DE ATENCIÓN A LA COMUNIDAD (SAC)", "x": "Se apoya en gestiones administrativas en salud a la comunidad como asignación de citas, autorizaciones, trámites de PQRS, aseguramiento, entre otros. Formación en derechos y deberes de los usuarios en lo concerniente a salud. Trámites y gestión de medicamentos, entre otros relacionados.\nRequisitos: Ser residente en el municipio Copia de los documentos del proceso de salud (Órdenes médicas\ny/o autorizaciones)."}, {"s": "Secretaría de Desarrollo Social", "t": "CENTRO DE DESARROLLO INFANTIL", "x": "Servicio que garantiza educación inicial, cuidado y nutrición a niños menores de 5 años. Se implementan acciones pedagógicas y de cuidado, promoviendo derechos a la salud, protección y participación para favorecer su desarrollo integral. La atención se brinda durante ocho horas diarias, cinco días a la semana, y es un servicio gratuito.\nREQUISITOS: Consultar la disponibilidad de cupos presentar una solicitud de inscripción Fotocopia del registro civil de nacimiento. Fotocopia de puntaje SISBÉN o carta de declaración ante el Ministerio Público (Personería), de su condición de víctima, cuando aplique. Fotocopia de certificado de\nafiliación a salud vigente. Fotocopia del carné de salud infantil (puede ser fotocopia de la curva de crecimiento y\ndesarrollo). El diagnóstico médico en caso de niños con discapacidad, el cual no es requisito para el\ningreso. Fotocopia del carné de vacunación al día según edad (puede ser carné de salud infantil). Para identificar lugar de residencia, fotocopia de un recibo público cuando sea necesario.\nFotocopia de documento de identidad del padre, madre y/o cuidador responsable.\nCertificado de pertenencia a comunidad indígena, afrodescendientes, raizales y\npalenqueros, y Rom o que se haya auto referido como tal."}, {"s": "Secretaría de Desarrollo Social", "t": "LUDOTECAS", "x": "El programa de Ludotecas del municipio promueve el desarrollo integral de niñas, niños, adolescentes y sus familias mediante el juego, experiencias lúdicas y actividades educativas. A través de estos espacios se fomenta el aprendizaje, la creatividad, la inclusión social, la convivencia pacífica y el fortalecimiento de habilidades cognitivas, socioemocionales y culturales, en entornos seguros y accesibles para la comunidad. El servicio se presta en cuatro sedes: Ludoteca Centro, Ludoteca Boitá, Ludoteca La Villa y Ludoteca El Uval. Todas atienden al público de lunes a viernes en horario de 2:00 p.m. a 5:00 p.m. Adicionalmente, la Ludoteca Boitá ofrece atención un sábado cada quince días, de 9:00 a.m. a 1:00 p.m.\nRequisitos: No requiere documentos para acceder al programa. Solo\nregistrarse en la planilla de registro diario."}, {"s": "Secretaría de Desarrollo Social", "t": "CLUB DE TAREAS", "x": "Es una estrategia de acompañamiento escolar que brinda asesorías en matemáticas, biología, química y física, fortaleciendo los procesos de aprendizaje, los hábitos de estudio y el desempeño académico de niñas, niños y adolescentes. Cuenta con atención presencial en Boitá, Boitivá, Nescuatá, El Hato y en el centro urbano, además de asesorías virtuales. Adicionalmente, desarrolla la estrategia Prepara tu ICFES para estudiantes de 10° y 11°, orientada al refuerzo de estas áreas para la presentación de las pruebas de Estado y el acceso a la educación superior\nRequisitos: Formulario de inscripción virtual Copia del documento de identidad Consentimiento informado firmado por padres o adulto\nresponsable.\nEmail: clubdetareassesquile@gmail.com\nTeléfono: 3125505966 y 3223225326"}, {"s": "Secretaría de Desarrollo Social", "t": "PROGRAMA PARA EL ADULTO MAYOR “FLOR DE PRIMAVERA”", "x": "Estrategia social del municipio de Sesquilé orientada a reconocer, cuidar y valorar a las personas mayores, brindándoles espacios de bienestar, acompañamiento y participación activa que promueven un envejecimiento saludable y una mejor calidad de vida. A través de una atención integral que incluye terapia física y psicológica, control de enfermería, actividades físicas, manualidades, alfabetización, clases de sistemas, encuentros intergeneracionales y salidas lúdicas, además de transporte y apoyo en alimentación, el programa fortalece la salud física, emocional y social de cada participante.\nSus actividades se desarrollan en la vereda El Uval, beneficiando a personas mayores de Ranchería, Granadillo, El Hato y El Uval; en la vereda Boitivá, salón comunal, para adultos mayores de sus sectores; en Nescuatá sector La Villa, atendiendo a Espigas, Nescuatá sector La Escuela y sector Providencia; y en el casco urbano, dirigido a residentes de la vereda Boitá, sector La Esperanza, veredas San José, Tierra Negra y\nGobernador, así como barrios y sectores aledaños.\nREQUISITOS:\nTener capacidad para realizar sus actividades básicas cotidianas de manera autónoma y contar con la actitud y voluntad de participar.\nDiligenciar el Formato de Ingreso establecido. Diligenciar el Consentimiento Informado. Copia del documento de identidad del beneficiario.\nFotocopia de afiliación al Sistema General de Seguridad Social en Salud (Fosyga o certificado de afiliación vigente). Residir en el Municipio de Sesquilé. Disposición para cumplir con los horarios, normas y lineamientos del programa. Contar con SISBÉN del Municipio de Sesquilé con encuesta actualizada."}, {"s": "Secretaría de Desarrollo Social", "t": "CENTRO DE VIDA SENSORIAL", "x": "Es un espacio físico equipado con recursos terapéuticos destinado a la rehabilitación y atención integral de personas con discapacidad, que ofrece apoyos como terapia ocupacional, psicología y fonoaudiología, así como actividades deportivas, culturales, manuales y lúdico- recreativas, promoviendo su inclusión social, educativa y laboral de acuerdo con el ciclo de vida.\nRequisitos: Diligenciar y firmar el formato de inscripción.\nFirma del consentimiento informado. Fotocopia del documento de identidad del beneficiario y de los\npadres de familia y/o cuidadores. Fotocopia de afiliación al sistema general de seguridad social en\nsalud. Contar con el Sisbén del Municipio de Sesquilé en la encuesta\nactualizada. Certificado de Discapacidad y/o Historia clínica con diagnóstico.\nRemisión por parte de la institución Educativa del municipio."}, {"s": "Secretaría de Desarrollo Social", "t": "RENTA CIUDADANA", "x": "La Renta Ciudadana proporciona un ingreso digno a las familias, complementado por otros programas estatales para combatir la pobreza. Los beneficiarios, principalmente padres o madres con hijos menores de 6 años, deben cumplir con compromisos en salud y educación. Se espera un alto nivel de responsabilidad para alcanzar los objetivos del programa.\nRequisitos: Tener puntaje del Sisbén categoría A y haber sido focalizado por el DPS. Fotocopia de registro civil para menores de 6 años y/o tarjeta de identidad\nde mayores de 6 años y registro civil para acreditar parentesco. Original y fotocopia del documento de identidad para cada niño o niña menor de 18 años, (registro civil con NUIP actualizado a menores de 6 años\ny tarjeta de identidad a NNA de 7 a 17 años). En todo caso, cuando se requiera establecer parentesco con el titular, se exige el registro civil de\nnacimiento. Fotocopia y documento de identidad original del acudiente.\nRealizar el trámite directamente por el acudiente."}, {"s": "Secretaría de Desarrollo Social", "t": "COLOMBIA MAYOR", "x": "El Programa de Protección Social al Adulto Mayor – “Colombia Mayor” busca aumentar la protección a los adultos mayores por medio de la entrega de un subsidio económico para aquellos que se encuentran desamparados, que no cuentan con una pensión, o viven en la extrema pobreza.\nEl Departamento para la Prosperidad Social - DPS hace proceso de selección, este no depende del municipio.\nRequisitos: Sisbén máximo en categoría C1. Estar en el régimen subsidiado independiente de la EPS.\nCopia de la cédula ampliada a 150%, activo.\nNo percibir ningún tipo de pensión o renta.\nNo tener más de un predio a su nombre. Carecer de rentas o ingresos suficientes para subsistir.\nNo tener antecedentes judiciales. Hacer trámite de postulación personalmente en la Alcaldía Municipal.\nSer residentes del municipio de Sesquilé.\nEstar en extrema vulnerabilidad. Ser aprobado por el comité de adulto mayor."}, {"s": "Secretaría de Desarrollo Social", "t": "DEVOLUCIÓN DE IVA", "x": "Como medida de apoyo económico para los hogares más pobres, el Gobierno Nacional adelantó el esquema de la devolución del IVA. Consiste en que las familias de menores ingresos reciban recursos que aliviarán el impacto del impuesto que grava el consumo de productos y servicios de las personas más vulnerables.\nRequisitos: La focalización es realizada por el Departamento para la Prosperidad\nSocial mediante un sistema de información automatizado. El registro del SISBÉN es un requisito para identificar los más vulnerables, pero no otorga el beneficio de la devolución. Recuerde\nrealizar su actualización en el SISBÉN IV de manera oportuna."}, {"s": "Secretaría de Desarrollo Social", "t": "ORDENANZA 037 Y 055 SUBSIDIOS ECONÓMICOS A ADULTOS MAYORES NO CUBIERTOS CON NINGÚN OTRO PROGRAMA Se otorgan subsidioseconómicos a adultos mayores no cubiertos con ningún otro programa.", "x": "Requisitos: No ser beneficiario de otros programas sociales.\nNo tener propiedades a su nombre. Tener régimen subsidiado en salud. Antigüedad mínima de 5 años en el municipio, ininterrumpido. Ser colombiano y residir en el territorio nacional hace más de 10 años.\nCopia de la cédula. Diligenciamiento de documentos en la oficina de la Secretaría de\nDesarrollo Social. Firmar formato de declaración juramentada que no se recibe ingreso ni\npensión. Si se reside en área rural aplica para subsidio de transporte"}, {"s": "Secretaría de Desarrollo Social", "t": "BANCO DE ALIMENTOS", "x": "Es una estrategia municipal de seguridad alimentaria y nutricional que brinda asistencia técnica y permite la identificación de necesidades, adquisición y entrega de alimentos y bienes a la población más vulnerable, con el fin de reducir la pobreza y mejorar el bienestar de las familias. La ayuda, otorgada por el municipio, la Gobernación y otras entidades, se entrega principalmente mediante kits alimentarios.\nRequisitos: Ser focalizado por el municipio, cumpliendo criterios de priorización.\nTener Sisbén del municipio. Copia de la cédula y datos de contacto. Acceder y acompañar la visita domiciliaria."}, {"s": "Secretaría de Desarrollo Social", "t": "PROCESOS Y EMPODERAMIENTO", "x": "Desarrollar procesos de formación y empoderamiento para mujeres y población diversa del municipio, mediante cursos certificados por el SENA orientados al fortalecimiento de competencias laborales, productivas y personales. Estas capacitaciones, en áreas como cocina, manualidades y confección, brindan herramientas prácticas para el emprendimiento, el autoempleo y la generación de ingresos, promoviendo la autonomía económica y el mejoramiento de la calidad de vida.\nRequisitos: Ser mayor de 14 años. Residir en el municipio de Sesquilé. Contar con documento de identidad.\nEstar inscrita en Sofía Plus. Disponibilidad para asistir a las clases."}, {"s": "Secretaría de Desarrollo Social", "t": "ESPACIOS DE ESCUCHA Y ACOMPAÑAMIENTO", "x": "Es una estrategia de acompañamiento psicológico gratuito, seguro y confidencial dirigida a mujeres y población diversa de Sesquilé, que brinda un espacio de escucha, apoyo y orientación. A través de la atención profesional, se promueve el bienestar emocional, el reconocimiento de las propias emociones y el fortalecimiento de herramientas para afrontar las situaciones cotidianas, fomentando el autocuidado y la autonomía en cada proceso personal.\nRequisitos: Ser residente del municipio de Sesquilé. Contar con disponibilidad para las atenciones presenciales o virtuales."}, {"s": "Secretaría de Desarrollo Social", "t": "CONSEJO CONSULTIVO DE MUJER", "x": "Es un espacio de participación donde las mujeres de los diferentes sectores del municipio tienen voz y voto en las diferentes decisiones que se tomen a nivel municipal.\nRequisitos: La residencia fija en el municipio de por lo menos un año. Para las comunidades indígenas debe presentar certificado de\npertenencia a la comunidad."}, {"s": "Secretaría de Desarrollo Social", "t": "PLATAFORMA DE JUVENTUD", "x": "Es un espacio de convergencia que reúne organizaciones juveniles para facilitar la participación activa de los jóvenes en ámbitos sociales, políticos, culturales y ambientales, promoviendo el intercambio de experiencias y el fortalecimiento de capacidades organizativas y de liderazgo. De acuerdo con el artículo 15 de la Ley 1885 de 2018, constituye además un mecanismo formal de participación que garantiza la incidencia de la juventud en políticas públicas y proyectos comunitarios, funcionando como puente entre los jóvenes y las instituciones, y promoviendo inclusión, corresponsabilidad y desarrollo integral."}, {"s": "Secretaría de Desarrollo Social", "t": "CONSEJO MUNICIPAL DE JUVENTUD", "x": "Es un mecanismo formal de participación democrática creado en el marco de la Ley Estatutaria 1622 de 2013 y modificado por la Ley 1885 de 2018, que garantiza la representación de las personas jóvenes entre los 14 y 28 años ante las instancias de gobierno municipal y local. Tiene como funciones principales incidir en la formulación, ejecución y evaluación de decisiones públicas, presentar iniciativas y ejercer veeduría ciudadana sobre políticas públicas, planes, programas y proyectos que impactan directa o indirectamente a la población joven; además,\ncontribuye al fortalecimiento del liderazgo juvenil, la promoción\nde la organización social y comunitaria y la consolidación de\nmecanismos que aseguren la participación efectiva de la juventud en los procesos de planeación y desarrollo territorial. En\neste sentido, se constituye como una instancia consultiva y de\nparticipación que articula a la juventud con la administración\nmunicipal, garantizando la inclusión de sus intereses en la\ngestión pública.\nRequisitos:\nTener entre 14 y 28 años almomento de la elección. Ser habitante del municipio o acreditar vínculo con la localidad, según la convocatoria municipal. Haber sido elegido mediante proceso electoral juvenil para ocupar una curul en el Consejo Municipal de Juventud. Ejercer el cargo de manera autónoma e independiente, sin representar intereses partidistas o particulares que afecten el carácter plural e inclusivo del Consejo.\nTener disposición para participar activamente en espacios de diálogo, deliberación, formulación de iniciativas y veeduría de\npolíticas públicas de juventud. Cumplir las normas, reglamentos y estatutos que regulan el\nfuncionamiento del Consejo. No estar inhabilitado legalmente para ejercer cargos de\nrepresentación ante organismos públicos."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PUBLICACIÓN DE OFERTAS DE EMPLEO", "x": "Establecer estrategias de colaboración con empresas locales para promover ofertas laborales, facilitando la vinculación de la población y mejorando su calidad de vida, gestionando las solicitudes de empresas que requieren personal através del correo del área de emprendimiento.\nRequisitos: COMUNIDAD CESANTE Ser residente del municipio de Sesquilé\nSer mayor de edad Los menores desde los 15 años pueden postularse con permiso especial de trabajo\nEnviar y mantener actualizada la hoja de vida al correo\nsesquile.emprendimiento@gmail.com Participar activamente en los procesos de selección\nNota: La base de datos se actualiza anualmente.\nSECTOR EMPRESARIAL Envíe un correo electrónico a emprendimiento@sesquile-cundinamarca.gov.co que incluya:\nPresentación breve de la empresa Nombre de la persona encargada del trámite cargo\nCorreo electrónico Teléfono de contacto Adjuntar el Registro Único Tributario (RUT) actualizado de la empresa Nota: Solo se publican ofertas laborales de empresas legalmente constituidas."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "GESTIÓN DE HOJA DE VIDA", "x": "Guiar y asesorar a quienes buscan empleo, proponiendo nuevas alternativas y mejorando las existentes.\nRequisitos: Ser mayor de edad (menor de edad a partir de los 15 años,\npueden tramitar permiso de trabajo especial)\nRadicar hoja de vida en el correo electrónico\nsesquile.emprendimiento@gmail.com (Mantener su hoja de vida actualizada) Participar activamente en los procesos de selección. Cumplir con los compromisos adquiridos con las empresas.\nNota: todos los años se realiza actualización de la base de\ndatos."}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ACOMPAÑAMIENTO Y FORTALECIMIENTO A IDEAS DE NEGOCIO O EMPRENDIMIENTOS", "x": "Se brinda acompañamiento y fortalecimiento a ideas de negocio y emprendimientos, ofreciendo asistencia técnica en componentes como el financiero, metodológico, planeación estratégica y procesos de formalización, entre otros.\nRequisitos: Ser mayor de edad (menor de edad a partir de los 15 años,\npueden tramitar permiso de trabajo especial). Ser residente del municipio de Sesquilé (como mínimo 3\naños en el municipio). -Tener una idea de negocio o un emprendimiento. -Inscribirse en la Secretaría de Competitividad, Desarrollo\neconómico y Ambiental. (2do. Piso Casa de la Cultura) Mayor Información: Correo: emprendimiento@sesquile-\ncundinamarca.gov.co Teléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "CENTRO PARA EL EMPRENDEDOR SESQUILEÑO FONDO DE CAPITAL SEMILLA", "x": "Se realizan convocatorias de estímulos de capital semilla para apoyar la creación y fortalecimiento de microempresas, mediante asesoría, asignación de recursos y seguimiento. Cada participante podrá postular un único proyecto en una sola línea de acción, y las agremiaciones sin ánimo de lucro deberán estar legalmente constituidas.\nRequisitos: Personas Naturales Ser ciudadano colombiano. Sermayor deedad Ser residente del municipio de Sesquilé por un mínimo de 3 años (Presentar constancia\nexpedida por la Junta de Acción Comunal del sector o por la Inspección de Policía\nMunicipal). Presentar documento de consulta del Sisbén, que confirme que se\nencuentra sisbenizado en el municipio de Sesquilé.\nPoblaciones especiales Víctimas del conflicto armado: Presentar certificado expedido por la Secretaría de Gobierno, no mayor a 30 días, que\nacredite su condición No requiere Sisbén\nPoblación indígena: Presentar certificación del Ministerio del Interior o de su representante legal y/o\nGobernador(a) de la comunidad reconocida en el municipio\nNo tener antecedentes judiciales Diligenciar el formato único de inscripción para persona natural, con el resumen de la\niniciativa productiva. Este formato será entregado por la entidad y estará disponible en el enlace de inscripción.\nRequisitos :\nPersona jurídica, así como asociaciones domiciliadas en el municipio de Sesquilé, que cuenten con un certificado de Cámara de Comercio con una antigüedad no mayor a 30 días. Permanencia demostrable de como mínimo 3 años en el municipio, contado a partir de la fecha de presentación del proyecto. Copia documento de cédula ciudadanía del representante legal. Certificación de registro de organizaciones formalmente constituidas – RUT Formato único de registro de inscripción del interesado, asociación y/o empresa con el resumen de la iniciativa productiva (será otorgado por la entidad y disponible en el link de inscripción).\n¿Quiénes no pueden ser beneficiarios?\nLos empleados públicos y trabajadores oficiales que laboren en la Alcaldía de Sesquilé, así como en sus entes descentralizados y/o en otras entidades públicas a nivel departamental.\nLos beneficiarios del presupuesto participativo en otras\nLas personas naturales que tengan vínculos de parentesco hasta el segundo grado de consanguinidad o afinidad con los funcionarios públicos de nivel directivo de la Alcaldía de Sesquilé y sus entes descentralizados.\nlíneas de inversión. Las personas naturales y/o jurídicas que no presenten la\ndocumentación requerida y/o que no realicen la\ninscripción en las fechas determinadas en la\nconvocatoria. Las personas naturales y/o jurídicas que hayan sido beneficiadas con capital semilla en la versión Sesquilé te\nLas personas naturales y/o jurídicas cuyo representante legal tenga vínculos de parentesco hasta el segundo grado de consanguinidad o afinidad con los funcionarios públicos de nivel directivo de la Alcaldía de Sesquilé y sus entes descentralizados.\nEcha la Mano para Emprender del año 2023 y del Centro\npara el Emprendedor Sesquileño en la versión 2024. Las personas naturales y/o jurídicas que no cumplan con\nlas actividades definidas en la metodología, o que deleguen su representación sin una causa justificada,\ndeberán anexar una carta en la que se expongan los motivos de fuerza mayor por los cuales no puede asistir\nde manera personal.\nMayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co\nTeléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PLANEACIÓN DE OFERTA INSTITUCIONAL SENA", "x": "La Administración Municipal, en convenio con el SENA, ofrece programas de formación gratuita para jóvenes y adultos, según la Ley 749 de 2002, que organiza el servicio público de educación superior en modalidades técnica profesional y tecnológica.\nRequisitos: Residir en el municipio de Sesquilé o municipios aledaños. Inscribirse en el proceso de formación en el cual se encuentra interesado\nen la Secretaría de Competitividad, Desarrollo Económico y Ambiental.\nFotocopia del documento de identidad, número de WhatsApp y correo\nelectrónico. Ser mayor de 15 años. Estar inscrito en la plataforma del Sena Sofia Plus.\nMayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co\nTeléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "VIVERO FORESTAL OFERTA INSTITUCIONAL", "x": "La Administración Municipal ofrece el servicio de Vivero Forestal para la producción, conservación, venta y entrega de material vegetal (especies forestales y ornamentales), destinado a la reforestación, recuperación ambiental, embellecimiento de espacios y fortalecimiento de iniciativas comunitarias y productivas del municipio.\nRequisitos: Residir en el municipio de Sesquilé. Realizar el pago del material vegetal a adquirir. Hacer solicitud en la Secretaría de Competitividad, Desarrollo Económico y Ambiental. Indicar la finalidad del material vegetal solicitado (reforestación, ornato, conservación, entre\notros). Realizar la solicitud del material vegetal o del acompañamiento técnico en la Secretaría de Competitividad, Desarrollo Económico y Ambiental donde se evalúa la disponibilidad y se define\nla entrega o el acompañamiento requerido. Costo: De acuerdo a los valores estipulados según el tamaño del material vegetal, los cuales se\nencuentran en el estatuto tributario municipal.\nMayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co\nTeléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASISTENCIA TÉCNICA AMBIENTAL", "x": "Orientar y guiar a cada una de las personas que estén interesadas en aumentar la cobertura forestal dentro de sus predios con especies nativas de bosque andino y alto andino o restaurar zonas afectadas por la ampliación de la frontera agrícola.\nRequisitos: Acercarse o comunicarse con la Secretaría de Competitividad,\nDesarrollo Económico y Ambiental. Realizar la solicitud del acompañamiento técnico ambiental en la Secretaría de Competitividad, Desarrollo Económico y Ambiental,\ndonde se evalúa la solicitud y se programa la visita técnica o la\nasesoría correspondiente.\nMayor Información: Correo: emprendimiento@sesquile-cundinamarca.gov.co\nTeléfono: 3206688935"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASESORÍA TÉCNICA EN ESPECIES MENORES Y MAYORES", "x": "Se brinda asistencia técnica en el área pecuaria mediante profesionales y técnicos especializados, atendiendo solicitudes relacionadas con el manejo productivo de las especies, sanidad preventiva y curativa, mejoramiento de parámetros zootécnicos e implementación de procesos y tecnologías de acuerdo con los requerimientos de cada especie.\nRequisitos: Ser propietario de especies menores y mayores en la jurisdicción del\nmunicipio de Sesquilé. Inscripción solicitud de servicio en planilla de la Secretaría de\nCompetitividad, Desarrollo Económico y Ambiental. Acercarse, escribir o llamar a la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "JORNADAS DE ESTERILIZACIÓN DE MASCOTAS", "x": "Se realiza intervención quirúrgica (ovariohisterectomía) en hembras y (castración) en machos esto con el objetivo de controlar la población canina y felina en el municipio\nRequisitos: Inscripción solicitud de servicio en planilla de la Secretaría de\nCompetitividad, Desarrollo Económico y Ambiental. Únicamente para especies caninas y felinas de la población del\nMunicipio de Sesquilé de nivel de Sisbén A, B y C.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "TENENCIA RESPONSABLE DE ANIMALES DE COMPAÑÍA", "x": "Se realizan y coordinan acciones de capacitación, adopción de mascotas, acompañamiento y seguimiento, promoviendo el cuidado responsable y el bienestar de los animales de compañía.\nRequisitos: Inscripción solicitud de servicio en planilla de la Secretaría de\nCompetitividad, Desarrollo Económico y Ambiental.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "EMERGENCIAS EN ANIMALES DE COMPAÑÍA Y PRODUCCIÓN", "x": "Asistencia que se da cuando se encuentra un animal en una situación que requiera de asistencia técnica en emergencias acompañado con Bomberos o Policía Nacional.\nRequisitos: Inscripción solicitud de servicio en la Secretaría de Competitividad, Desarrollo Económico y Ambiental.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PROGRAMA DE MEJORAMIENTO GENÉTICO", "x": "Se presta el servicio de inseminación artificial con celo detectado o mediante protocolos, incluyendo inseminación artificial a término fijo (IATF), dirigido a hembras bovinas de pequeños y medianos productores del municipio de Sesquilé, brindando orientación técnica para mejorar los parámetros productivos, de acuerdo con la disponibilidad del material genético y del profesional pecuario.\nRequisitos: Ser pequeño o mediano productor, propietario de hembras bovinas en óptimas condiciones para la inseminación, en la\njurisdicción del municipio de Sesquilé. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la\nsolicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "SOSTENIMIENTO DE HUERTAS CASERAS", "x": "Se implementan huertas caseras y escolares\nmediante capacitaciones y entrega de insumos como\nsemillas\ny hortalizas, con el propósito de fortalecer la seguridad alimentaria del municipio de Sesquilé, dirigidas a la población en general y a instituciones educativas, bajo modalidad de convocatoria o según disponibilidad del servicio.\nRequisitos: Residir en el municipio de Sesquilé. Tener o implementar la huerta y seguir las recomendaciones\ntécnicas. Tener voluntad e interés. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la\nsolicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ASISTENCIA TÉCNICA AGRÍCOLA", "x": "Se brinda acompañamiento técnico permanente al sector agrícola del municipio de Sesquilé, dirigido a pequeños y medianos productores, enfocado en la implementación de prácticas de agricultura limpia y sostenible, el fortalecimiento de los procesos productivos agrícolas y el uso de abonos y fertilizantes orgánicos.\nRequisitos: Ser pequeño o mediano productor agrícola del municipio de\nSesquilé. Realizar la inscripción en la planilla de servicios de la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la\nsolicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "EXPEDICIÓN DE GUÍA SANITARIA DE MOVILIZACIÓN INTERNA (GSMI)", "x": "Se realiza el trámite de la guía de movilización animal ante el ICA para el traslado de ganado caprino, ovino, porcino, bovino, equino, asnal y bufalino, dirigido a la población del municipio de Sesquilé, bajo modalidad de atención permanente.\nRequisitos: Realizar el pago de la generación de guía de movilización en la Secretaría de Hacienda del valor correspondiente. El predio deberá estar registrado previamente ante el ICA con la forma 3-101. Tener el certificado del último ciclo de vacunación vigente.\nCédula de ciudadanía original de la persona que solicita la Guía de\nMovilización Interna. En caso de no estar presente el propietario del predio, la persona que\nsolicita la GSMI deberá llevar autorización firmada, con huella y\nfotocopia de la cédula del propietario del predio. Exámenes de laboratorio de los animales si la movilización lo exige\n(concentraciones ganaderas)\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "ALQUILER DE MAQUINARIA AGRÍCOLA", "x": "Se presta de manera permanente el servicio de maquinaria agrícola con tractor y disponibilidad de implementos como arado rastrillo y retobo, dirigido a pequeños y medianos productores del municipio de Sesquilé.\nRequisitos: Ser pequeño o mediano productor agrícola del municipio de Sesquilé.\nEstablecer el tipo de implemento que requiere. Cancelar el valor establecido en el Estatuto Tributario Municipal\nvigente en la Secretaría de Hacienda. Con el recibo de pago programar el servicio con la Secretaría de\nCompetitividad, Desarrollo Económico y Ambiental\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "PROTECCIÓN DE FAUNA SILVESTRE", "x": "Atención de emergencias, incautación en compañía de autoridades y reubicación de las especies de fauna silvestre.\nRequisitos: Acercarse, escribir o llamar a la Secretaría de Competitividad, Desarrollo Económico y Ambiental y realizar la solicitud del servicio.\nCorreo electrónico: tec2.desarrollorural@sesquile-cundinamarca.gov.co\nTeléfono: 3112341796"}, {"s": "Secretaría de Competitividad, Desarrollo Económico y Ambiental", "t": "VENTANILLA ÚNICA DE RADICACIÓN", "x": "La ventanilla única de radicación es el servicio institucional de la Alcaldía para recibir y registrar de forma centralizada y estandarizada todas las PQRSDF (peticiones, quejas, reclamos, solicitudes, denuncias,\ny felicitaciones) sobre trámites y comunicaciones dirigidas a sus dependencias. Cada requerimiento se radica con número único, fecha y hora, lo que permite trazabilidad, seguimiento y control durante todo el ciclo de atención, según tiempos y procedimientos establecidos.\nSe presta por canales presenciales, virtuales o mixtos, articulado con sistemas de atención al ciudadano, gestión\ndocumental, caracterización de usuarios y tableros\ninstitucionales para monitoreo permanente del\ndesempeño del portafolio.\nCorreo electrónico: ventanillaunica@sesquile-cundinamarca.gov.co página web\ninstitucional - módulo de peticiones, quejas y reclamos."}, {"s": "Oficina de Relación Estado Ciudadano", "t": "SOLICITUD DE TARIFA DIFERENCIAL DEL PEAJE EL ROBLE", "x": "Asesoría y recepción de documentos para adquirir beneficio del peaje tanto para solicitudes nuevas o solicitudes de cambio.\nRequisitos\nSOLICITUD NUEVA\nCopia de Cédula de Ciudadanía del propietario del vehículo. Copia de la Tarjeta de Propiedad del Vehículo (debe coincidir con la cédula). Certificado de Residencia expedido por la Inspección de Policía.\nSOLICITUD DE CAMBIO Copia de la tarjeta de propiedad del nuevo vehículo Tiempo de respuesta: “Depende de la revisión por parte de la ANI”"}, {"s": "Oficina de Relación Estado Ciudadano", "t": "CONVENIO UNIVERSIDAD DE LA SABANA", "x": "Programa de apoyo educativo que otorga descuentos en matrícula para residentes del municipio que deseen cursar estudios de pregrado y posgrado, con el fin de facilitar el acceso y la permanencia en educación superior de calidad; el beneficio contempla 25% de descuento en pregrado, 25% en especializaciones y maestrías, y 20% en doctorado.\nREQUISITOS: Ser residente de Sesquilé. • Pertenecer a estratos 1, 2 o 3. • Ingresar desde primer semestre. • Ser bachiller del año inmediatamente anterior. • Cumplir promedio mínimo de 3,8 (pregrado) o 4,2 (posgrado). Tendrán prelación los egresados de colegios públicos del municipio y estudiantes de colegios privados con menor pensión."}, {"s": "Secretaría de Gobierno", "t": "NUEVA GENERACIÓN COMUNAL", "x": "El programa busca formar una nueva generación de líderes comunitarios desde edades tempranas, fortaleciendo valores ciudadanos, identidad local, participación social y habilidades para la vida, contribuyendo a la prevención de violencia, deserción escolar y desinterés cívico.\nRequisitos: Grupo indeterminado de niños, niñas y/o adolescentesque voluntariamente por barrio o vereda quieran conformar la\nnueva generación Comunal. Residir en el barrio, sector y/o vereda respectiva.\ntener entre 7 y 17 años. Inscribirse con el presidente de cada Junta de Acción Comunal\nLa administración sólo recibe el consolidado de la información y apoya en cuanto a la capacitación de los\nparticipantes."}, {"s": "Secretaría de Gobierno", "t": "ATENCIÓN HUMANITARIA POR INMEDIATEZ", "x": "Se brinda ayuda humanitaria a las víctimas del desplazamiento forzado y de otros hechos victimizantes, tales como: amenaza, atentado o acto terrorista, desaparición forzada, tortura, delitos contra la libertad e integridad sexual, homicidio, accidentes por minas antipersonal o municiones sin explotar (MUSE), secuestro, vinculación de niños, niñas y adolescentes (NNA) a grupos armados, lesiones personales y situaciones de confinamiento.\nRequisitos: Hacer la declaración dentro de los tres (3) meses siguientes a la fecha\nde ocurrencia del desplazamiento forzado o del hecho victimizante. Estar en el censo (masivos) o declaración individual ante el Ministerio\nPúblico. No estar valorado en el RUV por ese hecho. Estar en situación de vulnerabilidad acentuada como consecuencia\ndel desplazamiento forzado. No haber recibido previamente Atención Humanitaria Inmediata por el mismo hecho, bien sea por la entidad territorial o por otra entidad\ndel SNARIV"}, {"s": "Secretaría de Gobierno", "t": "MECANISMO DE ENTREGA DE AYUDA HUMANITARIA INMEDIATA", "x": "En especies:\nSe refiere a la entrega de loscomponentes que le corresponden de acuerdo con sus necesidades.\nEn dinero: Se refiere a la entrega del valor equivalente a los componentes que le corresponden de acuerdo con sus necesidades representado en montos de dinero.\nNormativa: Plan de contingencia, ley 1448 de 2011\nmodificada por la 2421 de 2025."}, {"s": "Secretaría de Gobierno", "t": "CARACTERIZACIÓN DE VÍCTIMAS DEL CONFLICTO ARMADO", "x": "Mecanismo que permite producir y consolidar información sobre la situación de las víctimas del conflicto armado, mediante la articulación entre la Unidad, los registros de la Red Nacional de Información y los demás actores del SNARIV, en especial las Entidades Territoriales. Este mecanismo tiene como propósito realizar procesos de focalización, entendidos como la orientación de las acciones a desarrollar hacia grupos poblacionales específicos, de acuerdo con sus características particulares, así como definir procesos de priorización, que consisten en establecer un orden de atención a los hogares o individuos según su nivel de vulnerabilidad.\nRequisitos para la caracterización:\nResidir en el municipio y comprobarlo con un certificado de\nresidencia. Fotocopia del documento de identidad. Registro civil o tarjeta de identidad para los menores.\nEstar inscrito en el Registro Único de Víctimas Realizar la encuesta de caracterización ante la Secretaría de\nGobierno."}, {"s": "Secretaría de Gobierno", "t": "RED DE APOYO, ZONAS SEGURAS", "x": "Articular esfuerzos con la Policía Nacional mediante el establecimiento de canales de comunicación permanentes, tales como radioteléfonos, teléfonos celulares y otros medios disponibles, que permitan mantener una comunicación directa, con el fin de prevenir la comisión de delitos, fortalecer la convivencia ciudadana y brindar apoyo oportuno a la comunidad del sector.\nRequisitos: Vinculación gratuita y voluntaria\nCarta de solicitud Residir en el municipio y comprobarlo con un certificado de\nresidencia."}, {"s": "Secretaría de Gobierno", "t": "SERVICIO DE PERIFONEO", "x": "Consiste en la emisión de mensajes o avisos de cualquier tipo a través de parlantes o altavoces en la vía pública, con el fin de anunciar actividades industriales, comerciales o de servicios, así como debates o acontecimientos de cualquier naturaleza; para el uso de parlantes, altavoces o sistemas de perifoneo se requiere permiso previo de la Alcaldía, el cual se otorgará por lapsos diarios de hasta tres (3) horas y por períodos que no excedan de cinco (5) días continuos.\nRequisitos: Radicar solicitud \"dirigida a la Secretaría de Gobierno \"de manera física en la ventanilla única de radicación o por correo electrónico\nventanillaunica@sesquile-cundinamarca.gov.co\nPagar el valor correspondiente al perifoneo por hora (en la\nSecretaría de Hacienda) ."}, {"s": "Secretaría de Gobierno", "t": "AUTORIZACIÓN PARA LA REALIZACIÓN DE EVENTOS Y/O ESPECTÁCULOS EN EL MUNICIPIO", "x": "Expedir la autorización para la realización de eventos y/o espectáculos públicos que se pretendan realizar en el municipio de Sesquilé conforme a la normatividad vigente.\nRequisitos: De conformidad con lo establecido en la Ley 1523 de 2012, el Decreto 2157 de 2017 y la Circular 009 de 2021 de la Gobernación de Cundinamarca, el ciudadano deberá anexar la documentación correspondiente, según aplique, de acuerdo con la complejidad del evento:\nOficio de Solicitud de autorización del evento. Plan de Contingencia firmado por el representante legal.\nCertificado de existencia y representación legal. Autorización o contrato con el lugar donde se realizará el evento (solo si aplica).\nAutorización de titulares y derechos de autor (solo si aplica).\nConcepto de manejo ambiental ( solo si aplica). Control de aforo (obligatorio) y relación de boletería (solo si aplica).\nPóliza de responsabilidad civil extracontractual para el evento\nConcepto técnico sanitario ( solo si aplica). Plan de manejo de tránsito. Copia de radicado y viabilidad del PMT ante POB-BTS,\nSecretaría departamental (ANI si aplica). Requisitos Ley 678 de 2001 Artículo 5° Uso de pólvora, artículos pirotécnicos o\nfuegos artificiales (solo si aplica).\nUso de suelo."}, {"s": "Secretaría de Gobierno", "t": "EVENTOS Y/O ESPECTÁCULOS DE LAS ARTES ESCÉNICAS", "x": "Evaluación y autorización municipal para la realización de eventos y/o espectáculos de las artes escénicas, mediante la verificación de los requisitos legales, técnicos y de gestión del riesgo, con el fin de garantizar la seguridad de los asistentes y el cumplimiento de la normatividad vigente.\nDocumentos requeridos (cuando aplique): Para espectáculos públicos de las artes escénicas, el organizador deberá presentar la resolución como productor PULEP, el código del evento PULEP y el certificado de pago de la contribución parafiscal cultural.\nPasos del trámite: Radicar la solicitud ante la Alcaldía Municipal (Ventanilla Única o correo electrónico), con la documentación completa y mínimo\nquince (15) días hábiles antes del evento. La Secretaría de Gobierno revisa los documentos y define la\ncomplejidad del evento: si es no complejo, emite concepto\nfavorable o notifica ajustes; si es complejo, el organizador presenta el plan ante el CMGRD, que emite concepto técnico.\nEl día del evento, el Cuerpo Oficial de Bomberos de Sesquilé realiza inspección previa; si se subsanan las observaciones, la\nSecretaría de Gobierno emite la autorización definitiva."}, {"s": "Secretaría de Gobierno", "t": "REVISIÓN Y APROBACIÓN PLANES DE GESTIÓN DEL RIESGO DE EMERGENCIAS Y DE DESASTRES", "x": "Servicio orientado a la revisión y aprobación de los PGRDEPP como instrumento de planeación para la gestión del riesgo de desastres, dirigido a representantes de edificaciones públicas y privadas, establecimientos comerciales e industriales, instituciones educativas y demás personas o entidades que lo requieran en el municipio.\nRequisitos: Solicitud interpuesta por el ciudadano o la organización con la información completa que incluya nombre, teléfono de contacto, correo, dirección. Documento del Plan de Gestión de Riesgos de Emergencias y Desastres Radicar en la Alcaldía Municipal - Sede Central - Ventanilla Única – o mediante correo electrónico los documentos relacionados en los requisitos.\nProcedimiento:\nLa Ventanilla de Atención al Usuario asigna el radicado y traslada la solicitud\na la Coordinación del CMGRD. La Coordinación del CMGRD informa al peticionario la fecha de presentación del\nplan ante sus integrantes y, en caso de\nobservaciones, estas se comunican\ndurante la sesión o para que sean\nsubsanadas o corregidas. Una vez recibidas las correcciones, se emite el Concepto Técnico Documental\ndel Plan de Gestión del Riesgo de\nDesastres."}, {"s": "Comisaría de Familia", "t": "VERIFICACIÓN DE DERECHOS", "x": "Al tener conocimiento de la presunta vulneración de derechos de un niño, niña, adolescente, persona con discapacidad o adulto mayor, la Comisaría de Familia debe activar de inmediato los actos urgentes según la ruta establecida. Esto incluye la verificación de derechos, visitas sociales, entrevistas, búsqueda de redes familiares o institucionales, y la presentación de denuncias si corresponde, con el objetivo de restablecer los derechos vulnerados.\nRequisitos: Diligenciar la solicitud mediante formato existente en la\ncomisaría. Presentar copia del documento de identidad si es\nnecesario."}, {"s": "Comisaría de Familia", "t": "MEDIDAS DE PROTECCIÓN", "x": "En atención a lo consagrado en la normatividad vigente, todas las personas del grupo familiar, los adultos mayores y personas con discapacidad son amparados mediante medida preventiva de protección cuyo trámite se podrá adelantar ante la Comisaría de Familia, siempre y cuando hubiesen sido agredidos o violentados por su propia familia y/o dentro de una misma unidad residencial. Se hará acompañamiento psicosocial por parte de la Comisaría de Familia.\nRequisitos: Presentar copia del documento de identidad Solicitud formal mediante formato existente en la\ncomisaría de familia."}, {"s": "Comisaría de Familia", "t": "TALLERES", "x": "Procesos de socialización y capacitación en temas como: Pautas de Crianza, Prevención de Violencia Intrafamiliar, Prevención de Abuso Sexual Infantil, Rutas de Atención, acompañamiento a Líderes Estudiantiles en temas propios de sus cargos.\nRequisitos: Realizar la solicitud por escrito en la Comisaría de Familia."}, {"s": "Comisaría de Familia", "t": "CONCILIACIÓN Y/O ACUERDOS", "x": "La Comisaría de Familia como autoridad administrativa puede adelantar de oficio y/o a petición de parte diligencias de Conciliación frente a obligaciones alimentarias, vestuario, salud, educación, recreación, visitas entre otros a favor de niños, niñas, adolescentes, adultos mayores y/o personas en condición de discapacidad.\nEN CASO DE NNA (niña, niño, ó adolescente:\nCopia del documento de identidad o Registro Civil, carnet de vacunación, crecimiento y\ndesarrollo, certificado educación Petición efectuada mediante formato de atención o de manera formal\nmediante solicitud motivada. Pagar según el destino.\nRequisitos: Copia del documento de identidad del o los solicitantes"}, {"s": "Comisaría de Familia", "t": "RESTABLECIMIENTOS DE DERECHOS", "x": "En caso de encontrarse un presunto derecho en riesgo, amenaza o inobservancia se deberá adelantar inmediatamente el proceso administrativo de restablecimiento de derechos, involucrando como directos responsables a los familiares y/o cuidadores, así como a las instituciones responsables de su protección. Además de observar las presuntas situaciones por negligencia, maltrato y/o abandono colocando en conocimiento a las autoridades judiciales competentes.\nRequisitos: -Copia del documento de identidad. -Diligenciar formulario de atención."}, {"s": "Inspección de Policía", "t": "CERTIFICADO DE RESIDENCIA", "x": "Documento emitido a personas físicas cuando una entidad, empresa o institución lo solicita para certificar su residencia o domicilio en una localidad específica.\nRequisitos: Copia de cédula de ciudadanía. Si es menor de edad -Copia de la tarjeta de identidad.\nCopia de servicio público Recibo pago del certificado (emitido por la\nSecretaría de Hacienda)."}, {"s": "Inspección de Policía", "t": "LICENCIA DE INHUMACIÓN", "x": "Este documento oficial autoriza la sepultura de una persona en el cementerio local o en el lugar de inhumación designado. Es necesario para proceder con el acto de inhumación, de acuerdo con las normativas vigentes, incluyendo la Ley de Cementerios, el Reglamento de Salud Pública y el Código Civil, así como las regulaciones específicas de la municipalidad correspondiente.\nRequisitos: -Certificado de defunción. -Copia de la cédula del fallecido. -En caso de ser muerte por hechos violentos\n(Autorización de la Fiscalía) - La solicitud la genera directamente la funeraria."}, {"s": "Inspección de Policía", "t": "ACTAS DE CONCILIACIÓN", "x": "Es un documento formal que registra un acuerdo alcanzado entre dos o más partes para resolver un conflicto fuera de un juicio, formalizando su voluntad de manera clara, Este mecanismo alternativo busca una solución rápida y pacífica en comportamientos contrarios a la convivencia.\nRequisitos: -Queja escrita o verbal\n-Citación -Acuerdo o no Acuerdo"}, {"s": "Inspección de Policía", "t": "ACTAS DE VISITAS", "x": "El acta de visita de Inspección de Policía es un instrumento técnico, formal y probatorio, esencial para documentar actuaciones de control y sustentar decisiones administrativas o procesos policiales posteriores.\nRequisito: -Queja escrita o verbal\n-Informe"}, {"s": "Inspección de Policía", "t": "DESPACHOS COMISORIOS", "x": "Los despachos comisorios son órdenes judiciales formales mediante las cuales un juez comisiona a otra autoridad para que practique diligencias procesales, cuando no puede realizarlas directamente.\nRequisitos: Auto de comisión\nCitaciones Diligencias\nTiempo de respuesta: Dentro de un plazo razonable, sujeto a\nagendamiento. Trámite realizado en la Secretaría de Gobierno “Inspección de Policía”"}, {"s": "Inspección de Policía", "t": "PROCESOS MEDIDAS CORRECTIVAS POR COMPORTAMIENTOS CONTRARIOS A LA CONVIVENCIA", "x": "El proceso verbal abreviado por medidas correctivas es el mecanismo rápido que permite impugnar sanciones de policía ante un Inspector o corregidor de convivencia y Paz urbano en municipios y distritos de 3 a 6 Categoría rural.\nRequisitos: -Comparendo -Recurso de apelación\n-Pago\nTiempo de respuesta: Tres días para presentar recurso de\napelación y cinco días para cancelar con el 50% de\ndescuento"}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR COMPORTAMIENTOS CONTRARIOS A LA CONVIVENCIA", "x": "El proceso verbal abreviado por comportamientos contrarios a la convivencia es el procedimiento policivo ágil mediante el cual se controvierten las conductas que afectan la convivencia ciudadana, garantizando el debido proceso.\nRequisitos:\n-Queja -Citación -Decisión -Recursos"}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR PERTURBACIÓN A LA POSESIÓN, LA TENENCIA Y LAS SERVIDUMBRES", "x": "Es una solicitud formal ante la inspección de Policía en caso de perturbación a la posesión, a la mera tenencia y al derecho de servidumbre, de conformidad al artículo 79 de la ley 1801 de 2016.\nRequisitos: -Solicitud de querella policiva de manera formal en la ventanilla\núnica para lo cual puede usar los canales disponibles\n-Citación -Decisión -Recursos"}, {"s": "Inspección de Policía", "t": "PROCESOS VERBALES ABREVIADOS POR COMPORTAMIENTOS QUE AFECTAN LA INTEGRIDAD URBANÍSTICA (MULTA ESPECIAL)", "x": "Es una solicitud formal presentada ante la Inspección de Policía para que se verifique y controle una presunta construcción ilegal, de conformidad con el artículo 135 del Código Nacional de Seguridad y Convivencia Ciudadana.\nRequisitos: -Queja u oficio\n-Citación -Decisión -Recursos"}, {"s": "Secretaría de Planeación", "t": "LICENCIAMIENTO URBANÍSTICO", "x": "Esta dependencia tiene a su cargo la gestión y expedición de las licencias y autorizaciones requeridas para el desarrollo urbanístico y el uso de los predios.\nTipos de Licencias: Incluye Urbanización, Parcelación, Subdivisión, Construcción e Intervención del\nEspacio Público.\nModalidades: Cubre\ndesde obra nueva, ampliaciones y demoliciones, hasta cerramientos y saneamientos. Tiempo de Respuesta: Unificado en 45 días hábiles para todas las modalidades. Prórrogas y Revalidaciones: Segestionan prórrogas (dentro de la vigencia) y revalidaciones (30 días para resolver).\nDocumentación requerida para todas las solicitudes: Basado en la Resolución 1026 de 2021 (que modifica la Resolución\n463 de 2017) y el Formulario Único Nacional, los documentos que son obligatorios para toda solicitud de licencia urbanística,\nindependientemente de la modalidad son los siguientes:\nDOCUMENTOS COMUNES A TODA SOLICITUD\n1.Certificado de Libertad y Tradición: Copia reciente, expedida con una anterioridad no mayor a un (1) mes antes de la fecha de la solicitud. Cuando el predio no se haya desenglobado se podrá aportar el certificado del predio de mayor extensión. 2.Formulario Único Nacional - FUN: Debe estar debidamente diligenciado y firmado por el solicitante (propietario) y los profesionales responsables. 3.Documento de Identidad del Solicitante: Si es persona natural: Copia de la cédula de ciudadanía o extranjería. Si es persona jurídica: Certificado de existencia y representación legal (vigencia no mayor a un mes). 4.Poder o Autorización (si aplica): Si el trámite no lo hace el propietario directamente, se requiere un poder especial debidamente otorgado ante notaría o juez. 5.Copia del Impuesto Predial: Copia del documento de pago del último año gravable del predio objeto de la solicitud (donde figure la dirección alfanumérica o nomenclatura). 6.Relación de Vecinos Colindantes: Un listado con las direcciones de los predios colindantes al proyecto para efectos de la citación y comunicación a terceros interesados. 7.Copia de las Tarjetas Profesionales: De todos los profesionales que intervienen en el trámite (arquitectos, ingenieros, etc.), junto con certificaciones de vigencia expedidas por los consejos profesionales respectivos.\nAdicional a los requisitos generales, cada tipo de licencia exige documentación técnica especializada según la naturaleza de la intervención.\nPara las licencias de Urbanización y Parcelación, es fundamental anexar el plano topográfico y el proyecto urbanístico detallado (o de parcelación) junto con la certificación de disponibilidad de servicios públicos; en el caso de la Subdivisión, el requisito central es el plano del levantamiento topográfico que señale claramente los linderos y áreas de los predios resultantes. Por su parte, la licencia de Construcción demanda una carga técnica mayor que incluye la memoria de cálculos y diseños estructurales, el estudio de suelos y los planos arquitectónicos completos, mientras que, para la Intervención y Ocupación del Espacio Público, se deben presentar los planos de diseño específicos del espacio o equipamiento a intervenir acompañados de la descripción del proyecto.\nOtras Actuaciones Urbanísticas Trámites administrativos y técnicos que no constituyen una licencia de construcción.\nServicios Clave:\nConceptos de norma y uso del suelo. Copias certificadas de planos y ajustes de cotas. Aprobación de Planos de Propiedad Horizontal y piscinas. Autorización de movimiento de tierras. Tiempos de Respuesta: Generalmente 15 días hábiles, excepto para modificaciones de planos urbanísticos y revisiones estructurales independientes que toman 30 días hábiles.\nPara las Otras Actuaciones Urbanísticas, la documentación técnica varía considerablemente según el trámite específico. En el caso de la Aprobación de los Planos de Propiedad Horizontal, es indispensable anexar los planos de alinderamiento (cuadros de áreas y mojones) junto con la minuta del reglamento de propiedad horizontal. Para la Autorización de Movimiento de Tierras, se requiere aportar el plano topográfico y los estudios geotécnicos que garanticen la estabilidad del terreno.\nSi la solicitud es para la Aprobación de Piscinas, se deben\npresentar los planos arquitectónicos y de detalles que\nincluyan el cumplimiento de las normas de seguridad; mientras que para la Validación de Planos o conceptos técnicos, el énfasis recae en la presentación de la copia de\nlos planos originales o la planimetría que se pretende\ncorregir o legalizar."}, {"s": "Secretaría de Planeación", "t": "GESTIÓN DEL SISBÉN", "x": "La Secretaría opera la oficina local para la focalización de servicios sociales.\nTrámites:\nSolicitud de encuesta nueva (por cambio de domicilio o inconformidad). Actualización de datos y rectificaciones. Inclusión de personas (novedades) o retiros del hogar. Tiempos de Respuesta:\nVisita y encuesta local: Hasta 15 días hábiles. Publicación en base nacional (DNP): Aprox. 6 días hábiles tras validación.\nLEGALIZACIÓN Y TITULACIÓN DE PREDIOS\nProcesosenfocados enla formalización de la propiedad.\nAlcance: Cesión gratuita o enajenación de bienes fiscales y saneamiento de titulación de predios privados (falsa tradición). Beneficiarios: Hogares ocupantes (cesionarios) que requieren titularidad legal.\nOTROS TRÁMITES:\nCertificado de Nomenclatura Certificado de Estratificación Certificado de No Riesgo Para la solicitud de cualquiera de los documentos mencionados, el interesado deberá acercarse a la Secretaría de Planeación, presentando el recibo de pago correspondiente al certificado requerido, junto con una copia del recibo de pago del impuesto predial."}, {"s": "Secretaría de Infraestructura", "t": "VÍAS", "x": "Se realiza\nmantenimiento, mejoramiento y/o rehabilitación vial, urbana y rural de 240 km, involucrando en algunos sectores a las comunidades y dando cumplimiento al decreto 056 de 2005, para dichas actividades la secretaría de infraestructura contrata el suministro y transporte de recebo y según el cronogra const FAREWELL_WORDS = ["adios","chao","chau","hasta luego","nos vemos","bye","muchas gracias hasta luego","gracias adios"];
const GREETING_ONLY_WORDS = ["hola","buenas","buenos dias","buenas tardes","buenas noches","holaa","hey","ola"];

/* ============ Utilidades de texto ============ */
const STOPWORDS = new Set(["de","la","el","en","y","a","que","los","las","un","una","para","por","con","del","al","es","se","su","sus","como","o","u","no","si","le","lo","mi","me","tu","este","esta","estos","estas","cual","cuales","donde","dónde","cuando","cuándo","hay","puedo","puede","debo","debe","quiero","necesito","favor","gracias","alcaldia","alcaldía","sesquile","sesquilé","municipio","informacion","información","sobre","hacer","secretaria","secretaría","oficina","comisaria","comisaría","inspeccion","inspección","despacho","dependencia","municipal"]);
const CONTACT_INTENT = new Set(["telefono","contacto","contactos","direccion","ubicacion","queda","celular","llamar","numero","correo","email"]);

function normalize(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9ñ\s]/g,' ').replace(/\s+/g,' ').trim();
}
function tokenize(str){
  return normalize(str).split(' ').filter(t=>t.length>2 && !STOPWORDS.has(t));
}
function rawTokenize(str){
  return normalize(str).split(' ').filter(t=>t.length>0);
}

/* ============ Índices ============ */
const INTENT_TOKENS = INTENTS.map(it=>({
  triggerTokens: it.triggers.map(t=>new Set(tokenize(t)))
}));
const KB_TOKENS = KB.map(e=>({
  titleTokens: tokenize(e.t),
  bodyTokens: tokenize(e.x),
  depTokens: tokenize(e.s)
}));

/* ============ Detección de saludo / despedida / confuso ============ */
function isGreetingOnly(norm, tokens){
  if(tokens.length===0) return false;
  return GREETING_ONLY_WORDS.some(g => norm === g || norm.startsWith(g+' ') || norm===normalize(g));
}
function isFarewell(norm){
  return FAREWELL_WORDS.some(f => norm.includes(normalize(f)));
}

/* ============ Scoring intenciones (banco de Tomi) ============ */
function scoreIntent(queryTokens, idx){
  const {triggerTokens} = INTENT_TOKENS[idx];
  let best = 0;
  for(const trigSet of triggerTokens){
    let exact = 0, partial = 0;
    for(const qt of queryTokens){
      if(trigSet.has(qt)) exact += 1;
      else{
        for(const tt of trigSet){
          if(tt!==qt && (tt.includes(qt)||qt.includes(tt)) && Math.min(tt.length,qt.length)>=4){ partial += 1; break; }
        }
      }
    }
    const size = trigSet.size;
    const needed = size<=1 ? 1 : Math.max(2, Math.ceil(size*0.6));
    if(exact >= needed){
      const score = exact + partial*0.5;
      if(score > best) best = score;
    }
  }
  return best;
}
function matchIntent(query){
  const qTokens = tokenize(query);
  if(qTokens.length===0) return null;
  let bestIdx=-1, bestScore=0;
  INTENTS.forEach((it,idx)=>{
    const s = scoreIntent(qTokens, idx);
    if(s>bestScore){ bestScore=s; bestIdx=idx; }
  });
  if(bestIdx>=0 && bestScore>=1) return INTENTS[bestIdx];
  return null;
}

/* ============ Scoring KB (portafolio de servicios) ============ */
function scoreEntry(queryTokens, idx, isContactEntry){
  const {titleTokens, bodyTokens, depTokens} = KB_TOKENS[idx];
  let score = 0, contactHits = 0;
  const titleSet = new Set(titleTokens), bodySet = new Set(bodyTokens), depSet = new Set(depTokens);
  for(const qt of queryTokens){
    if(titleSet.has(qt)) score += 5;
    if(depSet.has(qt)) score += 2;
    if(bodySet.has(qt)) score += 1;
    if(CONTACT_INTENT.has(qt)) contactHits++;
    for(const tt of titleTokens){
      if(tt!==qt && (tt.includes(qt) || qt.includes(tt)) && Math.min(tt.length,qt.length)>=4){
        score += 2; break;
      }
    }
  }
  if(isContactEntry && contactHits>0) score += contactHits*6;
  return score;
}
function searchKB(query){
  const qTokens = tokenize(query);
  if(qTokens.length===0) return [];
  const scored = KB.map((e,idx)=>({
    e, score: scoreEntry(qTokens, idx, e.t==='DIRECTORIO DE CONTACTOS Y DIRECCIONES DE LAS DEPENDENCIAS')
  }));
  scored.sort((a,b)=>b.score-a.score);
  return scored.filter(s=>s.score>0).slice(0,5);
}
function formatAnswer(entry){
  let txt = entry.x;
  if(txt.length > 900) txt = txt.slice(0,880).trim() + '…';
  return txt;
}

/* ============ Lógica principal ============ */
function handleQuery(rawQuery){
  const norm = normalize(rawQuery);
  const tokens = rawTokenize(rawQuery);

  // 1) Entrada muy corta / confusa
  if(norm.length <= 2){
    addBotMessage(MSG_CONFUSO);
    return;
  }
  // 2) Despedida
  if(isFarewell(norm)){
    addBotMessage(MSG_DESPEDIDA);
    return;
  }
  // 3) Solo saludo
  if(isGreetingOnly(norm, tokens)){
    addBotMessage(MSG_SOLO_SALUDO);
    return;
  }
  // 4) Banco de intenciones prioritario (Tomi)
  const intent = matchIntent(rawQuery);
  if(intent){
    addBotMessage(intent.respuesta);
    return;
  }
  // 5) Búsqueda en el portafolio de servicios (KB)
  const results = searchKB(rawQuery);
  if(results.length===0){
    addBotMessage(MSG_NO_SABE);
    return;
  }
  const top = results[0];
  const alternates = results.slice(1,4).filter(r=>r.score >= top.score*0.4);
  addBotMessage(formatAnswer(top.e), {meta: top.e.s + ' · ' + top.e.t, alternates});
}

sendBtn.addEventListener('click', submitQuery);
inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitQuery(); });

function submitQuery(){
  const val = inputEl.value.trim();
  if(!val) return;
  addUserMessage(val);
  inputEl.value = '';
  showTyping(()=> handleQuery(val));
}

const QUICK_CHIPS = [
  "¿Cómo pago el predial?",
  "Horario de atención",
  "¿Cómo pongo una PQRS?",
  "¿Qué hacer en Sesquilé?",
  "SISBÉN"
];
function renderChips(){
  QUICK_CHIPS.forEach(c=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = ()=>{ inputEl.value = c; submitQuery(); };
    chipsEl.appendChild(chip);
  });
}

(function init(){
  renderChips();
  addBotMessage(MSG_SALUDO);
})();
</script>
